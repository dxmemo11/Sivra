<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;color:#1a1a1a;padding:24px}
    .card{background:white;border-radius:12px;border:1px solid #e3e3e3;width:100%;max-width:420px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
    .card-top{padding:32px 32px 0}
    .card-body{padding:24px 32px 32px}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .brand-mark{width:36px;height:36px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px;flex-shrink:0}
    .brand-name{font-size:18px;font-weight:700;color:#1a1a1a}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    .subtitle{font-size:14px;color:#6d7175;margin-bottom:24px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:500;color:#303030;margin-bottom:4px}
    input{width:100%;height:40px;padding:0 12px;border:1px solid #d1d1d1;border-radius:8px;font-size:14px;color:#1a1a1a;background:white;outline:none;font-family:inherit;transition:border-color 0.15s,box-shadow 0.15s}
    input:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,0.08)}
    input.error{border-color:#c0392b}
    .btn{width:100%;height:44px;background:#1a1a1a;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-top:6px}
    .btn:hover{background:#303030}
    .btn:disabled{background:#8c9196;cursor:not-allowed}
    .error-msg{background:#fde8e8;border:1px solid #f5c6c6;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:16px;display:none}
    .footer-link{text-align:center;margin-top:20px;font-size:13px;color:#6d7175}
    .footer-link a{color:#1a1a1a;font-weight:500;text-decoration:none}
    .footer-link a:hover{text-decoration:underline}
    .divider{height:1px;background:#e3e3e3;margin:20px 0}
    .store-info{background:#f9f9f9;border-radius:8px;padding:10px 14px;font-size:13px;color:#6d7175;margin-bottom:16px;display:none}
    .store-info strong{color:#1a1a1a}
  </style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="brand">
      <div class="brand-mark">S</div>
      <span class="brand-name">Sivra</span>
    </div>
    <h1>Sign in to your store</h1>
    <p class="subtitle">Enter your credentials to access the admin</p>
  </div>
  <div class="card-body">
    <div class="error-msg" id="errorMsg"></div>
    <div class="store-info" id="storeInfo"></div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus
        onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Sign in</button>
    <div class="footer-link" style="margin-top:16px">
      Don't have an account? <a href="sivra-signup.html">Create one</a>
    </div>
  </div>
</div>

<script>
  // If already logged in, redirect
  (async () => {
    try {
      const token = localStorage.getItem('sivra_token');
      if (!token) return;
      const res = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) { location.href = 'sivra-dashboard.html'; }
    } catch(e) {}
  })();

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');

    if (!email) { showError('Enter your email address'); return; }
    if (!password) { showError('Enter your password'); return; }

    btn.disabled = true; btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Invalid email or password');

      // Save session
      localStorage.setItem('sivra_token', data.token);
      localStorage.setItem('sivra_token_expires', data.expiresAt || '');
      if (data.store) {
        localStorage.setItem('sivra_store_slug', data.store.slug || '');
        localStorage.setItem('sivra_session', JSON.stringify({
          token: data.token,
          merchant: data.merchant,
          store: data.store,
        }));
      }

      // If multiple stores, show store info briefly
      if (data.stores && data.stores.length > 1) {
        const storeInfo = document.getElementById('storeInfo');
        storeInfo.innerHTML = `Signed in to <strong>${data.store?.name || 'your store'}</strong>`;
        storeInfo.style.display = '';
      }

      location.href = 'sivra-dashboard.html';
    } catch(e) {
      showError(e.message || 'Sign in failed. Please try again.');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = '';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Sign in';
  }
// Expose to global
if (typeof login === "function") window.login = login;
if (typeof showError === "function") window.showError = showError;
</script>
</body>
</html>
