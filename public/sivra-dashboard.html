<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Home</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <!-- Page header -->
        <div class="page-header">
          <div>
            <h1 class="page-title" id="dashGreeting">Good morning</h1>
            <p class="page-subtitle" id="dashDate"></p>
          </div>
          <div class="btn-group">
            <select class="sort-select" id="dashPeriod" onchange="loadStats(this.value)" style="height:32px">
              <option value="7">Last 7 days</option>
              <option value="30" selected>Last 30 days</option>
              <option value="90">Last 3 months</option>
            </select>
            <button class="btn btn-secondary" onclick="openStorefront()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 7h11M7 1.5l5.5 5.5L7 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              View store
            </button>
            <button class="btn btn-primary" onclick="location.href='sivra-add-product.html'">+ Add product</button>
          </div>
        </div>

        <div class="page-body">

          <!-- KPI cards -->
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
            <div class="stat-card" onclick="location.href='sivra-analytics.html'">
              <div class="stat-label">Revenue</div>
              <div class="stat-value" id="kpiRevenue"><span class="skeleton skeleton-text w-50" style="height:24px;display:block"></span></div>
              <div class="stat-delta" id="kpiRevDelta"></div>
            </div>
            <div class="stat-card" onclick="location.href='sivra-orders.html'">
              <div class="stat-label">Orders</div>
              <div class="stat-value" id="kpiOrders"><span class="skeleton skeleton-text w-50" style="height:24px;display:block"></span></div>
              <div class="stat-delta" id="kpiOrdDelta"></div>
            </div>
            <div class="stat-card" onclick="location.href='sivra-customers.html'">
              <div class="stat-label">Customers</div>
              <div class="stat-value" id="kpiCustomers"><span class="skeleton skeleton-text w-50" style="height:24px;display:block"></span></div>
            </div>
            <div class="stat-card" onclick="location.href='sivra-products.html'">
              <div class="stat-label">Active products</div>
              <div class="stat-value" id="kpiProducts"><span class="skeleton skeleton-text w-50" style="height:24px;display:block"></span></div>
            </div>
          </div>

          <!-- Alerts -->
          <div id="dashAlerts" style="margin-bottom:16px"></div>

          <!-- Revenue chart -->
          <div class="card" style="margin-bottom:16px">
            <div class="card-header">
              <span class="card-title">Revenue</span>
              <div class="btn-group">
                <button class="btn btn-secondary btn-sm active" id="chartRevBtn" onclick="switchChart('revenue')">Revenue</button>
                <button class="btn btn-secondary btn-sm" id="chartOrdBtn" onclick="switchChart('orders')">Orders</button>
              </div>
            </div>
            <div style="padding:16px"><canvas id="dashChart" height="200"></canvas></div>
          </div>

          <!-- Two-col -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">

            <!-- Recent orders -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">Recent orders</span>
                <a href="sivra-orders.html" class="btn btn-plain btn-sm">View all</a>
              </div>
              <div id="recentOrdersList">
                <div style="padding:20px">
                  ${[1,2,3].map(()=>`<div class="skeleton skeleton-text w-100" style="margin-bottom:12px"></div><div class="skeleton skeleton-text w-75" style="margin-bottom:16px"></div>`).join('')}
                </div>
              </div>
            </div>

            <!-- Top products -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">Products</span>
                <a href="sivra-products.html" class="btn btn-plain btn-sm">View all</a>
              </div>
              <div id="topProductsList">
                <div style="padding:20px">
                  ${[1,2,3].map(()=>`<div class="skeleton skeleton-text w-100" style="margin-bottom:12px"></div><div class="skeleton skeleton-text w-75" style="margin-bottom:16px"></div>`).join('')}
                </div>
              </div>
            </div>
          </div>

          <!-- Quick actions -->
          <div class="card">
            <div class="card-header"><span class="card-title">Quick actions</span></div>
            <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-secondary" onclick="location.href='sivra-add-product.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                Add product
              </button>
              <button class="btn btn-secondary" onclick="location.href='sivra-orders.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 5h6M4 7.5h6M4 10h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                View orders
              </button>
              <button class="btn btn-secondary" onclick="location.href='sivra-discounts.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="9" cy="9" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11L11 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Create discount
              </button>
              <button class="btn btn-secondary" onclick="location.href='sivra-settings.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.9 2.9l1.4 1.4M9.7 9.7l1.4 1.4M11.1 2.9l-1.4 1.4M4.3 9.7l-1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Settings
              </button>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('home');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  // Set greeting
  const hr = new Date().getHours();
  const greeting = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  const merchant = Auth.getMerchant();
  document.getElementById('dashGreeting').textContent = greeting + (merchant ? ', ' + (merchant.firstName || merchant.first_name || '') : '');
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-AU', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  let _chart = null, _chartMode = 'revenue', _orders = [], _products = [];

  function switchChart(mode) {
    _chartMode = mode;
    document.getElementById('chartRevBtn').classList.toggle('active', mode==='revenue');
    document.getElementById('chartOrdBtn').classList.toggle('active', mode==='orders');
    drawChart(parseInt(document.getElementById('dashPeriod').value));
  }

  function drawChart(days) {
    const labels = [], data = [];
    // _orders is now array of {date, revenue, orders} from analytics endpoint
    const chartData = Array.isArray(_orders) ? _orders : [];
    chartData.forEach(point => {
      const d = new Date(point.date);
      labels.push(d.toLocaleDateString('en-AU', {day:'numeric', month:'short'}));
      data.push(_chartMode === 'revenue' ? parseFloat(point.revenue||0) : parseInt(point.orders||0));
    });
    if (_chart) _chart.destroy();
    _chart = new Chart(document.getElementById('dashChart'), {
      type: 'line',
      data: { labels, datasets: [{ data,
        borderColor: '#1a1a1a', backgroundColor: 'rgba(26,26,26,0.04)',
        borderWidth: 2, tension: 0.4, fill: true,
        pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#1a1a1a'
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: '#303030', titleColor: '#fff', bodyColor: '#ccc', padding: 8, cornerRadius: 6,
            callbacks: { label: c => _chartMode === 'revenue' ? '$' + c.raw.toFixed(2) : c.raw + ' orders' } }},
        scales: {
          x: { grid: { display: false }, border: { display: false }, ticks: { color: '#8c9196', font: { size: 11 }, maxTicksLimit: 10 }},
          y: { grid: { color: 'rgba(0,0,0,0.04)' }, border: { display: false }, ticks: { color: '#8c9196', font: { size: 11 },
            callback: v => _chartMode === 'revenue' ? '$' + v.toFixed(0) : v }}
        }
      }
    });
  }

  async function loadStats(days = 30) {
    try {
      const [overview, salesData, invData] = await Promise.all([
        API.get('/api/analytics/overview?days=' + days),
        API.get('/api/analytics/sales-over-time?days=' + days),
        API.get('/api/analytics/inventory'),
      ]);

      // KPI cards
      const r = overview.revenue || {};
      const o = overview.orders || {};
      const aov = overview.aov || {};
      document.getElementById('kpiRevenue').textContent = Fmt.money(r.value || 0);
      document.getElementById('kpiOrders').textContent = o.value || 0;
      document.getElementById('kpiCustomers').textContent = overview.customers?.total || 0;
      document.getElementById('kpiProducts').textContent = overview.products?.active || 0;

      // Delta indicators
      const fmtDelta = (pct) => {
        if (pct === undefined || pct === null) return '';
        const col = pct >= 0 ? 'var(--p-color-text-success)' : 'var(--p-color-text-critical)';
        return `<span style="color:${col};font-size:12px">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct)}%</span>`;
      };
      const revDelta = document.getElementById('kpiRevDelta');
      const ordDelta = document.getElementById('kpiOrdDelta');
      if (revDelta) revDelta.innerHTML = fmtDelta(r.change_pct);
      if (ordDelta) ordDelta.innerHTML = fmtDelta(o.change_pct);

      // Store sales data for chart
      _orders = salesData.data || [];

      // Build alerts
      const alerts = [];
      const unfulfilledCount = o.value > 0 ? null : 0; // from orders tab
      const lowStock = overview.products?.low_stock || 0;
      const outOfStock = overview.products?.out_of_stock || 0;
      if (lowStock > 0) alerts.push({ type:'warning', msg: `${lowStock} product${lowStock!==1?'s':''} running low on stock`, href:'sivra-inventory.html' });
      if (outOfStock > 0) alerts.push({ type:'critical', msg: `${outOfStock} product${outOfStock!==1?'s':''} out of stock`, href:'sivra-inventory.html' });

      // Check unfulfilled orders
      try {
        const unfData = await API.get('/api/orders?fulfillment_status=unfulfilled&limit=50');
        const unfulfilledOrders = (unfData.orders || []).filter(x => x.status !== 'cancelled');
        if (unfulfilledOrders.length > 0) {
          alerts.push({ type:'warning', msg: `${unfulfilledOrders.length} unfulfilled order${unfulfilledOrders.length!==1?'s':''}`, href:'sivra-orders.html?fulfillment_status=unfulfilled' });
        }
        const unpaidOrders = (unfData.orders || []).filter(x => x.payment_status === 'pending' && x.status !== 'cancelled');
        // also check unpaid
        const unpaidData = await API.get('/api/orders?payment_status=pending&limit=50');
        const unpaid = (unpaidData.orders || []).filter(x => x.status !== 'cancelled');
        if (unpaid.length > 0) {
          alerts.push({ type:'info', msg: `${unpaid.length} order${unpaid.length!==1?'s':''} awaiting payment`, href:'sivra-orders.html' });
        }
      } catch(e) {}

      const alertsEl = document.getElementById('dashAlerts');
      if (alertsEl) {
        if (alerts.length === 0) {
          alertsEl.style.display = 'none';
        } else {
          alertsEl.style.display = '';
          alertsEl.innerHTML = alerts.map(a => `
            <a href="${a.href}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${a.type==='critical'?'#fde8e8':a.type==='warning'?'#fff8e1':'#e8f4fd'};border-radius:8px;text-decoration:none;color:#1a1a1a;font-size:13px;font-weight:500;transition:opacity 0.1s" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">
              <span>${a.type==='critical'?'🔴':a.type==='warning'?'⚠️':'ℹ️'}</span>
              <span style="flex:1">${a.msg}</span>
              <span style="color:#8c9196">→</span>
            </a>`).join('');
        }
      }

      // Inventory low stock in sidebar
      const invProducts = (invData.products || []).filter(p => p.stock_status !== 'in_stock');
      const lowStockList = document.getElementById('lowStockList');
      if (lowStockList && invProducts.length > 0) {
        document.getElementById('lowStockSection').style.display = '';
        lowStockList.innerHTML = invProducts.slice(0,5).map(p =>
          `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f6f6f7;font-size:13px">
            <a href="sivra-edit-product.html?id=${p.id}" style="font-weight:500;text-decoration:none;color:#1a1a1a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</a>
            <span style="color:${p.stock_status==='out_of_stock'?'var(--p-color-text-critical)':'var(--p-color-text-caution)'};font-weight:600;margin-left:8px">${p.quantity}</span>
          </div>`).join('');
      }

      drawChart(days);
    } catch(e) {
      console.error('Dashboard load error:', e);
      Toast.error('Failed to load dashboard data');
    }
  }

  loadStats(30);

})();
</script>
</body>
</html>
