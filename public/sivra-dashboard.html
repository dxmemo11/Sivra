<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Home</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* Shopify-style dashboard overrides */
    .dash-metric-row { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:1px solid #e3e3e3; border-radius:12px; overflow:hidden; background:white; margin-bottom:16px; }
    .dash-metric { padding:16px 20px; border-right:1px solid #e3e3e3; cursor:pointer; transition:background 0.1s; }
    .dash-metric:last-child { border-right:none; }
    .dash-metric:hover { background:#f9f9f9; }
    .dash-metric.active { background:#f0f0f0; border-bottom:2px solid #1a1a1a; }
    .dash-metric-label { font-size:12px; color:#6d7175; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .dash-metric-value { font-size:22px; font-weight:700; color:#1a1a1a; margin-bottom:3px; }
    .dash-metric-delta { font-size:12px; display:flex; align-items:center; gap:3px; }
    .delta-up { color:#1a7f37; }
    .delta-down { color:#c0392b; }
    .delta-neutral { color:#6d7175; }
    .dash-chart-wrap { background:white; border:1px solid #e3e3e3; border-radius:12px; padding:20px; margin-bottom:16px; }
    .dash-alert-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .dash-alert { display:flex; align-items:center; gap:8px; padding:9px 14px; background:white; border:1px solid #e3e3e3; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; color:#1a1a1a; transition:border-color 0.1s; white-space:nowrap; }
    .dash-alert:hover { border-color:#1a1a1a; }
    .dash-alert svg { flex-shrink:0; }
    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .dash-card { background:white; border:1px solid #e3e3e3; border-radius:12px; overflow:hidden; }
    .dash-card-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #f0f0f0; }
    .dash-card-title { font-size:14px; font-weight:600; color:#1a1a1a; }
    .dash-card-link { font-size:13px; color:#2563eb; text-decoration:none; font-weight:500; }
    .dash-card-link:hover { text-decoration:underline; }
    .order-row { display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid #f6f6f7; text-decoration:none; color:#1a1a1a; transition:background 0.1s; }
    .order-row:hover { background:#f9f9f9; }
    .order-row:last-child { border-bottom:none; }
    .order-num { font-size:13px; font-weight:600; color:#1a1a1a; }
    .order-meta { font-size:12px; color:#6d7175; }
    .order-total { font-size:13px; font-weight:600; margin-left:auto; }
    .order-badge { font-size:11px; padding:2px 7px; border-radius:20px; font-weight:500; }
    .badge-paid { background:#d1fae5; color:#065f46; }
    .badge-pending { background:#fef3c7; color:#92400e; }
    .badge-refunded { background:#f3f4f6; color:#6b7280; }
    .prod-row { display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid #f6f6f7; text-decoration:none; color:#1a1a1a; transition:background 0.1s; }
    .prod-row:hover { background:#f9f9f9; }
    .prod-row:last-child { border-bottom:none; }
    .prod-thumb { width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #e3e3e3; flex-shrink:0; background:#f6f6f7; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .prod-thumb img { width:100%; height:100%; object-fit:cover; }
    .prod-name { font-size:13px; font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prod-price { font-size:13px; color:#6d7175; }
    .prod-stock { font-size:12px; font-weight:600; margin-left:auto; }
    .quick-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .qa-btn { display:flex; align-items:center; gap:7px; height:36px; padding:0 14px; background:white; border:1px solid #e3e3e3; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; color:#303030; transition:all 0.1s; text-decoration:none; }
    .qa-btn:hover { border-color:#1a1a1a; background:#f9f9f9; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; display:inline-block; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  </style>
</head>
<body>
<div class="app">
<aside class="sidebar"><div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div></aside>
  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto;padding:0 4px">

        <!-- Page header -->
        <div class="page-header" style="margin-bottom:16px">
          <div>
            <h1 class="page-title" id="dashGreeting" style="font-size:22px">Good morning</h1>
            <div class="text-muted text-sm" id="dashDate"></div>
          </div>
          <div class="btn-group">
            <select id="dashPeriod" class="sort-select" onchange="loadStats(parseInt(this.value))" style="height:32px">
              <option value="1">Today</option>
              <option value="7">Last 7 days</option>
              <option value="30" selected>Last 30 days</option>
              <option value="90">Last 90 days</option>
            </select>
            <a href="javascript:void(0)" onclick="openStorefront()" class="btn btn-secondary">→ View store</a>
            <a href="sivra-add-product.html" class="btn btn-primary">+ Add product</a>
          </div>
        </div>

        <!-- Alerts -->
        <div id="dashAlerts" class="dash-alert-row" style="display:none"></div>

        <!-- Metrics row — Shopify style clickable tabs -->
        <div class="dash-metric-row" id="metricRow">
          <div class="dash-metric active" onclick="setMetric('revenue',this)">
            <div class="dash-metric-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M4 9.5c0 1.1.9 2 2 2h2a2 2 0 0 0 0-4H6a2 2 0 0 1 0-4h2a2 2 0 0 1 2 2" stroke="#6d7175" stroke-width="1.3" stroke-linecap="round"/></svg>
              Total sales
            </div>
            <div class="dash-metric-value" id="kpiRevenue"><div class="skeleton" style="height:26px;width:80px;border-radius:4px"></div></div>
            <div class="dash-metric-delta" id="kpiRevDelta"></div>
          </div>
          <div class="dash-metric" onclick="setMetric('orders',this)">
            <div class="dash-metric-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="#6d7175" stroke-width="1.3"/><path d="M4 5h6M4 7.5h4" stroke="#6d7175" stroke-width="1.2" stroke-linecap="round"/></svg>
              Orders
            </div>
            <div class="dash-metric-value" id="kpiOrders"><div class="skeleton" style="height:26px;width:40px;border-radius:4px"></div></div>
            <div class="dash-metric-delta" id="kpiOrdDelta"></div>
          </div>
          <div class="dash-metric" onclick="setMetric('customers',this)">
            <div class="dash-metric-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="#6d7175" stroke-width="1.3"/><path d="M2 12c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="#6d7175" stroke-width="1.3" stroke-linecap="round"/></svg>
              Customers
            </div>
            <div class="dash-metric-value" id="kpiCustomers"><div class="skeleton" style="height:26px;width:40px;border-radius:4px"></div></div>
            <div class="dash-metric-delta" id="kpiCustDelta"></div>
          </div>
          <div class="dash-metric" onclick="setMetric('aov',this)">
            <div class="dash-metric-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l3 6-3 6-3-6 3-6z" stroke="#6d7175" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Avg. order value
            </div>
            <div class="dash-metric-value" id="kpiAov"><div class="skeleton" style="height:26px;width:60px;border-radius:4px"></div></div>
            <div class="dash-metric-delta" id="kpiAovDelta"></div>
          </div>
        </div>

        <!-- Main chart -->
        <div class="dash-chart-wrap">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div>
              <div style="font-size:12px;color:#6d7175;margin-bottom:2px" id="chartLabel">Total sales over time</div>
              <div style="font-size:26px;font-weight:700;color:#1a1a1a" id="chartTotal">—</div>
            </div>
          </div>
          <div style="height:200px;margin-top:12px">
            <canvas id="dashChart"></canvas>
          </div>
        </div>

        <!-- Orders to fulfill + other alerts below chart -->
        <div id="actionAlerts" class="dash-alert-row"></div>

        <!-- Two column: recent orders + top products -->
        <div class="dash-grid">
          <!-- Recent orders -->
          <div class="dash-card">
            <div class="dash-card-header">
              <span class="dash-card-title">Recent orders</span>
              <a href="sivra-orders.html" class="dash-card-link">View all</a>
            </div>
            <div id="recentOrdersList">
              <div style="padding:32px;text-align:center;color:#8c9196;font-size:13px">Loading...</div>
            </div>
          </div>

          <!-- Top products -->
          <div class="dash-card">
            <div class="dash-card-header">
              <span class="dash-card-title">Products</span>
              <a href="sivra-products.html" class="dash-card-link">View all</a>
            </div>
            <div id="topProductsList">
              <div style="padding:32px;text-align:center;color:#8c9196;font-size:13px">Loading...</div>
            </div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="dash-card" style="margin-bottom:16px">
          <div class="dash-card-header"><span class="dash-card-title">Quick actions</span></div>
          <div style="padding:14px 18px">
            <div class="quick-actions">
              <a href="sivra-add-product.html" class="qa-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Add product
              </a>
              <a href="sivra-orders.html" class="qa-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 5h6M4 7.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                View orders
              </a>
              <a href="sivra-discounts.html" class="qa-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="4.5" cy="4.5" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="9.5" cy="9.5" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11L11 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Create discount
              </a>
              <a href="sivra-themes.html" class="qa-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M7 4v3l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Customize theme
              </a>
              <a href="sivra-settings.html" class="qa-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5v1M7 11.5v1M1.5 7h1M11.5 7h1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Settings
              </a>
              <a href="sivra-live-view.html" class="qa-btn">
                <span class="live-dot"></span>
                Live view
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
(async function() {
  const session = await initAdmin('home');
  if (!session) return;

  const hr = new Date().getHours();
  const greeting = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  const merchant = Auth.getMerchant();
  document.getElementById('dashGreeting').textContent = greeting + (merchant ? ', ' + (merchant.firstName || merchant.first_name || '') : '');
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-AU', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  let _chart = null, _chartMode = 'revenue', _chartData = [], _overview = null;

  function setMetric(mode, el) {
    _chartMode = mode;
    document.querySelectorAll('.dash-metric').forEach(m => m.classList.remove('active'));
    el.classList.add('active');
    const labels = { revenue:'Total sales over time', orders:'Orders over time', customers:'New customers over time', aov:'Avg. order value over time' };
    document.getElementById('chartLabel').textContent = labels[mode];
    drawChart();
  }

  function drawChart() {
    const labels = _chartData.map(d => {
      const dt = new Date(d.date);
      return dt.toLocaleDateString('en-AU', {day:'numeric', month:'short'});
    });
    let data, total;
    if (_chartMode === 'revenue') {
      data = _chartData.map(d => parseFloat(d.revenue||0));
      total = data.reduce((s,v) => s+v, 0);
      document.getElementById('chartTotal').textContent = Fmt.money(total);
    } else if (_chartMode === 'orders') {
      data = _chartData.map(d => parseInt(d.orders||0));
      total = data.reduce((s,v) => s+v, 0);
      document.getElementById('chartTotal').textContent = total + ' orders';
    } else if (_chartMode === 'customers') {
      data = _chartData.map(d => parseInt(d.orders||0)); // proxy
      total = _overview?.customers?.total || 0;
      document.getElementById('chartTotal').textContent = total + ' customers';
    } else {
      data = _chartData.map(d => {
        const rev = parseFloat(d.revenue||0);
        const ord = parseInt(d.orders||0);
        return ord > 0 ? rev/ord : 0;
      });
      const avgAov = data.filter(v=>v>0);
      const aovVal = avgAov.length ? avgAov.reduce((s,v)=>s+v,0)/avgAov.length : 0;
      document.getElementById('chartTotal').textContent = Fmt.money(aovVal);
    }

    if (_chart) _chart.destroy();
    const ctx = document.getElementById('dashChart');
    _chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{
        data,
        borderColor: '#1a1a1a',
        backgroundColor: 'rgba(26,26,26,0.04)',
        borderWidth: 2, tension: 0.4, fill: true,
        pointRadius: 0, pointHoverRadius: 4,
        pointHoverBackgroundColor: '#1a1a1a',
        pointHoverBorderColor: 'white',
        pointHoverBorderWidth: 2,
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a1a', titleColor: '#fff', bodyColor: '#ccc',
            padding: 10, cornerRadius: 8, displayColors: false,
            callbacks: {
              label: c => _chartMode === 'revenue' || _chartMode === 'aov' ? Fmt.money(c.raw) : c.raw + (_chartMode==='orders'?' orders':' customers')
            }
          }
        },
        scales: {
          x: { grid: { display: false }, border: { display: false }, ticks: { color: '#8c9196', font: { size: 11 }, maxTicksLimit: 10 }},
          y: { grid: { color: 'rgba(0,0,0,0.04)' }, border: { display: false }, ticks: { color: '#8c9196', font: { size: 11 }, callback: v => _chartMode === 'revenue' || _chartMode === 'aov' ? '$' + v.toFixed(0) : v }}
        }
      }
    });
  }

  function renderDelta(el, pct) {
    if (!el || pct === undefined || pct === null) return;
    const up = pct >= 0;
    el.innerHTML = `<span class="${up?'delta-up':'delta-down'}">${up?'↑':'↓'} ${Math.abs(pct)}%</span> <span class="delta-neutral">vs prev period</span>`;
  }

  async function loadStats(days) {
    try {
      const [overview, salesData] = await Promise.all([
        API.get('/api/analytics/overview?days=' + days),
        API.get('/api/analytics/sales-over-time?days=' + days),
      ]);
      _overview = overview;
      _chartData = salesData.data || [];

      // KPI values
      document.getElementById('kpiRevenue').textContent = Fmt.money(overview.revenue?.value || 0);
      document.getElementById('kpiOrders').textContent = overview.orders?.value || 0;
      document.getElementById('kpiCustomers').textContent = overview.customers?.total || 0;
      document.getElementById('kpiAov').textContent = Fmt.money(overview.aov?.value || 0);
      renderDelta(document.getElementById('kpiRevDelta'), overview.revenue?.change_pct);
      renderDelta(document.getElementById('kpiOrdDelta'), overview.orders?.change_pct);
      renderDelta(document.getElementById('kpiAovDelta'), overview.aov?.change_pct);

      // Chart total
      const totalRev = _chartData.reduce((s,d) => s+parseFloat(d.revenue||0), 0);
      document.getElementById('chartTotal').textContent = Fmt.money(totalRev);

      drawChart();

      // Action alerts (orders to fulfill, low stock)
      const alerts = [];
      try {
        const [unfulfData, invData] = await Promise.all([
          API.get('/api/orders?fulfillment_status=unfulfilled&limit=100'),
          API.get('/api/analytics/inventory'),
        ]);
        const unfulfilled = (unfulfData.orders||[]).filter(o=>o.status!=='cancelled');
        const unpaid = (unfulfData.orders||[]).filter(o=>o.payment_status==='pending'&&o.status!=='cancelled');
        const lowStock = (invData.products||[]).filter(p=>p.stock_status==='low_stock');
        const outStock = (invData.products||[]).filter(p=>p.stock_status==='out_of_stock');
        if (unfulfilled.length) alerts.push({ icon:'📦', label:`${unfulfilled.length} order${unfulfilled.length!==1?'s':''} to fulfill`, href:'sivra-orders.html' });
        if (unpaid.length) alerts.push({ icon:'💳', label:`${unpaid.length} payment${unpaid.length!==1?'s':''} to capture`, href:'sivra-orders.html' });
        if (outStock.length) alerts.push({ icon:'⚠️', label:`${outStock.length} out of stock`, href:'sivra-inventory.html' });
        if (lowStock.length) alerts.push({ icon:'📉', label:`${lowStock.length} low stock`, href:'sivra-inventory.html' });
      } catch(e) {}

      const alertsEl = document.getElementById('actionAlerts');
      alertsEl.innerHTML = alerts.map(a =>
        `<a href="${a.href}" class="dash-alert">${a.icon} ${a.label}</a>`
      ).join('');

      // Recent orders and top products in parallel
      const [ordData, prodData] = await Promise.all([
        API.get('/api/orders?limit=8&sort=newest'),
        API.get('/api/products?limit=8&status=active'),
      ]);
      renderRecentOrders(ordData.orders || []);
      renderTopProducts(prodData.products || []);

    } catch(e) {
      console.error('Dashboard error:', e);
      // Fallback
      try {
        const [oData, pData] = await Promise.all([API.get('/api/orders?limit=200'), API.get('/api/products?limit=100')]);
        const orders = oData.orders||[];
        const activeOrders = orders.filter(o=>o.status!=='cancelled');
        const rev = activeOrders.reduce((s,o)=>s+parseFloat(o.total||0),0);
        document.getElementById('kpiRevenue').textContent = Fmt.money(rev);
        document.getElementById('kpiOrders').textContent = activeOrders.length;
        document.getElementById('kpiCustomers').textContent = '—';
        document.getElementById('kpiAov').textContent = activeOrders.length ? Fmt.money(rev/activeOrders.length) : '$0.00';
        _chartData = [];
        for (let i=days-1;i>=0;i--) {
          const d=new Date();d.setDate(d.getDate()-i);
          const ds=d.toISOString().split('T')[0];
          const dayO=activeOrders.filter(o=>o.created_at&&o.created_at.startsWith(ds));
          _chartData.push({date:ds,revenue:dayO.reduce((s,o)=>s+parseFloat(o.total||0),0),orders:dayO.length});
        }
        document.getElementById('chartTotal').textContent = Fmt.money(rev);
        drawChart();
        renderRecentOrders(orders.slice(0,8));
        renderTopProducts(pData.products||[]);
      } catch(e2) { Toast.error('Failed to load dashboard'); }
    }
  }

  function renderRecentOrders(orders) {
    const el = document.getElementById('recentOrdersList');
    if (!orders.length) {
      el.innerHTML = '<div style="padding:32px;text-align:center;color:#8c9196;font-size:13px"><div style="font-size:28px;margin-bottom:8px">📋</div>No orders yet</div>';
      return;
    }
    el.innerHTML = orders.slice(0,6).map(o => {
      const badgeClass = o.payment_status==='paid'?'badge-paid':o.payment_status==='refunded'?'badge-refunded':'badge-pending';
      const badgeLabel = (o.payment_status||'pending').replace(/_/g,' ');
      const name = o.shipping_name || o.customer_email || 'Guest';
      return `<a href="sivra-order-detail.html?id=${o.id}" class="order-row">
        <div>
          <div class="order-num">#${o.order_number}</div>
          <div class="order-meta">${Fmt.relativeTime(o.created_at)} · ${name}</div>
        </div>
        <span class="order-badge ${badgeClass}" style="text-transform:capitalize">${badgeLabel}</span>
        <span class="order-total">${Fmt.money(o.total||0)}</span>
      </a>`;
    }).join('');
  }

  function renderTopProducts(products) {
    const el = document.getElementById('topProductsList');
    const active = products.filter(p=>p.status==='active');
    if (!active.length) {
      el.innerHTML = '<div style="padding:32px;text-align:center;color:#8c9196;font-size:13px"><div style="font-size:28px;margin-bottom:8px">📦</div>No products yet</div>';
      return;
    }
    el.innerHTML = active.slice(0,6).map(p => {
      const imgs = Array.isArray(p.images)?p.images:(typeof p.images==='string'?JSON.parse(p.images||'[]'):[]);
      const img = imgs[0]?`<img src="${imgs[0]}" alt=""/>`:`<span style="font-size:18px;opacity:0.3">📦</span>`;
      const qty = parseInt(p.quantity||0);
      const stockColor = qty<=0?'#c0392b':qty<=5?'#b57d00':'#6d7175';
      const stockLabel = qty<=0?'Out of stock':qty<=5?`${qty} left`:`${qty} in stock`;
      return `<a href="sivra-edit-product.html?id=${p.id}" class="prod-row">
        <div class="prod-thumb">${img}</div>
        <div style="flex:1;min-width:0">
          <div class="prod-name">${p.title||'—'}</div>
          <div class="prod-price">${Fmt.money(p.price||0)}</div>
        </div>
        <span class="prod-stock" style="color:${stockColor}">${stockLabel}</span>
      </a>`;
    }).join('');
  }

  loadStats(30);


  // Expose to global scope for onclick handlers
  if (typeof setMetric === "function") window.setMetric = setMetric;
  if (typeof switchChart === "function") window.switchChart = switchChart;
  if (typeof loadStats === "function") window.loadStats = loadStats;
})();
</script>
</body>
</html>
