<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Customers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f1f1; color: #303030; -webkit-font-smoothing: antialiased; font-size: 13px; }
    a { text-decoration: none; color: inherit; }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 208px; flex-shrink: 0; background: #f6f6f7; border-right: 1px solid #e3e3e3; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden; }
    .sidebar::-webkit-scrollbar { width: 0; }
    .sb-logo { display: flex; align-items: center; gap: 8px; padding: 12px 12px 8px; }
    .sb-logo-icon { width: 24px; height: 24px; background: #1a1a1a; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: white; }
    .sb-logo-text { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .sb-store { display: flex; align-items: center; gap: 8px; padding: 5px 8px; margin: 0 4px 2px; border-radius: 7px; cursor: pointer; transition: background 0.1s; }
    .sb-store:hover { background: #ebebeb; }
    .sb-store-av { width: 22px; height: 22px; border-radius: 5px; background: #008060; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
    .sb-store-name { font-size: 12px; font-weight: 600; color: #303030; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-nav { flex: 1; padding: 2px 4px 4px; }
    .sb-item { display: flex; align-items: center; padding: 5px 8px; border-radius: 7px; cursor: pointer; color: #303030; font-size: 13px; margin-bottom: 1px; transition: background 0.08s; gap: 8px; position: relative; }
    .sb-item:hover { background: #ebebeb; }
    .sb-item.active { background: #e3e3e3; font-weight: 500; }
    .sb-item.active::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 4px; width: 3px; background: #303030; border-radius: 0 2px 2px 0; }
    .sb-icon { flex-shrink: 0; display: flex; color: #6d7175; width: 16px; }
    .sb-item.active .sb-icon, .sb-item:hover .sb-icon { color: #303030; }
    .sb-label { flex: 1; }
    .sb-count { font-size: 11px; color: #6d7175; background: #e8e8e8; padding: 1px 6px; border-radius: 10px; }
    .sb-caret { color: #8c9196; transition: transform 0.15s; }
    .sb-item.open .sb-caret { transform: rotate(90deg); }
    .sb-sub { display: none; padding-left: 28px; }
    .sb-sub.open { display: block; }
    .sb-sub-item { display: block; padding: 4px 8px; border-radius: 6px; color: #6d7175; font-size: 12.5px; cursor: pointer; margin-bottom: 1px; transition: background 0.08s, color 0.08s; }
    .sb-sub-item:hover { background: #ebebeb; color: #303030; }
    .sb-sub-item.active { color: #303030; font-weight: 500; background: #e3e3e3; }
    .sb-section { display: flex; align-items: center; justify-content: space-between; padding: 8px 8px 3px; font-size: 11.5px; font-weight: 500; color: #8c9196; cursor: pointer; border-radius: 6px; margin-bottom: 1px; transition: background 0.08s; }
    .sb-section:hover { background: #ebebeb; color: #303030; }
    .sb-divider { height: 1px; background: #e3e3e3; margin: 4px 0; }
    .sb-bottom { flex-shrink: 0; padding: 4px; border-top: 1px solid #e3e3e3; }
    .topbar { height: 52px; background: #1a1a1a; display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; gap: 12px; }
    .topbar-search { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 7px; padding: 0 12px; height: 32px; width: 300px; }
    .topbar-search input { background: none; border: none; outline: none; font-size: 13px; color: white; font-family: inherit; flex: 1; }
    .topbar-search input::placeholder { color: rgba(255,255,255,0.4); }
    .kbd-wrap { display: flex; gap: 3px; }
    .kbd { font-size: 10px; color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; padding: 1px 4px; font-family: monospace; }
    .topbar-spacer { flex: 1; }
    .topbar-btn { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.65); position: relative; }
    .topbar-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .notif-dot { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; background: #e74c3c; border-radius: 50%; border: 1.5px solid #1a1a1a; }
    .topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: #5b5fc7; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; cursor: pointer; flex-shrink: 0; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: white; }
    .content { flex: 1; overflow-y: auto; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; border-bottom: 1px solid #e3e3e3; }
    .page-title { font-size: 18px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 7px; }
    .page-actions { display: flex; align-items: center; gap: 8px; }
    .btn { height: 32px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.1s; border: none; white-space: nowrap; }
    .btn-secondary { background: white; border: 1px solid #c9cccf; color: #303030; }
    .btn-secondary:hover { background: #f6f6f7; }
    .btn-green { background: #303030; color: white; }
    .btn-green:hover { background: #1a1a1a; }
    /* Stats row */
    .stats-row { display: flex; align-items: center; gap: 20px; padding: 10px 20px 10px; border-bottom: 1px solid #e3e3e3; font-size: 13px; color: #303030; }
    .stats-row span { color: #6d7175; }
    /* Search row */
    .search-row { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid #e3e3e3; }
    .search-wrap { flex: 1; display: flex; align-items: center; gap: 6px; border: 1px solid #e3e3e3; border-radius: 7px; padding: 0 10px; height: 32px; background: white; }
    .search-wrap input { border: none; outline: none; font-size: 13px; color: #303030; font-family: inherit; flex: 1; }
    .search-wrap input::placeholder { color: #8c9196; }
    .icon-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #e3e3e3; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #6d7175; }
    .icon-btn:hover { background: #f6f6f7; }
    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid #e3e3e3; }
    th { font-size: 12px; font-weight: 500; color: #6d7175; padding: 10px 12px; text-align: left; white-space: nowrap; }
    th:first-child { width: 36px; padding-left: 20px; }
    th:last-child { padding-right: 20px; }
    td { padding: 11px 12px; border-bottom: 1px solid #f1f1f1; font-size: 13px; color: #303030; vertical-align: middle; }
    td:first-child { padding-left: 20px; }
    td:last-child { padding-right: 20px; }
    tbody tr { transition: background 0.06s; cursor: pointer; }
    tbody tr:hover td { background: #fafafa; }
    tbody tr:last-child td { border-bottom: none; }
    /* Badges */
    .badge { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
    .b-green { background: #d4edda; color: #155724; }
    .b-yellow { background: #fff3cd; color: #856404; border: 1px solid #ffc10740; }
    .b-gray { background: #f1f1f1; color: #6d7175; border: 1px solid #e3e3e3; }
    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 12px 20px; border-top: 1px solid #e3e3e3; font-size: 12.5px; color: #6d7175; }
    .pag-btn { height: 28px; min-width: 28px; padding: 0 8px; border-radius: 5px; border: 1px solid #e3e3e3; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #303030; font-size: 12px; font-family: inherit; }
    .pag-btn:hover { background: #f6f6f7; }
    .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px); background: #303030; color: white; padding: 9px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 9999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-logo"><div class="sb-logo-icon">S</div><span class="sb-logo-text">Sivra</span></div>
    <div class="sb-store"><div class="sb-store-av" id="sbStoreAv">S</div><span class="sb-store-name" id="sbStoreName">My Store</span><svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="color:#8c9196;flex-shrink:0"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-bottom"><div class="sb-item" onclick="showToast('Settings')"><span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M13.7 8a5.8 5.8 0 00-.1-1l1.4-1.1-1.5-2.6-1.7.7a5.5 5.5 0 00-1.6-.9L9.9 1.5h-3l-.3 1.6a5.5 5.5 0 00-1.6.9l-1.7-.7L1.8 5.9l1.4 1.1A5.8 5.8 0 003 8c0 .3 0 .7.1 1L1.8 10.1l1.5 2.6 1.7-.7c.5.4 1 .7 1.6.9l.3 1.6h3l.3-1.6c.5-.2 1.1-.5 1.6-.9l1.7.7 1.5-2.6-1.4-1.1c0-.3.1-.7.1-1z" stroke="currentColor" stroke-width="1.3"/></svg></span><span class="sb-label">Settings</span></div></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-search"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,0.45)" stroke-width="1.4"/><path d="M11 11l3 3" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/></svg><input type="text" placeholder="Search"/><div class="kbd-wrap"><span class="kbd">Ctrl</span><span class="kbd">K</span></div></div>
      <div class="topbar-spacer"></div>
      <div class="topbar-btn"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1.5a5 5 0 015 5V10l1 2H2l1-2V6.5a5 5 0 015-5z" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 13.5a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3"/></svg><div class="notif-dot"></div></div>
      <div class="topbar-avatar" id="topbarAv">MA</div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="page-title">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.8" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Customers
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="showToast('Import coming soon')">Import</button>
          <button class="btn btn-secondary" onclick="showToast('More actions')">More actions <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
          <button class="btn btn-green" onclick="showToast('New customer form coming soon')">Add customer</button>
        </div>
      </div>

      <div class="stats-row">
        <strong id="custTotal">0</strong> customers &nbsp;<span>100% of your customer base</span>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#8c9196" stroke-width="1.4"/><path d="M11 11l3 3" stroke="#8c9196" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" placeholder="Search customers" oninput="searchCustomers(this.value)"/>
        </div>
        <div class="icon-btn" onclick="showToast('Column settings')"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="4" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="10" y="2" width="4" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/></svg></div>
        <div class="icon-btn" onclick="showToast('Sort options')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M3 7h8M5 11h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
      </div>

      <table>
        <thead>
          <tr>
            <th><input type="checkbox" style="accent-color:#303030"/></th>
            <th>Customer name</th>
            <th>Email subscription</th>
            <th>Email</th>
            <th>Location</th>
            <th>Orders</th>
            <th>Amount spent</th>
          </tr>
        </thead>
        <tbody id="custBody">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:#8c9196">Loading customers…</td></tr>
        </tbody>
      </table>

      <div class="pagination">
        <span id="pagCount">1–50 of 0</span>
        <button class="pag-btn" id="pagPrev" onclick="changePage(-1)" disabled><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2.5L4 6l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
        <button class="pag-btn" id="pagNext" onclick="changePage(1)" disabled><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5L8 6l-3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script>
let allCustomers = [], filteredCustomers = [];
let page = 1; const PAGE_SIZE = 50;

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

function renderTable(list) {
  const tbody = document.getElementById('custBody');
  const start = (page-1)*PAGE_SIZE;
  const slice = list.slice(start, start+PAGE_SIZE);
  document.getElementById('pagCount').textContent = list.length ? `${start+1}–${Math.min(start+PAGE_SIZE,list.length)} of ${list.length}` : '0';
  document.getElementById('pagPrev').disabled = page===1;
  document.getElementById('pagNext').disabled = start+PAGE_SIZE>=list.length;
  if (!slice.length) { tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:48px;color:#8c9196"><strong style="color:#303030;display:block;margin-bottom:6px">No customers yet</strong>When customers sign up or place orders, they'll appear here.</td></tr>`; return; }
  tbody.innerHTML = slice.map(c => {
    const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.email?.split('@')[0] || 'Unknown';
    const loc = [c.city, c.state, c.country].filter(Boolean).join(', ') || '';
    const sub = c.email_subscribed ? `<span class="badge b-green">Subscribed</span>` : c.email_subscribed === false ? `<span class="badge b-yellow">Unsubscribed</span>` : `<span style="color:#6d7175;font-size:12px">Not subscribed</span>`;
    return `<tr>
      <td onclick="event.stopPropagation()"><input type="checkbox" style="accent-color:#303030"/></td>
      <td style="font-weight:500;color:#303030">${name}</td>
      <td>${sub}</td>
      <td style="color:#6d7175">${c.email || ''}</td>
      <td style="color:#6d7175">${loc}</td>
      <td style="color:#6d7175">${c.order_count || 0} ${(c.order_count||0)===1?'order':'orders'}</td>
      <td style="font-weight:500">${Sivra.formatMoney(c.total_spent||0)}</td>
    </tr>`;
  }).join('');
}

function searchCustomers(q) {
  page=1;
  if (!q) { filteredCustomers=[...allCustomers]; return renderTable(filteredCustomers); }
  const ql=q.toLowerCase();
  filteredCustomers=allCustomers.filter(c=>{
    const n=[c.first_name,c.last_name].filter(Boolean).join(' ').toLowerCase();
    return n.includes(ql)||(c.email||'').toLowerCase().includes(ql);
  });
  renderTable(filteredCustomers);
}

function changePage(dir) { page+=dir; renderTable(filteredCustomers); }

function buildSidebar() {
  const nav=[
    {id:'home',label:'Home',href:'sivra-dashboard.html',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 6.5l6.5-5 6.5 5V14H10v-4H6v4H1.5V6.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>'},
    {id:'orders',label:'Orders',href:'sivra-orders.html',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 1.5h2.3l2.2 7.5h6.5l1.5-5H5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="13" r="1.2" fill="currentColor"/><circle cx="11.5" cy="13" r="1.2" fill="currentColor"/></svg>',children:['Drafts','Shipping labels','Abandoned checkouts']},
    {id:'products',label:'Products',href:'sivra-products.html',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L14 5v6L8 14.5 2 11V5L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>',children:['Collections','Inventory','Purchase orders','Transfers','Gift cards','Catalogs']},
    {id:'customers',label:'Customers',href:'sivra-customers.html',active:true,icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.8" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',children:['Segments','Companies']},
    {id:'content',label:'Content',href:'#',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="1.5" width="12" height="13" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 5.5h6M5 8.5h6M5 11.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',children:['Metaobjects','Files','Menus','Blog posts']},
    {id:'finance',label:'Finance',href:'#',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="4" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.3"/></svg>'},
    {id:'analytics',label:'Analytics',href:'#',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 12l3-4 3 2 3-5 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>',children:['Reports','Live View']},
    {id:'marketing',label:'Marketing',href:'#',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 10V6l10-4v12L2 10z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>'},
    {id:'discounts',label:'Discounts',href:'#',icon:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M5.5 4a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM13.5 12a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'},
  ];
  const C=`<span class="sb-caret"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 3l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>`;
  let h=nav.map(item=>{
    const open=item.active&&item.children;
    let s=`<div class="sb-item${item.active?' active':''}${open?' open':''}" onclick="sbClick(this,'${item.href}',${!!(item.children)})" data-id="${item.id}"><span class="sb-icon">${item.icon}</span><span class="sb-label">${item.label}</span>${item.children?C:''}</div>`;
    if(item.children) s+=`<div class="sb-sub${open?' open':''}" data-parent="${item.id}">${item.children.map(c=>`<a class="sb-sub-item" href="#">${c}</a>`).join('')}</div>`;
    return s;
  }).join('');
  h+=`<div class="sb-divider"></div><div class="sb-section">Sales channels ${C}</div><div class="sb-item" onclick="sbClick(this,'#',true)" data-id="online-store"><span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 5.5l1-3h11l1 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><rect x="1.5" y="5.5" width="13" height="8.5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg></span><span class="sb-label">Online Store</span>${C}</div><div class="sb-sub" data-parent="online-store"><a class="sb-sub-item" href="#">Themes</a><a class="sb-sub-item" href="#">Pages</a><a class="sb-sub-item" href="#">Preferences</a></div><div class="sb-divider"></div><div class="sb-section">Apps ${C}</div>`;
  document.getElementById('sbNav').innerHTML=h;
}
function sbClick(el,href,hasChildren){if(hasChildren){const s=document.querySelector(`.sb-sub[data-parent="${el.dataset.id}"]`);if(s){s.classList.toggle('open');el.classList.toggle('open');}if(href!=='#')location.href=href;}else if(href!=='#')location.href=href;}

(async function init(){
  buildSidebar();
  const session=await Sivra.requireAuth('sivra-login.html');
  if(!session)return;
  const name=[session.merchant?.firstName,session.merchant?.lastName].filter(Boolean).join(' ')||'MA';
  const initials=name.split(/\s+/).slice(0,2).map(v=>v[0]?.toUpperCase()||'').join('')||'MA';
  document.getElementById('topbarAv').textContent=initials;
  if(session.store?.name){document.getElementById('sbStoreName').textContent=session.store.name;document.getElementById('sbStoreAv').textContent=session.store.name[0];}
  try{
    const data=await Sivra.request('/api/customers?limit=500');
    allCustomers=data.customers||[];
    filteredCustomers=[...allCustomers];
    document.getElementById('custTotal').textContent=allCustomers.length.toLocaleString();
    renderTable(filteredCustomers);
  }catch(e){showToast('Failed to load customers');renderTable([]);}
})();
</script>
</body>
</html>
