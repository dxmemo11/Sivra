<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Customers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,450;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
/* ═══════════════════════════════════════════════
   SIVRA — Shopify Polaris Exact Clone
   Extracted from real Shopify admin DOM + CSS
   ═══════════════════════════════════════════════ */

/* Inter font — Shopify uses this */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap');

/* ── POLARIS DESIGN TOKENS ── */
:root {
  /* Colors */
  --p-color-bg: #f1f1f1;
  --p-color-bg-surface: #ffffff;
  --p-color-bg-surface-secondary: #f6f6f7;
  --p-color-bg-surface-tertiary: #f1f1f1;
  --p-color-bg-fill: #303030;
  --p-color-bg-fill-hover: rgba(0,0,0,0.06);
  --p-color-bg-fill-selected: rgba(0,0,0,0.09);
  --p-color-bg-fill-active: rgba(0,0,0,0.13);
  --p-color-bg-success: #d4edda;
  --p-color-bg-caution: #fff3cd;
  --p-color-bg-critical: #fde8e8;
  --p-color-bg-info: #e8f4fd;
  --p-color-text: #1a1a1a;
  --p-color-text-secondary: #6d7175;
  --p-color-text-disabled: #8c9196;
  --p-color-text-success: #1a7f37;
  --p-color-text-caution: #7d5c00;
  --p-color-text-critical: #c0392b;
  --p-color-text-info: #1458a2;
  --p-color-text-emphasis: #005bd3;
  --p-color-border: #e3e3e3;
  --p-color-border-secondary: #ebebeb;
  --p-color-border-emphasis: #005bd3;
  --p-color-icon: #6d7175;
  --p-color-icon-emphasis: #1a1a1a;

  /* Spacing (Shopify 4px base) */
  --p-space-0: 0px;
  --p-space-025: 1px;
  --p-space-050: 2px;
  --p-space-100: 4px;
  --p-space-150: 6px;
  --p-space-200: 8px;
  --p-space-300: 12px;
  --p-space-400: 16px;
  --p-space-500: 20px;
  --p-space-600: 24px;
  --p-space-800: 32px;
  --p-space-1000: 40px;

  /* Border radius */
  --p-border-radius-100: 4px;
  --p-border-radius-200: 8px;
  --p-border-radius-300: 12px;
  --p-border-radius-400: 16px;
  --p-border-radius-full: 9999px;

  /* Shadows */
  --p-shadow-100: 0px 1px 0px rgba(0,0,0,0.07);
  --p-shadow-200: 0px 3px 1px -1px rgba(0,0,0,0.07), 0px 0px 0px 1px rgba(0,0,0,0.08);
  --p-shadow-300: 0px 4px 6px -2px rgba(0,0,0,0.2);

  /* Typography */
  --p-font-family-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --p-font-size-75: 12px;
  --p-font-size-100: 13px;
  --p-font-size-200: 14px;
  --p-font-size-300: 16px;
  --p-font-size-400: 20px;
  --p-font-size-500: 24px;
  --p-font-weight-regular: 400;
  --p-font-weight-medium: 500;
  --p-font-weight-semibold: 600;
  --p-font-weight-bold: 700;
  --p-line-height-1: 1;
  --p-line-height-2: 1.25;
  --p-line-height-3: 1.5;

  /* Layout */
  --sidebar-w: 243px;
  --topbar-h: 56px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--p-font-family-sans);
  font-size: var(--p-font-size-100);
  font-weight: var(--p-font-weight-regular);
  line-height: var(--p-line-height-3);
  color: var(--p-color-text);
  background: var(--p-color-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ── APP SHELL ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ═══════════════════════════
   SIDEBAR — Polaris Navigation
   ═══════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--p-color-bg-surface-secondary);
  border-right: 1px solid var(--p-color-border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 10;
}

/* Brand / Logo row */
.sb-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 12px 8px;
  flex-shrink: 0;
}
.sb-brand-mark {
  width: 24px; height: 24px;
  background: #1a1a1a; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: white; flex-shrink: 0;
  letter-spacing: -0.5px;
}
.sb-brand-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }

/* Store switcher button */
.sb-store {
  display: flex; align-items: center; gap: 8px;
  margin: 0 6px 4px;
  padding: 5px 6px;
  border-radius: var(--p-border-radius-200);
  cursor: pointer;
  transition: background 0.1s;
}
.sb-store:hover { background: var(--p-color-bg-fill-hover); }
.sb-store-av {
  width: 22px; height: 22px; border-radius: 4px;
  background: #008060;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
}
.sb-store-name {
  flex: 1; font-size: 13px; font-weight: 500; color: #303030;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-store-caret { color: #8c9196; flex-shrink: 0; }

/* Nav scroll container */
.sb-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 2px 6px 8px;
}
.sb-scroll::-webkit-scrollbar { width: 0; }

/* Nav item — matches Polaris-Navigation__Item */
.sb-item {
  display: flex; align-items: center;
  min-height: 32px; padding: 4px 8px;
  border-radius: var(--p-border-radius-200);
  cursor: pointer;
  color: #303030;
  font-size: 13.5px;
  font-weight: 450;
  letter-spacing: -0.01em;
  gap: 10px;
  position: relative;
  transition: background 0.08s;
  user-select: none;
  margin-bottom: 1px;
}
.sb-item:hover { background: var(--p-color-bg-fill-hover); }
.sb-item.active {
  background: var(--p-color-bg-fill-selected);
  font-weight: 600;
}
/* Polaris active left bar */
.sb-item.active::before {
  content: '';
  position: absolute; left: -6px; top: 5px; bottom: 5px;
  width: 3px; background: #1a1a1a;
  border-radius: 0 3px 3px 0;
}
.sb-icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: #5c5f62;
}
.sb-item:hover .sb-icon,
.sb-item.active .sb-icon { color: #1a1a1a; }
.sb-label { flex: 1; }
.sb-badge {
  font-size: 11px; font-weight: 500; color: #6d7175;
  background: #e3e3e3; padding: 0 6px; border-radius: 20px;
  line-height: 18px;
}
.sb-caret { color: #8c9196; flex-shrink: 0; transition: transform 0.2s; }
.sb-item.open > .sb-caret { transform: rotate(90deg); }

/* Sub-items */
.sb-children { display: none; padding-left: 30px; }
.sb-children.open { display: block; }
.sb-child {
  display: block;
  padding: 4px 8px;
  height: 28px; line-height: 20px;
  border-radius: var(--p-border-radius-100);
  color: var(--p-color-text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.08s, color 0.08s;
  white-space: nowrap;
  margin-bottom: 1px;
}
.sb-child:hover { background: var(--p-color-bg-fill-hover); color: #303030; }
.sb-child.active { color: #303030; font-weight: 500; }

/* Section headers (Sales channels, Apps) */
.sb-section {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 8px 4px;
  font-size: 12px; font-weight: 600; color: var(--p-color-text-secondary);
  cursor: pointer; border-radius: var(--p-border-radius-100);
  transition: background 0.08s;
  user-select: none;
}
.sb-section:hover { background: var(--p-color-bg-fill-hover); }
.sb-divider { height: 1px; background: var(--p-color-border); margin: 4px -2px; }

/* Settings pinned at bottom */
.sb-bottom {
  flex-shrink: 0;
  padding: 4px 6px 8px;
  border-top: 1px solid var(--p-color-border);
}

/* ═══════════════════════════
   TOPBAR — Shopify black bar
   ═══════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: #1a1a1a;
  display: flex; align-items: center;
  padding: 0 10px 0 8px;
  gap: 6px; flex-shrink: 0;
}
.topbar-search {
  flex: 1; max-width: 380px;
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--p-border-radius-200);
  height: 34px; padding: 0 10px;
  cursor: text; transition: all 0.15s;
}
.topbar-search:focus-within {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
}
.topbar-search input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 13px; color: white; font-family: inherit;
}
.topbar-search input::placeholder { color: rgba(255,255,255,0.35); }
.kbd-hint { display: flex; gap: 2px; flex-shrink: 0; }
.kbd {
  font-size: 10px; color: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 3px; padding: 0px 4px; font-family: monospace;
}
.topbar-spacer { flex: 1; }
.topbar-btn {
  width: 34px; height: 34px; border-radius: var(--p-border-radius-200);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.65); cursor: pointer;
  transition: background 0.1s; position: relative; flex-shrink: 0;
  border: none; background: transparent;
}
.topbar-btn:hover { background: rgba(255,255,255,0.1); color: white; }
.notif-dot {
  position: absolute; top: 7px; right: 7px;
  width: 6px; height: 6px;
  background: #f44336; border-radius: 50%;
  border: 1.5px solid #1a1a1a;
}
.topbar-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #5b5fc7;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
  cursor: pointer; flex-shrink: 0;
}

/* ═══════════════════════════
   MAIN AREA
   ═══════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  background: var(--p-color-bg-surface);
}
.page-scroll {
  flex: 1; overflow-y: auto;
  background: var(--p-color-bg-surface);
}
.page-scroll::-webkit-scrollbar { width: 6px; }
.page-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

/* Page header */
.page-header {
  padding: 20px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.page-title {
  font-size: 20px; font-weight: 700; color: #1a1a1a;
  letter-spacing: -0.3px;
}
.page-body { padding: 16px 20px 40px; }

/* ═══════════════════════════
   POLARIS COMPONENTS
   ═══════════════════════════ */

/* Card */
.p-card {
  background: var(--p-color-bg-surface);
  border-radius: var(--p-border-radius-300);
  box-shadow: var(--p-shadow-200);
  overflow: hidden;
}
.p-card-section { padding: 16px; }
.p-card-section + .p-card-section { border-top: 1px solid var(--p-color-border); }

/* Buttons */
.p-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 14px;
  border-radius: var(--p-border-radius-200);
  font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; border: 1px solid transparent;
  white-space: nowrap; transition: all 0.1s; text-decoration: none;
  line-height: 1;
}
.p-btn-secondary {
  background: var(--p-color-bg-surface); 
  border-color: var(--p-color-border);
  color: #303030;
  box-shadow: var(--p-shadow-100);
}
.p-btn-secondary:hover { background: var(--p-color-bg-surface-secondary); border-color: #c9cccf; }
.p-btn-primary { background: #404040; color: white; border-color: #404040; }
.p-btn-primary:hover { background: #303030; }
.p-btn-success { background: #008060; color: white; border-color: #008060; }
.p-btn-success:hover { background: #006b50; }
.p-btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.p-btn-lg { height: 36px; padding: 0 18px; font-size: 14px; }
.p-btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }

/* Badge / Tag */
.p-badge {
  display: inline-flex; align-items: center;
  height: 20px; padding: 0 8px;
  border-radius: var(--p-border-radius-full);
  font-size: 11.5px; font-weight: 500; line-height: 1;
  white-space: nowrap;
}
.p-badge-default { background: #e3e3e3; color: #5c5f62; }
.p-badge-success { background: #cff0c4; color: #1a7f37; }
.p-badge-warning { background: #ffefc8; color: #7d5c00; }
.p-badge-critical { background: #fde8e8; color: #c0392b; }
.p-badge-info { background: #e1edff; color: #1458a2; }
.p-badge-attention { background: #fdf2cd; color: #7d5c00; }

/* Divider */
.p-divider { height: 1px; background: var(--p-color-border); }

/* Text styles */
.p-text-heading-xl { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; }
.p-text-heading-lg { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.p-text-heading-md { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
.p-text-heading-sm { font-size: 14px; font-weight: 600; }
.p-text-heading-xs { font-size: 13px; font-weight: 600; }
.p-text-body-md { font-size: 14px; font-weight: 400; }
.p-text-body-sm { font-size: 13px; font-weight: 400; }
.p-text-body-xs { font-size: 12px; font-weight: 400; }
.p-text-secondary { color: var(--p-color-text-secondary); }
.p-text-success { color: var(--p-color-text-success); }
.p-text-critical { color: var(--p-color-text-critical); }
.p-text-emphasis { color: var(--p-color-text-emphasis); }

/* Index / Table */
.p-index { width: 100%; border-collapse: collapse; }
.p-index thead th {
  padding: 8px 12px;
  font-size: 12px; font-weight: 600; color: var(--p-color-text-secondary);
  border-bottom: 1px solid var(--p-color-border);
  text-align: left; white-space: nowrap;
}
.p-index tbody tr {
  border-bottom: 1px solid var(--p-color-border-secondary);
  transition: background 0.08s; cursor: pointer;
}
.p-index tbody tr:hover { background: var(--p-color-bg-surface-secondary); }
.p-index tbody td {
  padding: 10px 12px;
  font-size: 13px; color: #303030;
  vertical-align: middle;
}
.p-index tbody td:first-child { color: var(--p-color-text-emphasis); font-weight: 500; }
.p-index .col-check { width: 40px; }
.p-index input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #303030; }

/* Filter/Search bar area */
.p-filters {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--p-color-border);
  flex-wrap: wrap;
}
.p-filter-input {
  flex: 1; min-width: 200px;
  display: flex; align-items: center; gap: 8px;
  background: var(--p-color-bg-surface);
  border: 1px solid var(--p-color-border);
  border-radius: var(--p-border-radius-200);
  height: 32px; padding: 0 10px;
  transition: border-color 0.15s;
}
.p-filter-input:focus-within { border-color: #005bd3; outline: 2px solid rgba(0,91,211,0.15); }
.p-filter-input input {
  flex: 1; border: none; outline: none; background: none;
  font-size: 13px; font-family: inherit; color: #303030;
}
.p-filter-input input::placeholder { color: var(--p-color-text-secondary); }

/* Tabs */
.p-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--p-color-border);
  padding: 0 16px; overflow-x: auto;
}
.p-tabs::-webkit-scrollbar { height: 0; }
.p-tab {
  padding: 10px 12px 9px;
  font-size: 13px; font-weight: 450; color: var(--p-color-text-secondary);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.1s, border-color 0.1s;
  margin-bottom: -1px;
}
.p-tab:hover { color: #303030; }
.p-tab.active { color: #303030; font-weight: 600; border-bottom-color: #303030; }

/* Empty state */
.p-empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 64px 32px; text-align: center; gap: 12px;
  color: var(--p-color-text-secondary);
}
.p-empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 4px; }

/* Form elements */
.p-label {
  display: block; font-size: 13px; font-weight: 500;
  color: #303030; margin-bottom: 4px;
}
.p-label-hint { font-size: 12px; color: var(--p-color-text-secondary); font-weight: 400; margin-bottom: 6px; }
.p-input {
  width: 100%;
  height: 36px; padding: 0 12px;
  background: var(--p-color-bg-surface);
  border: 1px solid var(--p-color-border);
  border-radius: var(--p-border-radius-200);
  font-size: 13px; font-family: inherit; color: #303030;
  transition: border-color 0.15s, box-shadow 0.15s; outline: none;
}
.p-input:focus { border-color: #005bd3; box-shadow: 0 0 0 3px rgba(0,91,211,0.15); }
.p-textarea {
  width: 100%; padding: 10px 12px;
  background: var(--p-color-bg-surface);
  border: 1px solid var(--p-color-border);
  border-radius: var(--p-border-radius-200);
  font-size: 13px; font-family: inherit; color: #303030;
  resize: vertical; min-height: 80px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.p-textarea:focus { border-color: #005bd3; box-shadow: 0 0 0 3px rgba(0,91,211,0.15); }
.p-select {
  height: 36px; padding: 0 32px 0 12px;
  background: var(--p-color-bg-surface) url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5l3 3 3-3' stroke='%236d7175' stroke-width='1.3' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 10px center;
  border: 1px solid var(--p-color-border);
  border-radius: var(--p-border-radius-200);
  font-size: 13px; font-family: inherit; color: #303030;
  cursor: pointer; outline: none; -webkit-appearance: none; appearance: none;
}
.p-select:focus { border-color: #005bd3; box-shadow: 0 0 0 3px rgba(0,91,211,0.15); }

/* Stack helpers */
.p-stack { display: flex; }
.p-stack-vertical { flex-direction: column; }
.p-gap-1 { gap: 4px; }
.p-gap-2 { gap: 8px; }
.p-gap-3 { gap: 12px; }
.p-gap-4 { gap: 16px; }
.p-gap-5 { gap: 20px; }
.p-align-center { align-items: center; }
.p-justify-between { justify-content: space-between; }
.p-wrap { flex-wrap: wrap; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #303030; color: white;
  padding: 9px 18px; border-radius: var(--p-border-radius-200);
  font-size: 13px; box-shadow: var(--p-shadow-300);
  opacity: 0; transition: all 0.2s; pointer-events: none;
  z-index: 9999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
  
</head>
<body>
<div class="app">
<script>document.addEventListener('DOMContentLoaded',()=>{if(typeof initSivra==='function')initSivra('customers');});</script>
<aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-mark">S</div>
      <span class="sb-brand-name">Sivra</span>
    </div>
    <div class="sb-store" onclick="sivraToast('Store switcher coming soon')">
      <div class="sb-store-av" id="sbStoreAv">S</div>
      <span class="sb-store-name" id="sbStoreName">My Store</span>
      <span class="sb-store-caret">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5.5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
    <div class="sb-scroll"><div id="sbNav"></div></div>
    <div class="sb-bottom">
      <div class="sb-item" onclick="location.href='sivra-settings.html'">
        <span class="sb-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">

<script>document.addEventListener('DOMContentLoaded',()=>{ if(typeof initSivra==='function') initSivra('home'); });
// SIVRA — Shopify-exact sidebar + topbar
// Include once. Call: initSivra('pageId')

const SIVRA_NAV = [
  { id:'home', label:'Home', href:'sivra-dashboard.html',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2.5L2.5 8.5V18h4.75v-5.5h5.5V18H17.5V8.5L10 2.5z"/></svg>' },
  { id:'orders', label:'Orders', href:'sivra-orders.html', badge:'sbOrderBadge',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3.5 2.5H5l.5 1.5m0 0L7 10h9.5l1.5-5H5.5m0 0h11M7 14a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm7 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>',
    children:['Drafts','Shipping labels','Abandoned checkouts'] },
  { id:'products', label:'Products', href:'sivra-products.html',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L18 6.5V13.5L10 18 2 13.5V6.5L10 2zm0 2.24L4 7.84l6 3.6 6-3.6L10 4.24zM4 9.44v4.12L9.25 16.5V12.38L4 9.44zm5.25 7.06L10 16.76l.75-.26V12.38L9.25 16.5zM10.75 16.5L16 13.56V9.44l-5.25 2.94v4.12z"/></svg>',
    children:['Collections','Inventory','Purchase orders','Transfers','Gift cards','Catalogs'] },
  { id:'customers', label:'Customers', href:'sivra-customers.html',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 11a4 4 0 100-8 4 4 0 000 8zm-7 7a7 7 0 1114 0H3z"/></svg>',
    children:['Segments','Companies'] },
  { id:'content', label:'Content', href:'#',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M4 2a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2H4zm1 4h10v1.5H5V6zm0 3h10v1.5H5V9zm0 3h7v1.5H5V12z"/></svg>',
    children:['Metaobjects','Files','Menus','Blog posts'] },
  { id:'finance', label:'Finance', href:'#',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v1H2V5zm0 3h16v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8zm3 3v2h2v-2H5zm4 0v2h2v-2H9z"/></svg>' },
  { id:'analytics', label:'Analytics', href:'#',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M2 16.5L6 10l3.5 4L13 7l5 9.5H2z"/></svg>',
    children:['Reports','Live View'] },
  { id:'marketing', label:'Marketing', href:'#',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3 11.5V9l11-5.5v13L3 11.5zm11 1.62V7.38L5.88 10 14 13.12zM3 9v2.5l2 1V8L3 9z"/></svg>' },
  { id:'discounts', label:'Discounts', href:'#',
    icon:'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="5.5" cy="5.5" r="2" fill="currentColor"/><circle cx="14.5" cy="14.5" r="2" fill="currentColor"/><path d="M3 17L17 3"/></svg>' },
];

const C = (cls='') => `<span class="sb-caret ${cls}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;

function buildSidebar(activeId) {
  const nav = document.getElementById('sbNav');
  if (!nav) return;

  let h = SIVRA_NAV.map(item => {
    const active = item.id === activeId;
    const hasKids = !!(item.children?.length);
    const open = active && hasKids;
    return `
      <div class="sb-item${active?' active':''}${open?' open':''}" data-id="${item.id}"
        onclick="sivraNav(this,'${item.href}',${hasKids})">
        <span class="sb-icon">${item.icon}</span>
        <span class="sb-label">${item.label}</span>
        ${item.badge ? `<span class="sb-badge" id="${item.badge}" style="display:none"></span>` : ''}
        ${hasKids ? C() : ''}
      </div>
      ${hasKids ? `<div class="sb-children${open?' open':''}" data-parent="${item.id}">
        ${item.children.map(c=>`<div class="sb-child" onclick="sivraToast('${c} coming soon')">${c}</div>`).join('')}
      </div>` : ''}`;
  }).join('');

  // Sales channels section
  h += `
    <div class="sb-divider"></div>
    <div class="sb-section" onclick="sivraToggle('sc-sub')">
      <span>Sales channels</span>${C()}
    </div>
    <div id="sc-sub" class="sb-children open" style="padding-left:0">
      <div class="sb-item${activeId==='online-store'?' active':''}" data-id="online-store" onclick="sivraNav(this,'#',true)">
        <span class="sb-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3 7l1.5-5h11L17 7H3zm0 0v10a1 1 0 001 1h12a1 1 0 001-1V7H3zm5 9v-5h4v5H8z"/></svg></span>
        <span class="sb-label">Online Store</span>${C()}
      </div>
      <div class="sb-children" data-parent="online-store">
        <div class="sb-child" onclick="sivraToast('Themes coming soon')">Themes</div>
        <div class="sb-child" onclick="sivraToast('Pages coming soon')">Pages</div>
        <div class="sb-child" onclick="sivraToast('Preferences coming soon')">Preferences</div>
      </div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section" onclick="sivraToast('App store coming soon')">
      <span>Apps</span>${C()}
    </div>`;

  nav.innerHTML = h;
}

function buildTopbar() {
  const tb = document.getElementById('sivraTopbar');
  if (!tb) return;
  tb.innerHTML = `
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="4.5" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"/>
        <path d="M10.5 10.5L14 14" stroke="rgba(255,255,255,0.38)" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search" onkeydown="if(event.key==='Escape')this.blur()"/>
      <div class="kbd-hint"><span class="kbd">Ctrl</span><span class="kbd">K</span></div>
    </div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="sivraToast('Store preview coming soon')">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="topbar-btn" onclick="sivraToast('Notifications')">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5a4.5 4.5 0 014.5 4.5v3.5l1.2 2H2.3L3.5 9.5V6A4.5 4.5 0 018 1.5z" stroke="currentColor" stroke-width="1.4"/>
        <path d="M6.5 12a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      <div class="notif-dot"></div>
    </button>
    <div class="topbar-avatar" id="topbarAvatar" onclick="sivraToast('Account')">MA</div>`;
}

function sivraNav(el, href, hasKids) {
  if (hasKids) {
    const sub = document.querySelector(`.sb-children[data-parent="${el.dataset.id}"]`);
    if (sub) { sub.classList.toggle('open'); el.classList.toggle('open'); }
  }
  if (href && href !== '#') location.href = href;
}

function sivraToggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function sivraToast(msg) {
  const t = document.getElementById('sivraToast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2500);
}

// Also alias showToast for backward compat
window.showToast = sivraToast;

function initSivra(activeId) {
  buildSidebar(activeId);
  buildTopbar();
  // Pull from session if available
  try {
    const s = Sivra?.getSession?.();
    if (!s) return;
    const name = [s.merchant?.firstName, s.merchant?.lastName].filter(Boolean).join(' ');
    const initials = (name || 'MA').split(/\s+/).slice(0,2).map(v=>v[0]?.toUpperCase()||'').join('');
    const av = document.getElementById('topbarAvatar');
    if (av) av.textContent = initials || 'MA';
    if (s.store?.name) {
      const sn = document.getElementById('sbStoreName');
      const sa = document.getElementById('sbStoreAv');
      if (sn) sn.textContent = s.store.name;
      if (sa) sa.textContent = s.store.name[0].toUpperCase();
    }
  } catch(e) {}
}


// app.js fallback — sidebar renders regardless
if (typeof Sivra === 'undefined') {
  window.Sivra = {
    requireAuth: async function(redirect) {
      // Try session first, then raw token
      var s = null;
      try { s = JSON.parse(localStorage.getItem('sivra_session') || 'null'); } catch(e) {}
      var token = (s && s.token) || localStorage.getItem('sivra_token');
      if (!token) {
        if (redirect) window.location.href = redirect;
        return null;
      }
      // Verify token is still valid by calling /api/auth/me
      try {
        var r = await fetch('/api/auth/me', {headers:{'Authorization':'Bearer '+token}});
        if (r.ok) {
          var me = await r.json();
          // Refresh session with latest data
          var freshSession = {token: token, merchant: me.merchant, store: me.store};
          localStorage.setItem('sivra_token', token);
          localStorage.setItem('sivra_session', JSON.stringify(freshSession));
          if (me.store && me.store.slug) localStorage.setItem('sivra_store_slug', me.store.slug);
          return freshSession;
        } else {
          // Token expired or invalid
          localStorage.removeItem('sivra_token');
          localStorage.removeItem('sivra_session');
          if (redirect) window.location.href = redirect;
          return null;
        }
      } catch(e) {
        // Network error — use cached session
        return s || {token: token, merchant: {firstName:'User'}, store: {name:'My Store'}};
      }
    },
    request: async (method, url, data) => {
      const token = localStorage.getItem('sivra_token');
      const opts = { method, headers: {'Content-Type':'application/json','Authorization':'Bearer '+token} };
      if (data) opts.body = JSON.stringify(data);
      const res = await fetch(url, opts);
      return res.ok ? res.json() : null;
    },
    getSession: () => {
      try { return JSON.parse(localStorage.getItem('sivra_session')||'null'); } catch(e) { return null; }
    }
  };
}
</script>
<script src="app.js" onerror="console.log('no app.js')"></script>
<script>
const TOKEN = (JSON.parse(localStorage.getItem('sivra_session')||'{}').token || localStorage.getItem('sivra_token'));
let _all = [], _orders = [], _tab = 'all';

function setTab(el, tab) {
  document.querySelectorAll('.p-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); _tab = tab; render();
}

function render() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  let list = _all;
  if (_tab==='repeat') list = list.filter(c=>c.orders_count>1);
  if (q) list = list.filter(c=>(c.email+' '+(c.first_name||'')+' '+(c.last_name||'')).toLowerCase().includes(q));
  const tbody = document.getElementById('tbody');
  document.getElementById('countEl').textContent = list.length + ' customer' + (list.length!==1?'s':'');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:64px">
      <div style="font-size:32px;margin-bottom:12px">👥</div>
      <div style="font-size:15px;font-weight:600;color:#303030;margin-bottom:6px">No customers yet</div>
      <div style="color:#6d7175;font-size:13px">Customers appear here when they place an order</div>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c => {
    const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || '—';
    const loc = [c.city, c.country].filter(Boolean).join(', ') || '—';
    const joined = c.created_at ? new Date(c.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const spent = c.total_spent ? '$'+parseFloat(c.total_spent).toFixed(2) : '$0.00';
    return `<tr onclick="openPanel('${c.id}')" style="cursor:pointer">
      <td class="col-check"><input type="checkbox" onclick="event.stopPropagation()"/></td>
      <td style="font-weight:500;color:#005bd3">${name}</td>
      <td style="color:#6d7175">${c.email||'—'}</td>
      <td style="color:#6d7175">${loc}</td>
      <td style="color:#6d7175">${c.orders_count||0}</td>
      <td style="font-weight:500">${spent}</td>
      <td style="color:#6d7175">${joined}</td>
    </tr>`;
  }).join('');
}

function openPanel(id) {
  const c = _all.find(c=>c.id===id);
  if (!c) return;
  document.getElementById('panelName').textContent = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.email;
  document.getElementById('panelEmail').textContent = c.email || '—';
  document.getElementById('panelLocation').textContent = [c.city, c.country].filter(Boolean).join(', ') || '—';
  document.getElementById('panelOrders').textContent = c.orders_count || 0;
  document.getElementById('panelSpent').textContent = c.total_spent ? '$'+parseFloat(c.total_spent).toFixed(2) : '$0.00';
  document.getElementById('panelJoined').textContent = c.created_at ? new Date(c.created_at).toLocaleDateString('en-AU',{dateStyle:'long'}) : '—';
  const custOrders = _orders.filter(o=>o.customer_id===id);
  document.getElementById('panelOrdersList').innerHTML = custOrders.length ? custOrders.map(o=>`
    <div style="display:flex;justify-content:space-between;padding:8px;background:#f9f9f9;border-radius:6px;font-size:13px;cursor:pointer" onclick="location.href='sivra-order-detail.html?id=${o.id}'">
      <span style="color:#005bd3">#${o.order_number}</span>
      <span style="color:#6d7175">${new Date(o.created_at).toLocaleDateString('en-AU')}</span>
      <span style="font-weight:500">$$${parseFloat(o.total||0).toFixed(2)}</span>
    </div>`).join('') : '<div style="font-size:13px;color:#8c9196">No orders yet</div>';
  document.getElementById('custPanel').style.display = '';
  document.getElementById('custOverlay').style.display = '';
}

function closePanel() {
  document.getElementById('custPanel').style.display = 'none';
  document.getElementById('custOverlay').style.display = 'none';
}

function exportCSV() {
  const rows = [['Name','Email','City','Country','Orders','Total Spent','Joined']];
  _all.forEach(c => rows.push([
    [c.first_name,c.last_name].filter(Boolean).join(' '),
    c.email||'', c.city||'', c.country||'',
    c.orders_count||0, c.total_spent||0,
    c.created_at?new Date(c.created_at).toLocaleDateString():''
  ]));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'customers.csv'; a.click();
}

async function init() {
  initSivra('customers');
  await Sivra.requireAuth('sivra-login.html');
  try {
    const [cData, oData] = await Promise.all([
      fetch('/api/customers', {headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json()),
      fetch('/api/orders', {headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json())
    ]);
    _all = cData.customers || [];
    _orders = oData.orders || [];
    
    // Calculate stats
    const total = _all.length;
    const returning = _all.filter(c=>c.orders_count>1).length;
    const spent = _orders.reduce((s,o)=>s+parseFloat(o.total||0),0);
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statReturning').textContent = returning;
    document.getElementById('statSpent').textContent = '$'+spent.toFixed(2);
    render();
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:48px;color:#c0392b">Error loading customers</td></tr>';
  }
}
init();
</script>
</body>
</html>
