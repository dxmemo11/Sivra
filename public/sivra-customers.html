<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Customers</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="page-header">
          <h1 class="page-title">Customers</h1>
          <div class="btn-group">
            <a href="sivra-customers-import.html" class="btn btn-secondary">Import CSV</a>
            <button class="btn btn-secondary" onclick="exportCSV(getExportRows(),'customers.csv');Toast.success('Exported')">Export</button>
          </div>
        </div>

        <div class="page-body">

          <!-- Stats -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
            <div class="stat-card">
              <div class="stat-label">Total customers</div>
              <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Repeat buyers</div>
              <div class="stat-value" id="statReturning">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total revenue</div>
              <div class="stat-value" id="statSpent">—</div>
            </div>
          </div>

          <div class="card">
            <div class="tabs">
              <div class="tab active" onclick="setTab(this,'all')">All customers</div>
              <div class="tab" onclick="setTab(this,'repeat')">Repeat buyers</div>
            </div>

            <div class="filter-bar">
              <div class="filter-search">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search by name, email" id="searchInput" oninput="render()"/>
              </div>
              <select class="sort-select" onchange="sortCustomers(this.value)">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="spent-desc">Highest spent</option>
                <option value="orders-desc">Most orders</option>
              </select>
            </div>

            <div style="overflow-x:auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th class="col-check"><input type="checkbox" onchange="toggleAllChecks(this.checked)"/></th>
                    <th>Customer</th>
                    <th>Email</th>
                    <th>Location</th>
                    <th class="cell-number">Orders</th>
                    <th class="cell-number">Total spent</th>
                    <th>Joined</th>
                  </tr>
                </thead>
                <tbody id="custBody">
                  <tr><td colspan="7" style="text-align:center;padding:48px">Loading...</td></tr>
                </tbody>
              </table>
            </div>

            <div class="pagination">
              <div class="pagination-info" id="paginationInfo">— customers</div>
              <div class="pagination-btns" id="paginationBtns"></div>
            </div>
          </div>
        </div>

        <!-- Customer detail drawer -->
        <div class="drawer" id="custDrawer">
          <div class="drawer-header">
            <span class="drawer-title" id="drawerName">Customer</span>
            <button class="modal-close" onclick="closeDrawer()">×</button>
          </div>
          <div class="drawer-body">
            <div class="section-stack">
              <div>
                <div class="form-label" style="margin-bottom:4px">EMAIL</div>
                <div style="font-size:13px" id="drawerEmail">—</div>
              </div>
              <div>
                <div class="form-label" style="margin-bottom:4px">LOCATION</div>
                <div style="font-size:13px" id="drawerLocation">—</div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="stat-card" style="cursor:default">
                  <div class="stat-label">Orders</div>
                  <div class="stat-value" id="drawerOrders">—</div>
                </div>
                <div class="stat-card" style="cursor:default">
                  <div class="stat-label">Total spent</div>
                  <div class="stat-value" id="drawerSpent">—</div>
                </div>
              </div>
              <div>
                <div class="form-label" style="margin-bottom:8px">RECENT ORDERS</div>
                <div id="drawerOrderList" class="section-stack"></div>
              </div>
              <div>
                <div class="form-label" style="margin-bottom:4px">JOINED</div>
                <div style="font-size:13px" id="drawerJoined">—</div>
              </div>
            </div>
          </div>
        </div>
        <div class="drawer-overlay" id="custOverlay" onclick="closeDrawer()"></div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('customers');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  let _all = [], _orders = [], _tab = 'all', _sort = 'newest', _page = 1;

  function setTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active'); _tab = tab; _page = 1; render();
  }
  function sortCustomers(v) { _sort = v; render(); }
  function toggleAllChecks(c) { document.querySelectorAll('.row-check').forEach(x => x.checked = c); }

  function filtered() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let list = [..._all];
    if (_tab === 'repeat') list = list.filter(c => c.orders_count > 1);
    if (q) list = list.filter(c =>
      (c.email||'').toLowerCase().includes(q) ||
      ((c.first_name||'')+' '+(c.last_name||'')).toLowerCase().includes(q)
    );
    switch(_sort) {
      case 'oldest':      list.sort((a,b) => new Date(a.created_at||0)-new Date(b.created_at||0)); break;
      case 'spent-desc':  list.sort((a,b) => parseFloat(b.total_spent||0)-parseFloat(a.total_spent||0)); break;
      case 'orders-desc': list.sort((a,b) => (b.orders_count||0)-(a.orders_count||0)); break;
      default:            list.sort((a,b) => new Date(b.created_at||0)-new Date(a.created_at||0));
    }
    return list;
  }

  function render() {
    const list = filtered();
    const paged = paginate(list, _page, 25);
    document.getElementById('paginationInfo').textContent = paged.total + ' customer' + (paged.total!==1?'s':'');

    const tbody = document.getElementById('custBody');
    if (!paged.items.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No customers yet</div><div class="empty-desc">Customers appear here when they place an order</div></div></td></tr>`;
      return;
    }

    tbody.innerHTML = paged.items.map(c => {
      const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || '—';
      const loc = [c.city, c.country].filter(Boolean).join(', ') || '—';
      return `<tr onclick="location.href='sivra-customer-detail.html?id=${c.id}'">
        <td class="col-check"><input type="checkbox" class="row-check" onclick="event.stopPropagation()"/></td>
        <td class="cell-primary">${name}</td>
        <td class="cell-muted">${c.email||'—'}</td>
        <td class="cell-muted">${loc}</td>
        <td class="cell-number cell-muted">${c.orders_count||0}</td>
        <td class="cell-number font-medium">${Fmt.money(c.total_spent||0)}</td>
        <td class="cell-muted">${Fmt.date(c.created_at)}</td>
      </tr>`;
    }).join('');

    const pBtn = document.getElementById('paginationBtns');
    let btns = '';
    if (paged.hasPrev) btns += `<button class="pagination-btn" onclick="_page--;render()">‹</button>`;
    for (let i=Math.max(1,_page-2);i<=Math.min(paged.totalPages,_page+2);i++)
      btns += `<button class="pagination-btn${i===_page?' active':''}" onclick="_page=${i};render()">${i}</button>`;
    if (paged.hasNext) btns += `<button class="pagination-btn" onclick="_page++;render()">›</button>`;
    pBtn.innerHTML = btns;
  }

  function openDrawer(id) {
    const c = _all.find(x => x.id === id);
    if (!c) return;
    const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.email;
    document.getElementById('drawerName').textContent = name;
    document.getElementById('drawerEmail').textContent = c.email||'—';
    document.getElementById('drawerLocation').textContent = [c.city,c.country].filter(Boolean).join(', ')||'—';
    document.getElementById('drawerOrders').textContent = c.orders_count||0;
    document.getElementById('drawerSpent').textContent = Fmt.money(c.total_spent||0);
    document.getElementById('drawerJoined').textContent = Fmt.date(c.created_at);
    const cOrders = _orders.filter(o => o.customer_id === id);
    document.getElementById('drawerOrderList').innerHTML = cOrders.length
      ? cOrders.slice(0,5).map(o => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:#f9f9f9;border-radius:8px;cursor:pointer;font-size:13px" onclick="location.href='sivra-order-detail.html?id=${o.id}'">
            <span class="text-emphasis font-medium">#${o.order_number}</span>
            <span class="text-muted">${Fmt.date(o.created_at)}</span>
            <span class="font-medium">${Fmt.money(o.total)}</span>
          </div>`).join('')
      : '<div class="text-muted text-sm">No orders yet</div>';
    document.getElementById('custDrawer').classList.add('open');
    document.getElementById('custOverlay').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('custDrawer').classList.remove('open');
    document.getElementById('custOverlay').classList.remove('open');
  }

  function getExportRows() {
    const rows = [['Name','Email','City','Country','Orders','Total Spent','Joined']];
    _all.forEach(c => rows.push([
      [c.first_name,c.last_name].filter(Boolean).join(' '), c.email||'',
      c.city||'', c.country||'', c.orders_count||0, c.total_spent||0,
      c.created_at?new Date(c.created_at).toLocaleDateString():''
    ]));
    return rows;
  }

  (async () => {
    try {
      const [cData, oData] = await Promise.all([API.get('/api/customers'), API.get('/api/orders')]);
      _all = cData.customers || [];
      _orders = oData.orders || [];
      const totalSpent = _orders.reduce((s,o) => s+parseFloat(o.total||0), 0);
      document.getElementById('statTotal').textContent = _all.length;
      document.getElementById('statReturning').textContent = _all.filter(c => c.orders_count > 1).length;
      document.getElementById('statSpent').textContent = Fmt.money(totalSpent);
      render();
    } catch(e) {
      document.getElementById('custBody').innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><button class="btn btn-secondary" onclick="location.reload()">Retry</button></div></td></tr>';
    }
  })();


  // Expose to global scope for onclick handlers
  if (typeof setTab === "function") window.setTab = setTab;
  if (typeof closeDrawer === "function") window.closeDrawer = closeDrawer;
  if (typeof exportCustomers === "function") window.exportCustomers = exportCustomers;
  if (typeof getExportRows === "function") window.getExportRows = getExportRows;
  if (typeof sortCustomers === "function") window.sortCustomers = sortCustomers;
  if (typeof toggleAllChecks === "function") window.toggleAllChecks = toggleAllChecks;
  if (typeof render === "function") window.render = render;
  // Fix pagination: expose _page to window so onclick can update it
  window._page = _page;
  const origRender = render;
  window.render = function() { _page = window._page; origRender(); window._page = _page; };
})();
</script>
</body>
</html>
