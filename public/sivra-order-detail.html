<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Order</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
          <a href="sivra-orders.html" class="breadcrumb-link">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Orders
          </a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current" id="crumbTitle">Order</span>
        </div>

        <div class="page-header" style="align-items:flex-start">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
              <h1 class="page-title" id="orderNum">Order</h1>
              <span id="payBadge"></span>
              <span id="fulfBadge"></span>
            </div>
            <div class="text-muted text-sm" id="orderDate" style="margin-top:4px"></div>
          </div>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="printOrder()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5V2h8v3M3 9H1V5h12v4h-2M3 9h8v3H3V9z" stroke="currentColor" stroke-width="1.3"/></svg>
              Print
            </button>
            <button class="btn btn-secondary" id="fulfillBtn" onclick="markFulfilled()">Mark as fulfilled</button>
            <button class="btn btn-primary" id="payBtn" onclick="markPaid()">Mark as paid</button>
          </div>
        </div>

        <div class="page-body">
          <div class="layout-2col">

            <!-- Left column -->
            <div class="section-stack">

              <!-- Items card -->
              <div class="card">
                <div class="card-header">
                  <div style="display:flex;align-items:center;gap:8px">
                    <span id="fulfillIcon">⏳</span>
                    <span class="card-title" id="fulfillLabel">Unfulfilled</span>
                  </div>
                </div>
                <div id="itemsList" style="padding:12px 16px">
                  <div class="skeleton skeleton-text w-100" style="margin-bottom:8px"></div>
                  <div class="skeleton skeleton-text w-75"></div>
                </div>
                <div class="card-footer" id="fulfillFooter">
                  <button class="btn btn-secondary" onclick="markFulfilled()">Fulfill items</button>
                </div>
              </div>

              <!-- Payment card -->
              <div class="card">
                <div class="card-header"><span class="card-title">Payment</span></div>
                <div style="padding:14px 16px">
                  <div style="display:flex;flex-direction:column;gap:8px">
                    <div style="display:flex;justify-content:space-between;font-size:13px">
                      <span class="text-muted">Subtotal</span>
                      <span id="pSubtotal">—</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:13px">
                      <span class="text-muted">Shipping</span>
                      <span id="pShipping">—</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:13px">
                      <span class="text-muted">Tax</span>
                      <span id="pTax">—</span>
                    </div>
                    <div class="divider"></div>
                    <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600">
                      <span>Total</span>
                      <span id="pTotal">—</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Timeline -->
              <div class="card">
                <div class="card-header"><span class="card-title">Timeline</span></div>
                <div style="padding:16px">
                  <div class="timeline" id="timeline">
                    <div class="skeleton skeleton-text w-75" style="margin-bottom:8px"></div>
                  </div>
                  <div style="margin-top:16px">
                    <textarea class="textarea" id="noteInput" placeholder="Leave a note..." style="min-height:60px;margin-bottom:8px"></textarea>
                    <button class="btn btn-secondary btn-sm" onclick="addNote()">Post note</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right column -->
            <div class="section-stack">

              <!-- Customer -->
              <div class="card">
                <div class="card-header"><span class="card-title">Customer</span></div>
                <div class="card-section">
                  <div class="font-semibold" style="font-size:13px;margin-bottom:2px" id="custName">—</div>
                  <div class="text-muted text-sm" id="custEmail">—</div>
                  <div class="text-muted text-sm" id="custOrderCount"></div>
                </div>
                <div class="card-section">
                  <div class="form-label" style="margin-bottom:6px">SHIPPING ADDRESS</div>
                  <div class="text-sm" id="shippingAddr" style="line-height:1.8;color:#303030">—</div>
                </div>
              </div>

              <!-- Notes -->
              <div class="card">
                <div class="card-header"><span class="card-title">Notes</span></div>
                <div class="card-section">
                  <div class="text-muted text-sm" id="orderNotes">No notes on this order.</div>
                </div>
              </div>

              <!-- Actions -->
              <div class="card">
                <div class="card-header"><span class="card-title">Actions</span></div>
                <div class="card-section" style="display:flex;flex-direction:column;gap:6px">
                  <button class="btn btn-secondary w-full" onclick="cancelOrder()" style="justify-content:flex-start;color:#c0392b">Cancel order</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('orders');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  const id = new URLSearchParams(location.search).get('id');
  let _order = null;

  function fmt(v) { return Fmt.money(v); }

  async function load() {
    if (!id) { location.href = 'sivra-orders.html'; return; }
    try {
      _order = await API.get('/api/orders/' + id);
      _order = _order.order || _order;
      render();
    } catch(e) { Toast.error('Failed to load order'); }
  }

  function render() {
    const o = _order;
    const num = '#' + (o.order_number || o.id?.slice(0,8).toUpperCase());
    document.getElementById('crumbTitle').textContent = num;
    document.getElementById('orderNum').textContent = num;
    document.getElementById('orderDate').textContent = Fmt.datetime(o.created_at);

    const payMap = {paid:'badge-success',unpaid:'badge-warning',pending:'badge-warning',refunded:'badge-default'};
    document.getElementById('payBadge').innerHTML = `<span class="badge ${payMap[o.payment_status]||'badge-default'}" style="text-transform:capitalize">${o.payment_status||'pending'}</span>`;
    document.getElementById('fulfBadge').innerHTML = `<span class="badge ${o.fulfillment_status==='fulfilled'?'badge-success':'badge-warning'}" style="text-transform:capitalize">${o.fulfillment_status||'unfulfilled'}</span>`;

    document.getElementById('fulfillIcon').textContent = o.fulfillment_status==='fulfilled' ? '✅' : '⏳';
    document.getElementById('fulfillLabel').textContent = o.fulfillment_status==='fulfilled' ? 'Fulfilled' : 'Unfulfilled';
    document.getElementById('fulfillBtn').style.display = o.fulfillment_status==='fulfilled' ? 'none' : '';
    document.getElementById('payBtn').style.display = o.payment_status==='paid' ? 'none' : '';
    document.getElementById('fulfillFooter').style.display = o.fulfillment_status==='fulfilled' ? 'none' : '';

    document.getElementById('pSubtotal').textContent = fmt(o.subtotal);
    document.getElementById('pShipping').textContent = fmt(o.shipping);
    document.getElementById('pTax').textContent = fmt(o.tax);
    document.getElementById('pTotal').textContent = fmt(o.total);

    const items = o.items || [];
    document.getElementById('itemsList').innerHTML = items.length
      ? items.map(item => `
          <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f6f6f7">
            <div class="table-thumb-placeholder" style="flex-shrink:0">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/></svg>
            </div>
            <div style="flex:1">
              <div class="font-medium" style="font-size:13px">${item.title||'Product'}</div>
              <div class="text-muted text-sm">Qty: ${item.quantity||1}</div>
            </div>
            <div class="font-medium" style="font-size:13px">${fmt(item.price)}</div>
          </div>`).join('')
      : '<div class="text-muted text-sm">No item details available</div>';

    const cName = o.shipping_name || 'Guest';
    document.getElementById('custName').textContent = cName;
    document.getElementById('custEmail').textContent = o.customer_email || '—';
    document.getElementById('shippingAddr').innerHTML = [
      o.shipping_addr, o.shipping_city, o.shipping_country
    ].filter(Boolean).join('<br>') || '—';

    if (o.notes) document.getElementById('orderNotes').textContent = o.notes;

    const date = Fmt.datetime(o.created_at);
    document.getElementById('timeline').innerHTML = `
      <div class="timeline-item">
        <div class="timeline-dot success">📦</div>
        <div class="timeline-content">
          <div class="timeline-title">Order placed</div>
          <div class="timeline-time">${date}</div>
        </div>
      </div>
      ${o.fulfillment_status==='fulfilled'?`<div class="timeline-item">
        <div class="timeline-dot success">✅</div>
        <div class="timeline-content">
          <div class="timeline-title">Order fulfilled</div>
        </div>
      </div>`:''}
      ${o.payment_status==='paid'?`<div class="timeline-item">
        <div class="timeline-dot success">💳</div>
        <div class="timeline-content">
          <div class="timeline-title">Payment received</div>
        </div>
      </div>`:''}`;
  }

  async function markFulfilled() {
    try {
      await API.patch('/api/orders/' + id, {fulfillment_status:'fulfilled'});
      _order.fulfillment_status = 'fulfilled'; render();
      Toast.success('Order fulfilled');
    } catch(e) { Toast.error(e.message); }
  }

  async function markPaid() {
    try {
      await API.patch('/api/orders/' + id, {payment_status:'paid'});
      _order.payment_status = 'paid'; render();
      Toast.success('Order marked as paid');
    } catch(e) { Toast.error(e.message); }
  }

  function addNote() {
    const txt = document.getElementById('noteInput').value.trim();
    if (!txt) return;
    const tl = document.getElementById('timeline');
    const div = document.createElement('div');
    div.className = 'timeline-item';
    div.innerHTML = `<div class="timeline-dot">💬</div>
      <div class="timeline-content">
        <div class="timeline-title">${txt}</div>
        <div class="timeline-time">Just now</div>
      </div>`;
    tl.appendChild(div);
    document.getElementById('noteInput').value = '';
    Toast.success('Note added');
  }

  function cancelOrder() {
    Modal.confirm('Cancel order', 'Are you sure you want to cancel this order? This action cannot be undone.', async () => {
      try {
        await API.patch('/api/orders/' + id, {status: 'cancelled'});
        Toast.success('Order cancelled');
        setTimeout(() => location.href = 'sivra-orders.html', 1000);
      } catch(e) { Toast.error(e.message); }
    }, { danger: true });
  }

  function printOrder() { window.print(); }

  load();

})();
</script>
</body>
</html>
