<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="description" id="metaDesc" content=""/>
  <meta property="og:title" id="ogTitle" content=""/>
  <meta property="og:description" id="ogDesc" content=""/>
  <meta property="og:image" id="ogImage" content=""/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;-webkit-font-smoothing:antialiased;color:#1a1a1a}
    a{text-decoration:none;color:inherit}
    button{font-family:inherit;cursor:pointer}

    /* Nav */
    .store-nav{background:white;border-bottom:1px solid #e3e3e3;position:sticky;top:0;z-index:100}
    .nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
    .nav-logo{font-size:18px;font-weight:700;color:#1a1a1a;cursor:pointer;white-space:nowrap}
    .nav-spacer{flex:1}
    .nav-btn{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6d7175;cursor:pointer;border:none;background:none;transition:all 0.1s;position:relative}
    .nav-btn:hover{background:#f6f6f7;color:#1a1a1a}

    /* Page */
    .page-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px;display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start}
    @media(max-width:768px){.page-wrap{grid-template-columns:1fr;padding:20px 16px}}

    /* Cart items */
    .cart-title{font-size:24px;font-weight:700;margin-bottom:20px}
    .cart-empty{text-align:center;padding:80px 24px;background:white;border-radius:12px;border:1px solid #e3e3e3}
    .cart-empty .icon{font-size:48px;margin-bottom:16px;opacity:0.3}
    .cart-empty h2{font-size:20px;font-weight:600;margin-bottom:8px}
    .cart-empty p{font-size:14px;color:#6d7175;margin-bottom:24px}

    .cart-item{display:flex;gap:14px;padding:16px;background:white;border-radius:10px;border:1px solid #e3e3e3;margin-bottom:8px;align-items:flex-start}
    .item-img{width:76px;height:76px;border-radius:8px;object-fit:cover;border:1px solid #e3e3e3;flex-shrink:0;background:#f6f6f7;display:flex;align-items:center;justify-content:center;color:#c9cccf;overflow:hidden}
    .item-img img{width:100%;height:100%;object-fit:cover}
    .item-body{flex:1;min-width:0}
    .item-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item-variant{font-size:12px;color:#6d7175;margin-bottom:8px}
    .item-price{font-size:14px;font-weight:600}
    .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
    .qty-ctrl{display:flex;align-items:center;border:1px solid #e3e3e3;border-radius:8px;overflow:hidden}
    .qty-btn{width:32px;height:32px;border:none;background:none;font-size:18px;cursor:pointer;color:#303030;display:flex;align-items:center;justify-content:center;transition:background 0.1s}
    .qty-btn:hover{background:#f6f6f7}
    .qty-num{width:36px;text-align:center;font-size:14px;font-weight:500}
    .item-remove{background:none;border:none;color:#8c9196;font-size:12px;cursor:pointer;padding:2px;transition:color 0.1s}
    .item-remove:hover{color:#c0392b}
    .item-total{font-size:14px;font-weight:700}

    /* Summary card */
    .summary-card{background:white;border-radius:12px;border:1px solid #e3e3e3;padding:20px;position:sticky;top:76px}
    .summary-title{font-size:16px;font-weight:700;margin-bottom:16px}
    .summary-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px;color:#6d7175}
    .summary-row.total{font-weight:700;font-size:17px;color:#1a1a1a;border-top:1px solid #e3e3e3;padding-top:12px;margin-top:4px}
    .summary-row.discount{color:var(--accent,#008060);font-weight:500}

    /* Discount input */
    .discount-row{display:flex;gap:8px;margin-bottom:16px}
    .discount-row input{flex:1;height:40px;padding:0 12px;border:1px solid #d1d1d1;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.15s}
    .discount-row input:focus{border-color:#1a1a1a}
    .discount-applied{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f0faf0;border:1px solid #b7e2c4;border-radius:8px;font-size:13px;color:#1a7f37;margin-bottom:16px}
    .discount-applied button{background:none;border:none;cursor:pointer;color:#6d7175;margin-left:auto;font-size:18px;line-height:1}

    /* Buttons */
    .btn-checkout{width:100%;height:50px;background:#1a1a1a;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-bottom:10px}
    .btn-checkout:hover{background:#303030}
    .btn-continue{width:100%;height:44px;background:none;border:1px solid #e3e3e3;color:#6d7175;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
    .btn-continue:hover{border-color:#1a1a1a;color:#1a1a1a}

    .trust-row{display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap}
    .trust-item{font-size:12px;color:#8c9196;display:flex;align-items:center;gap:4px}

    /* Footer */
    .store-footer{background:#1a1a1a;color:rgba(255,255,255,0.5);text-align:center;padding:20px;font-size:12px;margin-top:auto}
  </style>
</head>
<body>

<!-- Nav -->
<div id="annBar" style="display:none;text-align:center;padding:8px 16px;font-size:13px;font-weight:500;color:white;background:#1a1a1a"></div>
<nav class="store-nav">
  <div class="nav-inner">
    <span class="nav-logo" id="navLogo" onclick="goHome()">Store</span>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="goHome()" title="Continue shopping">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 7l7-5 7 5v9H2V7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
  </div>
</nav>

<div class="page-wrap">

  <!-- Left: Cart items -->
  <div>
    <h1 class="cart-title">Your cart <span id="cartQtyLabel" style="font-size:16px;font-weight:400;color:#6d7175"></span></h1>
    <div id="cartItems"></div>
  </div>

  <!-- Right: Summary -->
  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-title">Order summary</div>

    <!-- Discount code -->
    <div id="discountSection">
      <div id="discountForm" class="discount-row">
        <input id="discountInput" placeholder="Discount code or gift card" onkeydown="if(event.key==='Enter')applyDiscount()"/>
        <button onclick="applyDiscount()" style="height:40px;padding:0 14px;background:none;border:1px solid #d1d1d1;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.1s;font-family:inherit" onmouseover="this.style.borderColor='#1a1a1a'" onmouseout="this.style.borderColor='#d1d1d1'">Apply</button>
      </div>
      <div id="discountApplied" class="discount-applied" style="display:none">
        <span>🏷️</span>
        <span id="discountLabel">Discount applied</span>
        <button onclick="removeDiscount()">×</button>
      </div>
    </div>

    <div class="summary-row"><span>Subtotal</span><span id="subtotalDisplay">—</span></div>
    <div class="summary-row discount" id="discountRow" style="display:none"><span>Discount</span><span id="discountDisplay">—</span></div>
    <div class="summary-row"><span>Shipping</span><span style="color:#8c9196">Calculated at checkout</span></div>
    <div class="summary-row total"><span>Estimated total</span><span id="totalDisplay">—</span></div>

    <button class="btn-checkout" onclick="goCheckout()">Proceed to checkout →</button>
    <button class="btn-continue" onclick="goHome()">Continue shopping</button>

    <div class="trust-row">
      <span class="trust-item">🔒 Secure checkout</span>
      <span class="trust-item">↩️ Easy returns</span>
      <span class="trust-item">🚚 Fast delivery</span>
    </div>
  </div>
</div>

<footer class="store-footer">
  <span id="footerStore">Store</span> · Powered by Sivra
</footer>

<script>
  let _cart = [];
  let _discount = null;
  let _discountSavings = 0;
  let _storeSlug = '';

  function getCart() { try { return JSON.parse(localStorage.getItem('sivra_cart') || '[]'); } catch(e) { return []; } }
  function saveCart(c) { localStorage.setItem('sivra_cart', JSON.stringify(c)); }

  function fmtMoney(v) { return '$' + parseFloat(v || 0).toFixed(2); }

  function goHome() { location.href = 'sivra-storefront.html?store=' + _storeSlug; }
  function goCheckout() { location.href = 'sivra-checkout.html?store=' + _storeSlug; }

  async function init() {
    _storeSlug = new URLSearchParams(location.search).get('store') || localStorage.getItem('sivra_store_slug') || '';
    localStorage.setItem('sivra_store_slug', _storeSlug);
    _cart = getCart();

    // Load store branding
    try {
      const res = await fetch('/api/storefront/' + _storeSlug);
      const store = await res.json();
      const name = store.name || 'Store';
      document.getElementById('navLogo').textContent = name;
    // Load nav from saved menus
    try {
      const menuRes = await fetch('/api/storefront/' + _storeSlug + '/menus');
      const menuData = await menuRes.json();
      const navLinks = document.getElementById('navLinks');
      if (navLinks) {
        navLinks.querySelectorAll('.nav-dynamic').forEach(el => el.remove());
        const items = menuData.items || [];
        if (items.length) {
          items.forEach(item => {
            const a = document.createElement('a');
            a.href = 'javascript:void(0)';
            a.className = 'nav-link nav-dynamic';
            a.textContent = item.name;
            a.onclick = () => { if (item.url && item.url !== '#') location.href = item.url; };
            navLinks.appendChild(a);
          });
        }
      }
    } catch(e) {}
      document.getElementById('footerStore').textContent = name;
      document.title = 'Cart — ' + name;
      if (store.primary_color) document.documentElement.style.setProperty('--primary', store.primary_color);
      if (store.accent_color) document.documentElement.style.setProperty('--accent', store.accent_color);
    } catch(e) {}

    render();
  }

  function render() {
    const subtotal = _cart.reduce((s, i) => s + parseFloat(i.price || 0) * i.qty, 0);
    const total = Math.max(0, subtotal - _discountSavings);
    const totalQty = _cart.reduce((s, i) => s + i.qty, 0);

    document.getElementById('cartQtyLabel').textContent = totalQty > 0 ? `(${totalQty} item${totalQty !== 1 ? 's' : ''})` : '';

    const summaryCard = document.getElementById('summaryCard');
    const cartItemsEl = document.getElementById('cartItems');

    if (!_cart.length) {
      summaryCard.style.display = 'none';
      cartItemsEl.innerHTML = `<div class="cart-empty">
        <div class="icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p>Add some products to get started</p>
        <button onclick="goHome()" style="height:44px;padding:0 24px;background:#1a1a1a;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Browse products</button>
      </div>`;
      return;
    }

    summaryCard.style.display = '';

    cartItemsEl.innerHTML = _cart.map((item, i) => {
      const lineTotal = parseFloat(item.price || 0) * item.qty;
      const imgHtml = item.image
        ? `<img src="${item.image}" alt="${item.title}"/>`
        : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" opacity="0.2"><rect x="2" y="2" width="20" height="20" rx="3" stroke="#303030" stroke-width="2"/><path d="M2 16l5-5 4 4 5-7 6 8" stroke="#303030" stroke-width="2" stroke-linecap="round"/></svg>`;
      return `<div class="cart-item">
        <div class="item-img">${imgHtml}</div>
        <div class="item-body">
          <div class="item-title">${item.title}</div>
          ${item.variantTitle ? `<div class="item-variant">${item.variantTitle}</div>` : ''}
          <div class="item-price">${fmtMoney(item.price)} each</div>
        </div>
        <div class="item-right">
          <div class="item-total">${fmtMoney(lineTotal)}</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          </div>
          <button class="item-remove" onclick="removeItem(${i})">Remove</button>
        </div>
      </div>`;
    }).join('');

    // Update totals
    document.getElementById('subtotalDisplay').textContent = fmtMoney(subtotal);
    document.getElementById('totalDisplay').textContent = fmtMoney(total);
    if (_discountSavings > 0) {
      document.getElementById('discountRow').style.display = '';
      document.getElementById('discountDisplay').textContent = '−' + fmtMoney(_discountSavings);
    } else {
      document.getElementById('discountRow').style.display = 'none';
    }
  }

  function changeQty(idx, delta) {
    _cart[idx].qty = Math.max(1, _cart[idx].qty + delta);
    saveCart(_cart);
    render();
  }

  function removeItem(idx) {
    _cart.splice(idx, 1);
    saveCart(_cart);
    _discountSavings = 0;
    _discount = null;
    document.getElementById('discountApplied').style.display = 'none';
    document.getElementById('discountForm').style.display = '';
    render();
  }

  async function applyDiscount() {
    const code = document.getElementById('discountInput').value.trim();
    if (!code) return;
    const subtotal = _cart.reduce((s, i) => s + parseFloat(i.price || 0) * i.qty, 0);
    try {
      const res = await fetch(`/api/storefront/${_storeSlug}/discount/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, subtotal })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Invalid code'); return; }
      _discount = data.discount;
      _discountSavings = data.savings || 0;
      document.getElementById('discountForm').style.display = 'none';
      document.getElementById('discountApplied').style.display = '';
      document.getElementById('discountLabel').textContent = `${code} — ${_discount.type === 'free_shipping' ? 'Free shipping' : _discount.type === 'percentage' ? _discount.value + '% off' : '$' + parseFloat(_discount.value).toFixed(2) + ' off'}`;
      render();
    } catch(e) { showToast('Failed to validate code'); }
  }

  function removeDiscount() {
    _discount = null; _discountSavings = 0;
    document.getElementById('discountApplied').style.display = 'none';
    document.getElementById('discountForm').style.display = '';
    document.getElementById('discountInput').value = '';
    render();
  }

  function showToast(msg) {
    let el = document.getElementById('cartToast');
    if (!el) { el = document.createElement('div'); el.id = 'cartToast'; el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:white;padding:10px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;transition:all 0.2s;pointer-events:none;z-index:9999;font-family:Inter,sans-serif'; document.body.appendChild(el); }
    el.textContent = msg;
    el.style.opacity = '1'; el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(-50%) translateY(10px)'; }, 2500);
  }

  init();
</script>
</body>
</html>
