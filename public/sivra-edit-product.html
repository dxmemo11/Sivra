<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Edit product</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>
  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="breadcrumb">
          <a href="sivra-products.html" class="breadcrumb-link">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Products
          </a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current" id="crumbTitle">Edit product</span>
        </div>

        <div class="page-header">
          <h1 class="page-title" id="pageTitle">Edit product</h1>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="location.href='sivra-products.html'">Discard</button>
            <button class="btn btn-secondary" onclick="saveProduct('draft')">Save as draft</button>
            <button class="btn btn-primary" onclick="saveProduct()" id="saveBtn">Save</button>
          </div>
        </div>

        <div class="page-body">
          <div class="layout-2col-wide">

            <!-- LEFT -->
            <div class="section-stack">

              <div class="card">
                <div class="card-body section-stack">
                  <div class="form-group">
                    <label class="form-label">Title</label>
                    <input class="input" id="pTitle" placeholder="Product title"/>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="textarea" id="pDesc" style="min-height:160px"></textarea>
                  </div>
                </div>
              </div>

              <!-- Media -->
              <div class="card">
                <div class="card-header"><span class="card-title">Media</span></div>
                <div class="card-body">
                  <div id="mediaPreview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px"></div>
                  <div class="upload-zone" id="mediaZone" onclick="document.getElementById('mediaInput').click()" style="padding:20px">
                    <div class="upload-title">Add photos</div>
                    <div class="upload-hint">Click to browse</div>
                  </div>
                  <input type="file" id="mediaInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)"/>
                </div>
              </div>

              <!-- Pricing -->
              <div class="card">
                <div class="card-header"><span class="card-title">Pricing</span></div>
                <div class="card-body">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div class="form-group">
                      <label class="form-label">Price</label>
                      <div class="input-prefix"><span class="input-prefix-text">$</span>
                        <input type="number" id="pPrice" min="0" step="0.01"
                          style="flex:1;height:36px;padding:0 12px;border:none;outline:none;font-size:13px;font-family:inherit;background:none;color:#303030"/></div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Compare-at price</label>
                      <div class="input-prefix"><span class="input-prefix-text">$</span>
                        <input type="number" id="pCompare" min="0" step="0.01"
                          style="flex:1;height:36px;padding:0 12px;border:none;outline:none;font-size:13px;font-family:inherit;background:none;color:#303030"/></div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Inventory -->
              <div class="card">
                <div class="card-header"><span class="card-title">Inventory</span></div>
                <div class="card-body section-stack">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div class="form-group"><label class="form-label">SKU</label><input class="input" id="pSku"/></div>
                    <div class="form-group"><label class="form-label">Barcode</label><input class="input" id="pBarcode"/></div>
                  </div>
                  <label class="checkbox-label">
                    <input type="checkbox" id="pTrackQty" checked onchange="document.getElementById('qtySection').style.display=this.checked?'':'none'"/> Track quantity
                  </label>
                  <div id="qtySection">
                    <div class="form-group">
                      <label class="form-label">Quantity</label>
                      <input class="input" type="number" id="pQty" min="0" style="max-width:160px"/>
                    </div>
                  </div>
                </div>
              </div>

            </div>

            <!-- RIGHT -->
            <div class="section-stack">

              <!-- Status + actions -->
              <div class="card">
                <div class="card-header"><span class="card-title">Status</span></div>
                <div class="card-body section-stack">
                  <select class="select" id="pStatus">
                    <option value="active">Active</option>
                    <option value="draft">Draft</option>
                    <option value="archived">Archived</option>
                  </select>
                  <div style="display:flex;gap:8px">
                    <a id="storefrontLink" href="#" target="_blank" class="btn btn-secondary btn-full" style="justify-content:center">Preview on store</a>
                  </div>
                  <button class="btn btn-secondary btn-full" style="color:#c0392b;justify-content:center" onclick="deleteProduct()">Delete product</button>
                </div>
              </div>

              <!-- Insights -->
              <div class="card">
                <div class="card-header"><span class="card-title">Insights</span></div>
                <div class="card-body">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="stat-card" style="cursor:default;box-shadow:none;border:1px solid #e3e3e3">
                      <div class="stat-label">Total sales</div>
                      <div class="stat-value" id="insightSales">—</div>
                    </div>
                    <div class="stat-card" style="cursor:default;box-shadow:none;border:1px solid #e3e3e3">
                      <div class="stat-label">Times ordered</div>
                      <div class="stat-value" id="insightOrders">—</div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Organization -->
              <div class="card">
                <div class="card-header"><span class="card-title">Product organization</span></div>
                <div class="card-body section-stack">
                  <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="select" id="pCategory">
                      <option value="">— Select —</option>
                      <option value="fashion">Fashion & Apparel</option>
                      <option value="electronics">Electronics</option>
                      <option value="sports">Sports & Outdoors</option>
                      <option value="home">Home & Garden</option>
                      <option value="beauty">Health & Beauty</option>
                      <option value="food">Food & Beverage</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                  <div class="form-group"><label class="form-label">Product type</label><input class="input" id="pType"/></div>
                  <div class="form-group"><label class="form-label">Vendor</label><input class="input" id="pVendor"/></div>
                  <div class="form-group">
                    <label class="form-label">Tags</label>
                    <div class="tag-list" id="tagsContainer">
                      <input type="text" class="tag-input" id="tagInput" placeholder="Add tag" onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTag()}"/>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
(async function() {
  const session = await initAdmin('products');
  if (!session) return;
  
  const _id = new URLSearchParams(location.search).get('id');
  let _imgs = [];
  const _tags = [];
  let _product = null;

  // Image handling
  function handleFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 900;
          const scale = img.width > MAX ? MAX / img.width : 1;
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          _imgs.push(canvas.toDataURL('image/jpeg', 0.82));
          renderMedia();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function renderMedia() {
    const preview = document.getElementById('mediaPreview');
    const zone = document.getElementById('mediaZone');
    zone.style.display = '';
    if (!_imgs.length) { preview.innerHTML = ''; return; }
    preview.innerHTML = _imgs.map((src, i) => `
      <div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #e3e3e3">
        <img src="${src}" style="width:100%;height:100%;object-fit:cover"/>
        ${i===0?'<span style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);color:white;font-size:10px;text-align:center;padding:4px">Main</span>':''}
        <button onclick="_imgs.splice(${i},1);renderMedia()" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</button>
      </div>`).join('');
  }

  // Tags
  function addTag() {
    const input = document.getElementById('tagInput');
    const val = input.value.trim().replace(/,$/, '');
    if (!val || _tags.includes(val)) { input.value=''; return; }
    _tags.push(val);
    renderTags();
    input.value='';
  }
  function removeTag(tag) { _tags.splice(_tags.indexOf(tag),1); renderTags(); }
  function renderTags() {
    const container = document.getElementById('tagsContainer');
    const input = document.getElementById('tagInput');
    container.innerHTML='';
    _tags.forEach(tag => {
      const el = document.createElement('span');
      el.className='tag-item';
      el.innerHTML=`${tag}<button class="tag-remove" onclick="removeTag('${tag}')">×</button>`;
      container.appendChild(el);
    });
    container.appendChild(input);
  }

  async function load() {
    if (!_id) { location.href='sivra-products.html'; return; }
    try {
      _product = await API.get('/api/products/' + _id);
      _product = _product.product || _product;
      const p = _product;

      document.getElementById('crumbTitle').textContent = p.title||'Product';
      document.getElementById('pageTitle').textContent = p.title||'Product';
      document.getElementById('pTitle').value = p.title||'';
      document.getElementById('pDesc').value = p.description||'';
      document.getElementById('pPrice').value = p.price||'';
      document.getElementById('pCompare').value = p.compare_price||'';
      document.getElementById('pSku').value = p.sku||'';
      document.getElementById('pBarcode').value = p.barcode||'';
      document.getElementById('pQty').value = p.quantity||0;
      document.getElementById('pTrackQty').checked = p.track_qty !== 0;
      document.getElementById('pStatus').value = p.status||'active';
      document.getElementById('pCategory').value = p.category||'';
      document.getElementById('pType').value = p.type||p.product_type||'';
      document.getElementById('pVendor').value = p.vendor||'';

      // Images
      const imgs = Array.isArray(p.images) ? p.images : (p.images ? JSON.parse(p.images) : []);
      _imgs = [...imgs];
      renderMedia();

      // Tags
      if (p.tags) {
        p.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t => _tags.push(t));
        renderTags();
      }

      // Storefront link
      const slug2 = Auth.getSlug();
      document.getElementById('storefrontLink').href = `/sivra-product.html?id=${p.id}&store=${slug2}`;

      // Insights
      const oData = await API.get('/api/orders');
      const orders = oData.orders || [];
      let totalSales = 0, timesOrdered = 0;
      orders.forEach(o => (o.items||[]).forEach(i => {
        if (i.product_id === p.id) { totalSales += parseFloat(i.price||0)*parseInt(i.quantity||1); timesOrdered++; }
      }));
      document.getElementById('insightSales').textContent = Fmt.money(totalSales);
      document.getElementById('insightOrders').textContent = timesOrdered;
    } catch(e) { Toast.error('Failed to load product'); }
  }

  async function saveProduct(statusOverride) {
    const title = document.getElementById('pTitle').value.trim();
    const price = parseFloat(document.getElementById('pPrice').value);
    if (!title) { Toast.error('Product title is required'); return; }

    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saving...'; btn.disabled = true;

    try {
      const data = {
        title,
        description: document.getElementById('pDesc').value,
        price: isNaN(price) ? _product?.price || 0 : price,
        comparePrice: parseFloat(document.getElementById('pCompare').value) || null,
        sku: document.getElementById('pSku').value.trim() || null,
        barcode: document.getElementById('pBarcode').value.trim() || null,
        quantity: parseInt(document.getElementById('pQty').value) || 0,
        trackQty: document.getElementById('pTrackQty').checked,
        category: document.getElementById('pCategory').value || null,
        type: document.getElementById('pType').value || null,
        vendor: document.getElementById('pVendor').value || null,
        tags: _tags.join(','),
        status: statusOverride || document.getElementById('pStatus').value,
        images: _imgs,
      };
      await API.patch('/api/products/' + _id, data);
      Toast.success('Product updated');
      btn.textContent = 'Save'; btn.disabled = false;
    } catch(e) {
      Toast.error(e.message || 'Failed to save');
      btn.textContent = 'Save'; btn.disabled = false;
    }
  }

  function deleteProduct() {
    Modal.confirm('Delete product', `Delete "${_product?.title}"? This cannot be undone.`, async () => {
      try {
        await API.del('/api/products/' + _id);
        Toast.success('Product deleted');
        setTimeout(() => location.href = 'sivra-products.html', 800);
      } catch(e) { Toast.error(e.message); }
    }, { danger: true });
  }

  load();

})();
</script>
</body>
</html>
