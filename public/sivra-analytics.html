<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Analytics</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="page-header">
          <h1 class="page-title">Analytics</h1>
          <div class="btn-group">
            <select class="sort-select" id="periodSel" onchange="loadData(parseInt(this.value))" style="height:32px">
              <option value="7">Last 7 days</option>
              <option value="30" selected>Last 30 days</option>
              <option value="90">Last 90 days</option>
              <option value="365">Last year</option>
            </select>
            <button class="btn btn-secondary" onclick="exportReport()">Export</button>
          </div>
        </div>

        <div class="page-body">

          <!-- KPI row -->
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
            <div class="stat-card">
              <div class="stat-label">Total revenue</div>
              <div class="stat-value" id="aRevenue">—</div>
              <div class="stat-delta" id="aRevDelta"></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Orders</div>
              <div class="stat-value" id="aOrders">—</div>
              <div class="stat-delta" id="aOrdDelta"></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Avg. order value</div>
              <div class="stat-value" id="aAov">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Customers</div>
              <div class="stat-value" id="aCustomers">—</div>
            </div>
          </div>

          <!-- Chart -->
          <div class="card" style="margin-bottom:16px">
            <div class="card-header">
              <span class="card-title">Revenue over time</span>
              <div class="btn-group">
                <button class="btn btn-secondary btn-sm" id="cRevBtn" onclick="switchChart('revenue')" style="background:#f0f0f0">Revenue</button>
                <button class="btn btn-secondary btn-sm" id="cOrdBtn" onclick="switchChart('orders')">Orders</button>
              </div>
            </div>
            <div style="padding:16px"><canvas id="aChart" height="200"></canvas></div>
          </div>

          <!-- Bottom row -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="card">
              <div class="card-header">
                <span class="card-title">Top products</span>
                <a href="sivra-products.html" class="btn btn-plain btn-sm">View all</a>
              </div>
              <div id="topProds"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">Recent orders</span>
                <a href="sivra-orders.html" class="btn btn-plain btn-sm">View all</a>
              </div>
              <div id="recOrders"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('analytics');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  let _chart=null, _chartMode='revenue', _orders=[], _products=[];

  function switchChart(mode) {
    _chartMode = mode;
    document.getElementById('cRevBtn').style.background = mode==='revenue'?'#f0f0f0':'';
    document.getElementById('cOrdBtn').style.background = mode==='orders'?'#f0f0f0':'';
    drawChart(parseInt(document.getElementById('periodSel').value));
  }

  function drawChart(days) {
    const labels=[], data=[];
    const step = days <= 30 ? 1 : Math.ceil(days/20);
    for (let i=days-1;i>=0;i--) {
      if (i % step !== 0 && i !== 0) continue;
      const d=new Date(); d.setDate(d.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      const dayO=_orders.filter(o=>o.created_at&&o.created_at.startsWith(ds));
      labels.push(d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}));
      data.push(_chartMode==='revenue'?dayO.reduce((s,o)=>s+parseFloat(o.total||0),0):dayO.length);
    }
    if (_chart) _chart.destroy();
    _chart = new Chart(document.getElementById('aChart'),{
      type:'line',
      data:{labels,datasets:[{data,borderColor:'#1a1a1a',backgroundColor:'rgba(26,26,26,0.04)',borderWidth:2,tension:0.4,fill:true,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#1a1a1a'}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#303030',titleColor:'#fff',bodyColor:'#ccc',padding:8,cornerRadius:6,
          callbacks:{label:c=>_chartMode==='revenue'?'$'+c.raw.toFixed(2):c.raw+' orders'}}},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{color:'#8c9196',font:{size:11},maxTicksLimit:12}},
          y:{grid:{color:'rgba(0,0,0,0.04)'},border:{display:false},ticks:{color:'#8c9196',font:{size:11},callback:v=>_chartMode==='revenue'?'$'+v.toFixed(0):v}}
        }}
    });
  }

  async function loadData(days=30) {
    try {
      const [oData,pData,cData] = await Promise.all([API.get('/api/orders'),API.get('/api/products'),API.get('/api/customers')]);
      _orders=oData.orders||[]; _products=pData.products||[];
      const since=new Date(); since.setDate(since.getDate()-days);
      const period=_orders.filter(o=>o.created_at&&new Date(o.created_at)>=since);
      const rev=period.reduce((s,o)=>s+parseFloat(o.total||0),0);
      const aov=period.length?rev/period.length:0;
      document.getElementById('aRevenue').textContent=Fmt.money(rev);
      document.getElementById('aOrders').textContent=period.length;
      document.getElementById('aAov').textContent=Fmt.money(aov);
      document.getElementById('aCustomers').textContent=(cData.customers||[]).length;
      document.getElementById('aRevDelta').innerHTML=`<span class="text-muted">${_orders.length} orders all time</span>`;
      document.getElementById('aOrdDelta').innerHTML=`<span class="text-muted">${Fmt.money(_orders.reduce((s,o)=>s+parseFloat(o.total||0),0))} all time</span>`;

      // Top products by revenue
      const prodRev={};
      _orders.forEach(o=>(o.items||[]).forEach(i=>{
        prodRev[i.title]=(prodRev[i.title]||0)+parseFloat(i.price||0)*parseInt(i.quantity||1);
      }));
      const tops=Object.entries(prodRev).sort((a,b)=>b[1]-a[1]).slice(0,6);
      document.getElementById('topProds').innerHTML=tops.length
        ?tops.map(([t,r],i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f6f6f7">
            <span class="text-muted" style="width:16px;font-size:12px">${i+1}</span>
            <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</span>
            <span class="font-medium" style="font-size:13px">${Fmt.money(r)}</span>
          </div>`).join('')
        :`<div class="empty-state" style="padding:40px"><div class="empty-icon">📊</div><div class="empty-desc">No sales data yet</div></div>`;

      document.getElementById('recOrders').innerHTML=_orders.slice(0,6).length
        ?_orders.slice(0,6).map(o=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #f6f6f7;cursor:pointer" onclick="location.href='sivra-order-detail.html?id=${o.id}'">
            <span class="text-emphasis font-medium" style="font-size:13px;width:52px">#${o.order_number}</span>
            <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.shipping_name||'Guest'}</span>
            <span class="font-medium" style="font-size:13px">${Fmt.money(o.total)}</span>
          </div>`).join('')
        :`<div class="empty-state" style="padding:40px"><div class="empty-icon">🛒</div><div class="empty-desc">No orders yet</div></div>`;

      drawChart(days);
    } catch(e) { Toast.error('Failed to load analytics'); }
  }

  function exportReport() {
    const rows=[['Order #','Date','Customer','Total','Status']];
    _orders.forEach(o=>rows.push([o.order_number,Fmt.date(o.created_at),o.shipping_name||'Guest',o.total,o.payment_status]));
    exportCSV(rows,'orders-report.csv');
    Toast.success('Report exported');
  }

  loadData(30);

})();
</script>
</body>
</html>
