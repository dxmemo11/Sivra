<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Analytics</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .ana-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .ana-kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
    .ana-kpi{background:white;border:1px solid #e3e3e3;border-radius:10px;padding:16px 18px}
    .ana-kpi-label{font-size:12px;color:#6d7175;margin-bottom:6px}
    .ana-kpi-value{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
    .delta-up{color:#1a7f37;font-size:12px;font-weight:600}
    .delta-down{color:#c0392b;font-size:12px;font-weight:600}
    .ana-main-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;margin-bottom:16px}
    .ana-card{background:white;border:1px solid #e3e3e3;border-radius:10px;overflow:hidden}
    .ana-card-header{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:baseline;justify-content:space-between}
    .ana-card-title{font-size:12px;color:#6d7175}
    .ana-card-value{font-size:22px;font-weight:700;color:#1a1a1a}
    .ana-chart-body{padding:16px 18px;height:260px}
    .breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f6f6f7;font-size:13px}
    .breakdown-row:last-child{border-bottom:none;font-weight:700;padding-top:12px;border-top:2px solid #e3e3e3}
    .breakdown-label{color:#6d7175}
    .breakdown-label.link{color:#2563eb;cursor:pointer}
    .ana-bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .ana-three-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    .ana-table{width:100%;border-collapse:collapse}
    .ana-table th{padding:10px 14px;font-size:11px;font-weight:600;color:#6d7175;text-transform:uppercase;letter-spacing:0.4px;text-align:left;border-bottom:1px solid #e3e3e3;background:#f9f9f9}
    .ana-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f6f6f7}
    .ana-table tr:last-child td{border-bottom:none}
    .ana-bar{height:5px;background:#e3e3e3;border-radius:3px;margin-top:4px;overflow:hidden}
    .ana-bar-fill{height:100%;background:#3b82f6;border-radius:3px}
    .loading-shimmer{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:20px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .section-error{text-align:center;padding:20px;color:#8c9196;font-size:13px}
    .country-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #f6f6f7;font-size:13px}
    .country-name{font-weight:500;min-width:100px}
    .country-bar{flex:1;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
    .country-bar-fill{height:100%;background:#1a7f37;border-radius:2px}
    .country-count{color:#6d7175;min-width:60px;text-align:right}
    .country-rev{font-weight:600;min-width:70px;text-align:right}
  </style>
</head>
<body>
<div class="app">
<aside class="sidebar"><div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div></aside>
<div class="main">
  <div class="topbar" id="sivraTopbar"></div>
  <div class="page-scroll">
    <div style="max-width:1400px;margin:0 auto;padding:0 4px">

      <!-- Header -->
      <div class="ana-header">
        <h1 style="font-size:18px;font-weight:700;margin-right:8px">Analytics</h1>
        <!-- Quick presets -->
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="presetBtns">
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(1)" data-d="1" style="font-size:11px">Today</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(2)" data-d="2" style="font-size:11px">Yesterday</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(7)" data-d="7" style="font-size:11px">7d</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(14)" data-d="14" style="font-size:11px">14d</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(30)" data-d="30" style="font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a">30d</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(90)" data-d="90" style="font-size:11px">90d</button>
          <button class="btn btn-secondary btn-sm" onclick="setPeriod(365)" data-d="365" style="font-size:11px">1yr</button>
        </div>
        <!-- Custom date range -->
        <div style="display:flex;align-items:center;gap:6px;margin-left:8px">
          <input type="date" id="dateFrom" style="height:34px;border:1px solid #d1d1d1;border-radius:6px;padding:0 8px;font-size:12px;font-family:inherit;color:#303030" onchange="setCustomRange()"/>
          <span style="color:#8c9196;font-size:12px">to</span>
          <input type="date" id="dateTo" style="height:34px;border:1px solid #d1d1d1;border-radius:6px;padding:0 8px;font-size:12px;font-family:inherit;color:#303030" onchange="setCustomRange()"/>
        </div>
        <span style="font-size:12px;color:#8c9196;margin-left:8px" id="lastRefreshed"></span>
        <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="exportReport()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export CSV
        </button>
      </div>

      <!-- KPI strip — 5 cards now including sessions + conversion -->
      <div class="ana-kpi-grid">
        <div class="ana-kpi">
          <div class="ana-kpi-label">Total sales</div>
          <div class="ana-kpi-value" id="kpiRevenue"><div class="loading-shimmer" style="width:80px"></div></div>
          <div id="kpiRevDelta"></div>
        </div>
        <div class="ana-kpi">
          <div class="ana-kpi-label">Orders</div>
          <div class="ana-kpi-value" id="kpiOrders"><div class="loading-shimmer" style="width:50px"></div></div>
          <div id="kpiOrdDelta"></div>
        </div>
        <div class="ana-kpi">
          <div class="ana-kpi-label">Sessions</div>
          <div class="ana-kpi-value" id="kpiSessions"><div class="loading-shimmer" style="width:50px"></div></div>
          <div id="kpiSessDelta" style="font-size:11px;color:#8c9196">from tracking</div>
        </div>
        <div class="ana-kpi">
          <div class="ana-kpi-label">Conversion rate</div>
          <div class="ana-kpi-value" id="kpiConversion"><div class="loading-shimmer" style="width:50px"></div></div>
          <div id="kpiConvDelta" style="font-size:11px;color:#8c9196">sessions → orders</div>
        </div>
        <div class="ana-kpi">
          <div class="ana-kpi-label">Avg. order value</div>
          <div class="ana-kpi-value" id="kpiAov"><div class="loading-shimmer" style="width:60px"></div></div>
          <div id="kpiAovDelta"></div>
        </div>
      </div>

      <!-- Main chart + breakdown -->
      <div class="ana-main-grid">
        <div class="ana-card">
          <div class="ana-card-header">
            <div>
              <div class="ana-card-title">Total sales over time</div>
              <div style="display:flex;align-items:baseline;gap:8px;margin-top:4px">
                <span class="ana-card-value" id="totalSalesValue">—</span>
                <span id="totalSalesDelta"></span>
              </div>
            </div>
            <div style="display:flex;gap:6px">
              <button id="btnRevChart" onclick="switchChart('revenue')" class="btn btn-secondary btn-sm" style="font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a">Revenue</button>
              <button id="btnOrdChart" onclick="switchChart('orders')" class="btn btn-secondary btn-sm" style="font-size:11px">Orders</button>
              <button id="btnSessChart" onclick="switchChart('sessions')" class="btn btn-secondary btn-sm" style="font-size:11px">Sessions</button>
            </div>
          </div>
          <div class="ana-chart-body">
            <canvas id="mainChart"></canvas>
          </div>
        </div>
        <div class="ana-card">
          <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600">Sales breakdown</div>
          <div id="breakdownRows"><div class="loading-shimmer" style="margin:16px;height:120px"></div></div>
        </div>
      </div>

      <!-- Countries + Traffic Sources -->
      <div class="ana-bottom-grid">
        <div class="ana-card">
          <div style="padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#6d7175;font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Sales by country</div>
          <div id="countryRows" style="max-height:300px;overflow-y:auto">
            <div class="loading-shimmer" style="margin:12px;height:80px"></div>
          </div>
        </div>
        <div class="ana-card">
          <div style="padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#6d7175;font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Traffic sources</div>
          <div id="sourceRows" style="max-height:300px;overflow-y:auto">
            <div class="loading-shimmer" style="margin:12px;height:80px"></div>
          </div>
        </div>
      </div>

      <!-- Top products + customers + discounts -->
      <div class="ana-three-grid">
        <div class="ana-card">
          <div style="padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#6d7175;font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Top products</div>
          <div id="topProductsSection"><div class="loading-shimmer" style="margin:12px;height:80px"></div></div>
        </div>
        <div class="ana-card">
          <table class="ana-table">
            <thead><tr><th>Top customers</th><th style="text-align:right">Orders</th><th style="text-align:right">Spent</th></tr></thead>
            <tbody id="topCustomersBody"><tr><td colspan="3"><div class="loading-shimmer" style="height:60px;margin:8px"></div></td></tr></tbody>
          </table>
        </div>
        <div class="ana-card">
          <table class="ana-table">
            <thead><tr><th>Discount codes</th><th style="text-align:right">Uses</th><th style="text-align:right">Savings</th></tr></thead>
            <tbody id="discountUsageBody"><tr><td colspan="3"><div class="loading-shimmer" style="height:60px;margin:8px"></div></td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
</div>

<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
let _mainChart = null, _chartMode = 'revenue', _salesData = [], _days = 30, _trafficData = null;
let _customFrom = null, _customTo = null;

function setPeriod(d) {
  _days = d;
  _customFrom = null;
  _customTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  // Highlight active preset
  document.querySelectorAll('#presetBtns button').forEach(function(btn) {
    var isActive = parseInt(btn.dataset.d) === d;
    btn.style.cssText = 'font-size:11px' + (isActive ? ';background:#1a1a1a;color:white;border-color:#1a1a1a' : '');
  });
  loadAll();
}

function setCustomRange() {
  var from = document.getElementById('dateFrom').value;
  var to = document.getElementById('dateTo').value;
  if (from && to) {
    _customFrom = from;
    _customTo = to;
    // Calculate days between
    var diff = Math.ceil((new Date(to) - new Date(from)) / 86400000) + 1;
    _days = Math.max(1, diff);
    // Unhighlight presets
    document.querySelectorAll('#presetBtns button').forEach(function(btn) {
      btn.style.cssText = 'font-size:11px';
    });
    loadAll();
  }
}

function getDelta(pct) {
  if (pct === undefined || pct === null) return '';
  const up = pct >= 0;
  return `<span class="${up ? 'delta-up' : 'delta-down'}">${up ? '↑' : '↓'} ${Math.abs(pct)}%</span> <span style="font-size:11px;color:#8c9196">vs prev</span>`;
}

function switchChart(mode) {
  _chartMode = mode;
  ['Rev','Ord','Sess'].forEach(m => {
    const btn = document.getElementById('btn'+m+'Chart');
    if(btn) btn.style.cssText = mode === {Rev:'revenue',Ord:'orders',Sess:'sessions'}[m]
      ? 'font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a' : 'font-size:11px';
  });
  document.getElementById('btnRevChart').style.cssText = mode==='revenue' ? 'font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a' : 'font-size:11px';
  document.getElementById('btnOrdChart').style.cssText = mode==='orders' ? 'font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a' : 'font-size:11px';
  document.getElementById('btnSessChart').style.cssText = mode==='sessions' ? 'font-size:11px;background:#1a1a1a;color:white;border-color:#1a1a1a' : 'font-size:11px';
  drawChart();
}

function drawChart() {
  const ctx = document.getElementById('mainChart');
  if (!ctx) return;
  if (_mainChart) _mainChart.destroy();

  const labels = _salesData.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
  });

  let data, label, color, prefix;
  if (_chartMode === 'sessions' && _trafficData?.views_over_time) {
    // Match traffic data to sales dates
    const trafficMap = {};
    _trafficData.views_over_time.forEach(t => { trafficMap[t.date] = t; });
    data = _salesData.map(d => trafficMap[d.date]?.sessions || 0);
    label = 'Sessions'; color = '#8b5cf6'; prefix = '';
  } else if (_chartMode === 'orders') {
    data = _salesData.map(d => parseInt(d.orders || 0));
    label = 'Orders'; color = '#f59e0b'; prefix = '';
  } else {
    data = _salesData.map(d => parseFloat(d.revenue || 0));
    label = 'Revenue'; color = '#3b82f6'; prefix = '$';
  }

  const total = data.reduce((s, v) => s + v, 0);
  document.getElementById('totalSalesValue').textContent = prefix ? Fmt.money(total) : total + ' ' + label.toLowerCase();

  _mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data, borderColor: color,
        backgroundColor: color + '10',
        borderWidth: 2, tension: 0.4, fill: true,
        pointRadius: _salesData.length <= 31 ? 3 : 0,
        pointBackgroundColor: color,
        pointHoverRadius: 5, pointHoverBackgroundColor: color,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a', titleColor: '#fff', bodyColor: '#ccc',
          padding: 10, cornerRadius: 8, displayColors: false,
          callbacks: { label: c => label + ': ' + (prefix ? Fmt.money(c.raw) : c.raw) }
        }
      },
      scales: {
        x: { grid: { display: false }, border: { display: false }, ticks: { color: '#8c9196', font: { size: 11 }, maxTicksLimit: 12 } },
        y: { grid: { color: 'rgba(0,0,0,0.04)' }, border: { display: false }, beginAtZero: true, ticks: { color: '#8c9196', font: { size: 11 }, callback: v => prefix ? '$' + v.toFixed(0) : v } }
      }
    }
  });
}

function renderBreakdown(finance) {
  const rows = [
    { label: 'Gross sales', val: finance.gross_sales || 0 },
    { label: 'Discounts', val: -(finance.total_discounts || 0), red: true },
    { label: 'Returns', val: -(finance.total_refunded || 0), red: true },
    { label: 'Net sales', val: finance.net_sales || 0, bold: true },
    { label: 'Shipping', val: finance.shipping_revenue || 0 },
    { label: 'Tax', val: finance.tax_collected || 0 },
    { label: 'Total sales', val: (finance.gross_sales||0) - (finance.total_discounts||0) - (finance.total_refunded||0) + (finance.shipping_revenue||0) + (finance.tax_collected||0), bold: true, total: true },
  ];
  document.getElementById('breakdownRows').innerHTML = rows.map(r => `
    <div class="breakdown-row" style="${r.total ? 'border-top:2px solid #e3e3e3;margin-top:4px;' : ''}">
      <span class="breakdown-label" style="${r.bold ? 'color:#303030;font-weight:600;' : ''}">${r.label}</span>
      <span style="font-weight:${r.bold ? '700' : '500'};color:${r.red && r.val < 0 ? '#c0392b' : '#303030'}">
        ${r.val < 0 ? '-' + Fmt.money(Math.abs(r.val)) : Fmt.money(r.val)}
      </span>
    </div>`).join('');
}

function renderCountries(orders) {
  const el = document.getElementById('countryRows');
  // Aggregate by country from order shipping data
  const countries = {};
  (orders || []).forEach(o => {
    const country = o.shipping_country || 'Unknown';
    if (!countries[country]) countries[country] = { orders: 0, revenue: 0 };
    countries[country].orders++;
    countries[country].revenue += parseFloat(o.total || 0);
  });
  const sorted = Object.entries(countries).sort((a,b) => b[1].revenue - a[1].revenue);
  if (!sorted.length) {
    el.innerHTML = '<div class="section-error">No country data yet — will populate from order shipping addresses</div>';
    return;
  }
  const maxRev = sorted[0][1].revenue || 1;
  el.innerHTML = sorted.map(([country, data]) => `
    <div class="country-row">
      <span class="country-name">${country}</span>
      <div class="country-bar"><div class="country-bar-fill" style="width:${Math.round(data.revenue/maxRev*100)}%"></div></div>
      <span class="country-count">${data.orders} orders</span>
      <span class="country-rev">${Fmt.money(data.revenue)}</span>
    </div>`).join('');
}

function renderSources(trafficData) {
  const el = document.getElementById('sourceRows');
  if (!trafficData || !trafficData.referrers || !trafficData.referrers.length) {
    el.innerHTML = '<div class="section-error">No traffic source data yet — add <code>&lt;script src="storefront-tracker.js"&gt;&lt;/script&gt;</code> to storefront pages</div>';
    return;
  }
  const maxSess = trafficData.referrers[0]?.sessions || 1;
  el.innerHTML = trafficData.referrers.map(r => `
    <div class="country-row">
      <span class="country-name">${r.source || 'direct'}</span>
      <div class="country-bar"><div class="country-bar-fill" style="width:${Math.round((r.sessions||0)/maxSess*100)}%;background:#3b82f6"></div></div>
      <span class="country-count">${r.sessions || 0} sessions</span>
      <span class="country-rev">${r.views || 0} views</span>
    </div>`).join('');
}

function renderTopProducts(products) {
  const el = document.getElementById('topProductsSection');
  if (!products.length) {
    el.innerHTML = '<div class="section-error">No sales data yet</div>';
    return;
  }
  const maxRev = Math.max(...products.map(p => parseFloat(p.revenue || 0)), 1);
  el.innerHTML = products.map(p => {
    const pct = Math.round(parseFloat(p.revenue || 0) / maxRev * 100);
    return `<div style="padding:10px 14px;border-bottom:1px solid #f6f6f7">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${Fmt.truncate(p.title || '—', 30)}</span>
        <span style="font-size:13px;font-weight:700;flex-shrink:0">${Fmt.money(p.revenue || 0)}</span>
      </div>
      <div class="ana-bar"><div class="ana-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:#8c9196;margin-top:2px">${p.units_sold || 0} units · ${p.order_count || 0} orders</div>
    </div>`;
  }).join('');
}

async function loadAll() {
  document.getElementById('lastRefreshed').textContent = 'Loading...';

  var daysParam = _days;
  var dateParams = _customFrom ? '&from=' + _customFrom + '&to=' + _customTo : '';

  const safe = async (fn) => { try { return await fn(); } catch(e) { console.error('Analytics error:', e.message); return null; } };

  const [overview, salesData, finance, topProds, topCusts, discounts, trafficData, allOrders] = await Promise.all([
    safe(() => API.get('/api/analytics/overview?days=' + daysParam + dateParams)),
    safe(() => API.get('/api/analytics/sales-over-time?days=' + daysParam + dateParams)),
    safe(() => API.get('/api/analytics/finance?days=' + daysParam + dateParams)),
    safe(() => API.get('/api/analytics/top-products?days=' + daysParam + '&limit=8' + dateParams)),
    safe(() => API.get('/api/analytics/top-customers?days=' + daysParam + '&limit=6' + dateParams)),
    safe(() => API.get('/api/analytics/discounts?days=' + daysParam + dateParams)),
    safe(() => API.get('/api/track/traffic?days=' + daysParam + dateParams)),
    safe(() => API.get('/api/orders?limit=500&sort=newest')),
  ]);

  _trafficData = trafficData;

  document.getElementById('lastRefreshed').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  // ── KPIs ──────────────────────────────────────────
  if (overview) {
    document.getElementById('kpiRevenue').textContent = Fmt.money(overview.revenue?.value || 0);
    document.getElementById('kpiOrders').textContent = overview.orders?.value || 0;
    document.getElementById('kpiAov').textContent = Fmt.money(overview.aov?.value || 0);
    document.getElementById('kpiRevDelta').innerHTML = getDelta(overview.revenue?.change_pct);
    document.getElementById('kpiOrdDelta').innerHTML = getDelta(overview.orders?.change_pct);
    document.getElementById('kpiAovDelta').innerHTML = getDelta(overview.aov?.change_pct);
  } else {
    ['kpiRevenue','kpiOrders','kpiAov'].forEach(id => { document.getElementById(id).textContent = '0'; });
  }

  // Sessions + conversion from tracker
  if (trafficData) {
    const sessions = trafficData.total_sessions || 0;
    const orders = overview?.orders?.value || 0;
    const convRate = sessions > 0 ? ((orders / sessions) * 100).toFixed(1) : '0.0';
    document.getElementById('kpiSessions').textContent = sessions.toLocaleString();
    document.getElementById('kpiConversion').textContent = convRate + '%';
    document.getElementById('kpiSessDelta').textContent = (trafficData.unique_visitors || 0) + ' unique visitors';
    document.getElementById('kpiConvDelta').textContent = orders + ' of ' + sessions + ' sessions';
  } else {
    document.getElementById('kpiSessions').textContent = '—';
    document.getElementById('kpiConversion').textContent = '—';
    document.getElementById('kpiSessDelta').innerHTML = '<span style="color:#c0392b;font-size:10px">tracker not active</span>';
    document.getElementById('kpiConvDelta').textContent = 'needs storefront-tracker.js';
  }

  // ── CHART ─────────────────────────────────────────
  if (salesData?.data) {
    _salesData = salesData.data;
    drawChart();
  } else {
    document.getElementById('totalSalesValue').textContent = '$0.00';
  }

  // ── BREAKDOWN ─────────────────────────────────────
  if (finance) {
    renderBreakdown(finance);
  } else if (overview) {
    renderBreakdown({
      gross_sales: overview.gross_sales || overview.revenue?.value || 0,
      total_discounts: overview.total_discounts || 0,
      total_refunded: overview.total_refunded || 0,
      net_sales: overview.net_sales || overview.revenue?.value || 0,
      shipping_revenue: overview.shipping_revenue || 0,
      tax_collected: overview.tax_collected || 0,
    });
  } else {
    document.getElementById('breakdownRows').innerHTML = '<div class="section-error">No data</div>';
  }

  // ── COUNTRIES ─────────────────────────────────────
  renderCountries(allOrders?.orders || []);

  // ── TRAFFIC SOURCES ───────────────────────────────
  renderSources(trafficData);

  // ── TOP PRODUCTS ──────────────────────────────────
  renderTopProducts(topProds?.products || []);

  // ── TOP CUSTOMERS ─────────────────────────────────
  const custBody = document.getElementById('topCustomersBody');
  const custs = topCusts?.customers || [];
  custBody.innerHTML = custs.length ? custs.map(c => `<tr>
    <td>
      <div style="font-weight:500">${[c.first_name, c.last_name].filter(Boolean).join(' ') || c.email || 'Guest'}</div>
      <div style="font-size:11px;color:#8c9196">${c.email || ''}</div>
    </td>
    <td style="text-align:right;color:#6d7175">${c.order_count || 0}</td>
    <td style="text-align:right;font-weight:600">${Fmt.money(c.total_spent || 0)}</td>
  </tr>`).join('') : '<tr><td colspan="3" class="section-error">No customer data yet</td></tr>';

  // ── DISCOUNTS ─────────────────────────────────────
  const discBody = document.getElementById('discountUsageBody');
  const discs = discounts?.discounts || [];
  discBody.innerHTML = discs.length ? discs.map(d => `<tr>
    <td><code style="font-family:monospace;font-size:12px;font-weight:700;background:#f6f6f7;padding:2px 6px;border-radius:4px">${d.discount_code || d.code || '—'}</code></td>
    <td style="text-align:right;color:#6d7175">${d.orders_count || d.uses || 0}</td>
    <td style="text-align:right;font-weight:600;color:#1a7f37">-${Fmt.money(d.total_savings || 0)}</td>
  </tr>`).join('') : '<tr><td colspan="3" class="section-error">No discount usage yet</td></tr>';
}

function exportReport() {
  if (!_salesData.length) { Toast.error('No data to export'); return; }
  const rows = [['Date', 'Revenue', 'Orders', 'Gross Sales']];
  _salesData.forEach(d => rows.push([d.date, parseFloat(d.revenue || 0).toFixed(2), d.orders || 0, parseFloat(d.gross || 0).toFixed(2)]));
  exportCSV(rows, 'analytics-' + new Date().toISOString().split('T')[0] + '.csv');
  Toast.success('Report exported');
}

(async function() {
  const session = await initAdmin('analytics');
  if (!session) return;
  loadAll();
})();
</script>
</body>
