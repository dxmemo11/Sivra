<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Orders</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>
<div class="main">
  <div class="topbar" id="sivraTopbar"></div>
  <div class="page-scroll">
    <div style="max-width:1280px;margin:0 auto">

      <div class="page-header">
        <h1 class="page-title">Orders</h1>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="exportOrders()">Export</button>
          <a href="sivra-draft-orders.html" class="btn btn-secondary">Create order</a>
        </div>
      </div>

      <div class="page-body">

        <!-- Bulk action bar -->
        <div id="bulkBar" style="display:none;background:#1a1a1a;color:white;padding:10px 16px;border-radius:8px;margin-bottom:10px;display:none;align-items:center;gap:12px">
          <span id="bulkCount" style="font-size:13px;font-weight:600"></span> selected
          <button onclick="bulkMarkPaid()" class="btn btn-secondary btn-sm" style="background:rgba(255,255,255,0.15);color:white;border:none">Mark as paid</button>
          <button onclick="bulkFulfill()" class="btn btn-secondary btn-sm" style="background:rgba(255,255,255,0.15);color:white;border:none">Mark fulfilled</button>
          <button onclick="bulkCancel()" class="btn btn-secondary btn-sm" style="background:rgba(220,38,38,0.3);color:white;border:none">Cancel</button>
          <button onclick="clearBulk()" style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:18px">×</button>
        </div>

        <div class="card">
          <!-- Tabs -->
          <div class="tabs">
            <div class="tab active" onclick="setTab(this,'all')">All</div>
            <div class="tab" onclick="setTab(this,'unfulfilled')">Unfulfilled</div>
            <div class="tab" onclick="setTab(this,'fulfilled')">Fulfilled</div>
            <div class="tab" onclick="setTab(this,'paid')">Paid</div>
            <div class="tab" onclick="setTab(this,'unpaid')">Unpaid</div>
            <div class="tab" onclick="setTab(this,'cancelled')">Cancelled</div>
          </div>

          <!-- Filter bar -->
          <div class="filter-bar">
            <div class="filter-search">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
              <input type="text" placeholder="Search orders, customers, emails..." id="searchInput" oninput="_page=1;render()"/>
            </div>
            <select class="sort-select" onchange="_sort=this.value;render()">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="total-desc">Total: High to Low</option>
              <option value="total-asc">Total: Low to High</option>
            </select>
          </div>

          <!-- Table -->
          <div style="overflow-x:auto">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="col-check">
                    <input type="checkbox" id="checkAll" onchange="toggleAll(this.checked)"/>
                  </th>
                  <th>Order</th>
                  <th>Date</th>
                  <th>Customer</th>
                  <th class="cell-number">Total</th>
                  <th>Payment</th>
                  <th>Fulfillment</th>
                  <th class="cell-number">Items</th>
                  <th>Location</th>
                </tr>
              </thead>
              <tbody id="ordersBody">
                <tr><td colspan="9" style="text-align:center;padding:48px;color:#8c9196">Loading orders...</td></tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="pagination">
            <div class="pagination-info" id="paginationInfo"></div>
            <div class="pagination-buttons" id="paginationBtns"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
(async function() {
  const session = await initAdmin('orders');
  if (!session) return;

  let _all = [], _tab = 'all', _sort = 'newest', _page = 1;
  const PER_PAGE = 25;

  // ── TABS ──────────────────────────────────────────────────────────────────
  function setTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    _tab = tab; _page = 1; render();
  }

  // ── BULK SELECTION ────────────────────────────────────────────────────────
  function toggleAll(checked) {
    document.querySelectorAll('.row-check').forEach(c => c.checked = checked);
    updateBulkBar();
  }

  function updateBulkBar() {
    const checked = document.querySelectorAll('.row-check:checked');
    const bar = document.getElementById('bulkBar');
    document.getElementById('bulkCount').textContent = checked.length;
    bar.style.display = checked.length > 0 ? 'flex' : 'none';
  }

  function clearBulk() {
    document.querySelectorAll('.row-check').forEach(c => c.checked = false);
    document.getElementById('checkAll').checked = false;
    document.getElementById('bulkBar').style.display = 'none';
  }

  function getSelectedIds() {
    return Array.from(document.querySelectorAll('.row-check:checked'))
      .map(c => c.dataset.id)
      .filter(Boolean);
  }

  // ── BULK ACTIONS ─────────────────────────────────────────────────────────
  async function bulkMarkPaid() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    try {
      for (const id of ids) {
        await API.patch('/api/orders/' + id, { payment_status: 'paid' });
        const o = _all.find(x => x.id === id);
        if (o) o.payment_status = 'paid';
      }
      clearBulk(); render();
      Toast.success(`${ids.length} order${ids.length!==1?'s':''} marked as paid`);
    } catch(e) { Toast.error(e.message || 'Failed'); }
  }

  async function bulkFulfill() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    try {
      for (const id of ids) {
        await API.post('/api/orders/' + id + '/fulfill', {});
        const o = _all.find(x => x.id === id);
        if (o) o.fulfillment_status = 'fulfilled';
      }
      clearBulk(); render();
      Toast.success(`${ids.length} order${ids.length!==1?'s':''} marked as fulfilled`);
    } catch(e) { Toast.error(e.message || 'Failed'); }
  }

  async function bulkCancel() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    Modal.confirm(
      'Cancel orders',
      `Cancel ${ids.length} order${ids.length!==1?'s':''}? Stock will be restocked.`,
      async () => {
        try {
          for (const id of ids) {
            await API.post('/api/orders/' + id + '/cancel', { reason: 'other', restock: true });
            const o = _all.find(x => x.id === id);
            if (o) o.status = 'cancelled';
          }
          clearBulk(); render();
          Toast.success(`${ids.length} order${ids.length!==1?'s':''} cancelled`);
        } catch(e) { Toast.error(e.message || 'Failed'); }
      },
      { danger: true }
    );
  }

  // ── FILTER / SORT ─────────────────────────────────────────────────────────
  function filtered() {
    const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = [..._all];

    if (_tab === 'unfulfilled') list = list.filter(o => (o.fulfillment_status||'unfulfilled') === 'unfulfilled' && o.status !== 'cancelled');
    if (_tab === 'fulfilled')   list = list.filter(o => o.fulfillment_status === 'fulfilled');
    if (_tab === 'paid')        list = list.filter(o => o.payment_status === 'paid');
    if (_tab === 'unpaid')      list = list.filter(o => (o.payment_status === 'pending' || o.payment_status === 'unpaid') && o.status !== 'cancelled');
    if (_tab === 'cancelled')   list = list.filter(o => o.status === 'cancelled');

    if (q) list = list.filter(o =>
      (o.order_number + '').includes(q) ||
      (o.shipping_name||'').toLowerCase().includes(q) ||
      (o.customer_email||'').toLowerCase().includes(q)
    );

    switch(_sort) {
      case 'oldest':     list.sort((a,b) => new Date(a.created_at||0) - new Date(b.created_at||0)); break;
      case 'total-desc': list.sort((a,b) => parseFloat(b.total||0) - parseFloat(a.total||0)); break;
      case 'total-asc':  list.sort((a,b) => parseFloat(a.total||0) - parseFloat(b.total||0)); break;
      default:           list.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
    }
    return list;
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function render() {
    const list = filtered();
    const total = list.length;
    const totalPages = Math.ceil(total / PER_PAGE);
    const start = (_page - 1) * PER_PAGE;
    const items = list.slice(start, start + PER_PAGE);

    document.getElementById('paginationInfo').textContent =
      total === 0 ? '' : `${start + 1}–${Math.min(start + PER_PAGE, total)} of ${total} order${total!==1?'s':''}`;

    const tbody = document.getElementById('ordersBody');

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="9">
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <div class="empty-title">${_all.length === 0 ? 'No orders yet' : 'No orders match your filters'}</div>
          <div class="empty-desc">${_all.length === 0 ? 'Orders will appear here when customers complete checkout' : 'Try clearing your search or switching tabs'}</div>
        </div>
      </td></tr>`;
      document.getElementById('paginationBtns').innerHTML = '';
      return;
    }

    tbody.innerHTML = items.map(o => {
      const num = '#' + o.order_number;
      const customer = o.shipping_name || o.customer_email || 'Guest';

      // Payment badge
      const payMap = { paid:'badge-success', unpaid:'badge-warning', pending:'badge-warning', refunded:'badge-default', voided:'badge-default' };
      const payBadge = `<span class="badge ${payMap[o.payment_status]||'badge-warning'}" style="text-transform:capitalize">${o.payment_status||'pending'}</span>`;

      // Fulfillment badge
      const fulfMap = { fulfilled:'badge-success', unfulfilled:'badge-warning', partial:'badge-info', restocked:'badge-default' };
      const fulfBadge = `<span class="badge ${fulfMap[o.fulfillment_status]||'badge-warning'}" style="text-transform:capitalize">${o.fulfillment_status||'unfulfilled'}</span>`;

      const isCancelled = o.status === 'cancelled';

      return `<tr onclick="location.href='sivra-order-detail.html?id=${o.id}'" style="${isCancelled?'opacity:0.5':''}">
        <td class="col-check">
          <input type="checkbox" class="row-check" data-id="${o.id}"
            onclick="event.stopPropagation();updateBulkBar()"
          />
        </td>
        <td class="cell-primary" style="font-family:monospace;letter-spacing:0.3px">${num}</td>
        <td class="cell-muted">${Fmt.date(o.created_at)}</td>
        <td>
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${Fmt.truncate(customer, 28)}</div>
          ${o.customer_email && o.shipping_name ? `<div class="text-muted text-sm">${o.customer_email}</div>` : ''}
        </td>
        <td class="cell-number font-medium">${Fmt.money(o.total)}</td>
        <td>${isCancelled ? '<span class="badge badge-default">Cancelled</span>' : payBadge}</td>
        <td>${isCancelled ? '—' : fulfBadge}</td>
        <td class="cell-number cell-muted">${o.items_count || '—'}</td>
        <td class="cell-muted">${o.shipping_city || (o.shipping_country || '—')}</td>
      </tr>`;
    }).join('');

    // Pagination buttons
    const pBtn = document.getElementById('paginationBtns');
    if (totalPages <= 1) { pBtn.innerHTML = ''; return; }
    let btns = '';
    if (_page > 1) btns += `<button class="pagination-btn" onclick="_page--;render()">‹ Prev</button>`;
    for (let i = Math.max(1, _page - 2); i <= Math.min(totalPages, _page + 2); i++) {
      btns += `<button class="pagination-btn${i === _page ? ' active' : ''}" onclick="_page=${i};render()">${i}</button>`;
    }
    if (_page < totalPages) btns += `<button class="pagination-btn" onclick="_page++;render()">Next ›</button>`;
    pBtn.innerHTML = btns;
  }

  // ── EXPORT ────────────────────────────────────────────────────────────────
  function exportOrders() {
    const rows = [['Order #','Date','Customer','Email','Total','Payment','Fulfillment','City','Country']];
    _all.forEach(o => rows.push([
      '#' + o.order_number,
      Fmt.date(o.created_at),
      o.shipping_name || '',
      o.customer_email || '',
      parseFloat(o.total||0).toFixed(2),
      o.payment_status || 'pending',
      o.fulfillment_status || 'unfulfilled',
      o.shipping_city || '',
      o.shipping_country || '',
    ]));
    exportCSV(rows, 'orders.csv');
    Toast.success('Orders exported');
  }

  // ── LOAD ──────────────────────────────────────────────────────────────────
  try {
    const data = await API.get('/api/orders?limit=500');
    _all = data.orders || [];
    render();

    // Update sidebar badge with unfulfilled count
    const unfulfilled = _all.filter(o =>
      (o.fulfillment_status === 'unfulfilled' || !o.fulfillment_status) &&
      o.status !== 'cancelled'
    ).length;
    const badge = document.getElementById('sbOrderBadge');
    if (badge && unfulfilled > 0) {
      badge.textContent = unfulfilled > 99 ? '99+' : unfulfilled;
      badge.style.display = 'flex';
    }
  } catch(e) {
    document.getElementById('ordersBody').innerHTML = `<tr><td colspan="9">
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load orders</div>
        <div class="empty-desc">${e.message || 'Please try refreshing the page'}</div>
        <button class="btn btn-secondary" onclick="location.reload()">Retry</button>
      </div>
    </td></tr>`;
    Toast.error('Failed to load orders');
  }


  // Expose to global scope for onclick handlers
  if (typeof bulkFulfill === "function") window.bulkFulfill = bulkFulfill;
  if (typeof clearBulk === "function") window.clearBulk = clearBulk;
  if (typeof bulkMarkPaid === "function") window.bulkMarkPaid = bulkMarkPaid;
  if (typeof setTab === "function") window.setTab = setTab;
  if (typeof bulkCancel === "function") window.bulkCancel = bulkCancel;
  if (typeof exportOrders === "function") window.exportOrders = exportOrders;
  if (typeof toggleAll === "function") window.toggleAll = toggleAll;
})();
</script>
</body>
</html>
