<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Orders</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="page-header">
          <h1 class="page-title">Orders</h1>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="exportOrders()">Export</button>
            <button class="btn btn-secondary" onclick="location.href='sivra-draft-orders.html'">Create order</button>
          </div>
        </div>

        <div class="page-body">
          <div class="card">

            <!-- Tabs -->
            <div class="tabs">
              <div class="tab active" onclick="setTab(this,'all')">All</div>
              <div class="tab" onclick="setTab(this,'unfulfilled')">Unfulfilled</div>
              <div class="tab" onclick="setTab(this,'fulfilled')">Fulfilled</div>
              <div class="tab" onclick="setTab(this,'paid')">Paid</div>
              <div class="tab" onclick="setTab(this,'unpaid')">Unpaid</div>
            </div>

            <!-- Bulk bar -->
            <div class="bulk-bar" id="bulkBar">
              <span><span class="bulk-count" id="bulkCount">0</span> selected</span>
              <button class="btn btn-secondary btn-sm" onclick="bulkFulfill()">Mark fulfilled</button>
              <button class="btn btn-secondary btn-sm" onclick="bulkPaid()">Mark paid</button>
              <button class="btn btn-secondary btn-sm" onclick="bulkCancel()">Cancel</button>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
              <div class="filter-search" style="max-width:320px">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search by order, customer, email" id="searchInput" oninput="render()"/>
              </div>
              <select class="sort-select" onchange="filterByPayment(this.value)">
                <option value="">Payment status</option>
                <option value="paid">Paid</option>
                <option value="unpaid">Unpaid</option>
                <option value="pending">Pending</option>
              </select>
              <select class="sort-select" onchange="filterByFulfillment(this.value)">
                <option value="">Fulfillment</option>
                <option value="fulfilled">Fulfilled</option>
                <option value="unfulfilled">Unfulfilled</option>
              </select>
              <select class="sort-select" onchange="sortOrders(this.value)">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="total-desc">Highest value</option>
                <option value="total-asc">Lowest value</option>
              </select>
            </div>

            <!-- Table -->
            <div style="overflow-x:auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th class="col-check"><input type="checkbox" onchange="toggleAllChecks(this.checked)"/></th>
                    <th>Order</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Fulfillment</th>
                    <th>Items</th>
                    <th>Delivery</th>
                  </tr>
                </thead>
                <tbody id="ordersBody">
                  <tr><td colspan="9" style="text-align:center;padding:48px">
                    <div class="skeleton skeleton-text w-100" style="margin-bottom:12px"></div>
                    <div class="skeleton skeleton-text w-75"></div>
                  </td></tr>
                </tbody>
              </table>
            </div>

            <div class="pagination">
              <div class="pagination-info" id="paginationInfo">— orders</div>
              <div class="pagination-btns" id="paginationBtns"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('orders');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  let _all = [], _tab = 'all', _sort = 'newest', _payFilter = '', _fulfFilter = '', _page = 1;

  function setTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    _tab = tab; _page = 1; render();
  }
  function sortOrders(v) { _sort = v; render(); }
  function filterByPayment(v) { _payFilter = v; render(); }
  function filterByFulfillment(v) { _fulfFilter = v; render(); }

  const payBadge = s => {
    const map = {paid:'badge-success',unpaid:'badge-warning',pending:'badge-warning',refunded:'badge-default',voided:'badge-default'};
    return `<span class="badge ${map[s]||'badge-default'}" style="text-transform:capitalize">${s||'pending'}</span>`;
  };
  const fulfBadge = s => {
    const map = {fulfilled:'badge-success',unfulfilled:'badge-warning',partial:'badge-info',restocked:'badge-default'};
    return `<span class="badge ${map[s]||'badge-warning'}" style="text-transform:capitalize">${s||'Unfulfilled'}</span>`;
  };

  function toggleAllChecks(checked) {
    document.querySelectorAll('.row-check').forEach(c => {
      c.checked = checked;
    });
    updateBulkBar();
  }
  function updateBulkBar() {
    const n = document.querySelectorAll('.row-check:checked').length;
    document.getElementById('bulkBar').classList.toggle('visible', n > 0);
    document.getElementById('bulkCount').textContent = n;
  }

  function filtered() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let list = [..._all];
    if (_tab === 'unfulfilled') list = list.filter(o => !o.fulfillment_status || o.fulfillment_status === 'unfulfilled');
    if (_tab === 'fulfilled')   list = list.filter(o => o.fulfillment_status === 'fulfilled');
    if (_tab === 'paid')        list = list.filter(o => o.payment_status === 'paid');
    if (_tab === 'unpaid')      list = list.filter(o => o.payment_status === 'unpaid' || o.payment_status === 'pending');
    if (_payFilter)  list = list.filter(o => o.payment_status === _payFilter);
    if (_fulfFilter) list = list.filter(o => (o.fulfillment_status||'unfulfilled') === _fulfFilter);
    if (q) list = list.filter(o =>
      JSON.stringify({num:o.order_number,name:o.shipping_name,email:o.customer_email}).toLowerCase().includes(q)
    );
    switch(_sort) {
      case 'oldest':     list.sort((a,b) => new Date(a.created_at||0) - new Date(b.created_at||0)); break;
      case 'total-desc': list.sort((a,b) => parseFloat(b.total||0) - parseFloat(a.total||0)); break;
      case 'total-asc':  list.sort((a,b) => parseFloat(a.total||0) - parseFloat(b.total||0)); break;
      default:           list.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
    }
    return list;
  }

  function render() {
    const list = filtered();
    const paged = paginate(list, _page, 25);

    document.getElementById('paginationInfo').textContent =
      `${paged.total} order${paged.total!==1?'s':''}`;

    const tbody = document.getElementById('ordersBody');

    if (!paged.items.length) {
      tbody.innerHTML = `<tr><td colspan="9">
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <div class="empty-title">${_all.length===0?'No orders yet':'No orders match your filters'}</div>
          <div class="empty-desc">${_all.length===0?'Orders appear here when customers check out':'Try clearing your filters'}</div>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = paged.items.map(o => {
      const num = '#' + (o.order_number || o.id?.slice(0,6).toUpperCase());
      const customer = o.shipping_name || o.customer_email || 'Guest';
      const date = Fmt.date(o.created_at);
      const itemCount = o.items_count || '—';
      const city = o.shipping_city || '—';
      return `<tr onclick="location.href='sivra-order-detail.html?id=${o.id}'">
        <td class="col-check"><input type="checkbox" class="row-check" onclick="event.stopPropagation();updateBulkBar()"/></td>
        <td class="cell-primary">${num}</td>
        <td class="cell-muted">${date}</td>
        <td>${Fmt.truncate(customer,28)}</td>
        <td class="font-medium">${Fmt.money(o.total)}</td>
        <td>${payBadge(o.payment_status)}</td>
        <td>${fulfBadge(o.fulfillment_status)}</td>
        <td class="cell-muted">${itemCount}</td>
        <td class="cell-muted">${city}</td>
      </tr>`;
    }).join('');

    const pBtn = document.getElementById('paginationBtns');
    let btns = '';
    if (paged.hasPrev) btns += `<button class="pagination-btn" onclick="_page--;render()">‹</button>`;
    for (let i = Math.max(1,_page-2); i <= Math.min(paged.totalPages, _page+2); i++)
      btns += `<button class="pagination-btn${i===_page?' active':''}" onclick="_page=${i};render()">${i}</button>`;
    if (paged.hasNext) btns += `<button class="pagination-btn" onclick="_page++;render()">›</button>`;
    pBtn.innerHTML = btns;
  }

  function exportOrders() {
    const rows = [['Order #','Date','Customer','Email','Total','Payment','Fulfillment']];
    _all.forEach(o => rows.push([
      '#'+o.order_number, Fmt.date(o.created_at), o.shipping_name||'', o.customer_email||'',
      o.total||0, o.payment_status||'', o.fulfillment_status||'unfulfilled'
    ]));
    exportCSV(rows, 'orders.csv');
    Toast.success('Orders exported');
  }

  function bulkFulfill() { Toast.show('Marking as fulfilled...'); }
  function bulkPaid() { Toast.show('Marking as paid...'); }
  function bulkCancel() {
    Modal.confirm('Cancel orders', 'Cancel selected orders? Stock will be restocked.', () => {
      Toast.show('Cancelling...');
    }, { danger: true });
  }

  (async () => {
    try {
      const data = await API.get('/api/orders');
      _all = data.orders || [];
      render();
      // Badge
      const unfulfilled = _all.filter(o => !o.fulfillment_status || o.fulfillment_status === 'unfulfilled').length;
      const badge = document.getElementById('sbOrderBadge');
      if (badge && unfulfilled) { badge.textContent = unfulfilled; badge.style.display = ''; }
    } catch(e) {
      document.getElementById('ordersBody').innerHTML =
        '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load orders</div><button class="btn btn-secondary" onclick="location.reload()">Retry</button></div></td></tr>';
    }
  })();

})();
</script>
</body>
</html>
