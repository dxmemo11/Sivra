<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Products</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>

  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="page-header">
          <h1 class="page-title">Products</h1>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="importProducts()">Import</button>
            <button class="btn btn-secondary" onclick="exportProducts()">Export</button>
            <button class="btn btn-primary" onclick="location.href='sivra-add-product.html'">Add product</button>
          </div>
        </div>

        <div class="page-body">
          <div class="card">

            <!-- Tabs -->
            <div class="tabs" id="productTabs">
              <div class="tab active" onclick="setTab(this,'all')">All</div>
              <div class="tab" onclick="setTab(this,'active')">Active</div>
              <div class="tab" onclick="setTab(this,'draft')">Draft</div>
              <div class="tab" onclick="setTab(this,'archived')">Archived</div>
            </div>

            <!-- Bulk action bar -->
            <div class="bulk-bar" id="bulkBar">
              <span><span class="bulk-count" id="bulkCount">0</span> selected</span>
              <button class="btn btn-secondary btn-sm" onclick="bulkAction('active')">Set active</button>
              <button class="btn btn-secondary btn-sm" onclick="bulkAction('draft')">Set draft</button>
              <button class="btn btn-secondary btn-sm" onclick="bulkAction('archived')">Archive</button>
              <button class="btn btn-secondary btn-sm" style="color:#c0392b" onclick="bulkDelete()">Delete</button>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
              <div class="filter-search">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search products" id="searchInput" oninput="render()"/>
              </div>
              <select class="sort-select" onchange="sortProducts(this.value)">
                <option value="default">Sort by</option>
                <option value="title-asc">Title A–Z</option>
                <option value="title-desc">Title Z–A</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="inventory-asc">Inventory: Low</option>
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
              </select>
            </div>

            <!-- Table -->
            <div style="overflow-x:auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th class="col-check"><input type="checkbox" id="checkAll" onchange="toggleAllChecks(this.checked)"/></th>
                    <th class="col-img"></th>
                    <th class="sortable" onclick="sortProducts('title-asc')">Product</th>
                    <th>Status</th>
                    <th>Inventory</th>
                    <th class="cell-number">Price</th>
                    <th>Category</th>
                    <th>Vendor</th>
                  </tr>
                </thead>
                <tbody id="productsBody">
                  <tr><td colspan="8" style="text-align:center;padding:48px">
                    <div class="skeleton skeleton-text w-100" style="margin-bottom:12px"></div>
                    <div class="skeleton skeleton-text w-75" style="margin-bottom:12px"></div>
                    <div class="skeleton skeleton-text w-50"></div>
                  </td></tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div class="pagination">
              <div class="pagination-info" id="paginationInfo">— products</div>
              <div class="pagination-btns" id="paginationBtns"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="sivra-toast"></div>

<script src="admin.js"></script>
<script>
// Page init
(async function() {
  const session = await initAdmin('products');
  if (!session) return;
  const storeSlug = Auth.getSlug();
  
  let _all = [], _tab = 'all', _sort = 'default', _page = 1;
  const PER_PAGE = 25;

  function setTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    _tab = tab; _page = 1; render();
  }

  function sortProducts(val) { _sort = val; render(); }

  function toggleAllChecks(checked) {
    document.querySelectorAll('.row-check').forEach(c => {
      c.checked = checked;
      c.closest('tr').classList.toggle('selected', checked);
    });
    updateBulkBar();
  }

  function updateBulkBar() {
    const selected = document.querySelectorAll('.row-check:checked').length;
    const bar = document.getElementById('bulkBar');
    bar.classList.toggle('visible', selected > 0);
    document.getElementById('bulkCount').textContent = selected;
  }

  function filtered() {
    const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = [..._all];
    if (_tab !== 'all') list = list.filter(p => p.status === _tab);
    if (q) list = list.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.sku||'').toLowerCase().includes(q) ||
      (p.vendor||'').toLowerCase().includes(q)
    );
    switch(_sort) {
      case 'title-asc':    list.sort((a,b) => (a.title||'').localeCompare(b.title||'')); break;
      case 'title-desc':   list.sort((a,b) => (b.title||'').localeCompare(a.title||'')); break;
      case 'price-asc':    list.sort((a,b) => a.price - b.price); break;
      case 'price-desc':   list.sort((a,b) => b.price - a.price); break;
      case 'inventory-asc':list.sort((a,b) => (a.quantity||0) - (b.quantity||0)); break;
      case 'newest':       list.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0)); break;
      case 'oldest':       list.sort((a,b) => new Date(a.created_at||0) - new Date(b.created_at||0)); break;
    }
    return list;
  }

  function render() {
    const list = filtered();
    const paged = paginate(list, _page, PER_PAGE);

    document.getElementById('paginationInfo').textContent =
      `Showing ${paged.items.length ? ((_page-1)*PER_PAGE+1) : 0}–${(_page-1)*PER_PAGE+paged.items.length} of ${paged.total} product${paged.total!==1?'s':''}`;

    const tbody = document.getElementById('productsBody');

    if (!paged.items.length) {
      tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-title">${_all.length === 0 ? 'No products yet' : 'No products match your filters'}</div>
          <div class="empty-desc">${_all.length === 0 ? 'Add your first product to start selling' : 'Try clearing your search or changing tabs'}</div>
          ${_all.length === 0 ? '<button class="btn btn-primary" onclick="location.href=\'sivra-add-product.html\'">Add product</button>' : ''}
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = paged.items.map(p => {
      const badgeCls = p.status==='active' ? 'badge-success' : p.status==='draft' ? 'badge-default' : 'badge-warning';
      const qty = p.quantity != null ? p.quantity : '—';
      const qtyColor = p.quantity <= 0 ? 'style="color:#c0392b"' : p.quantity <= 5 ? 'style="color:#7d5c00"' : '';
      const img = p.images && p.images[0]
        ? `<img src="${p.images[0]}" class="table-thumb"/>`
        : `<div class="table-thumb-placeholder"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 9l3-3 2 2 3-4 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></div>`;
      return `<tr onclick="location.href='sivra-edit-product.html?id=${p.id}'">
        <td class="col-check"><input type="checkbox" class="row-check" onclick="event.stopPropagation();updateBulkBar()"/></td>
        <td class="col-img">${img}</td>
        <td class="cell-primary">${Fmt.truncate(p.title||'Untitled',40)}</td>
        <td><span class="badge ${badgeCls}" style="text-transform:capitalize">${p.status||'active'}</span></td>
        <td ${qtyColor}>${qty !== '—' ? qty + ' in stock' : '—'}</td>
        <td class="cell-number">${Fmt.money(p.price)}</td>
        <td class="cell-muted">${p.category || '—'}</td>
        <td class="cell-muted">${p.vendor || '—'}</td>
      </tr>`;
    }).join('');

    // Pagination buttons
    const pBtn = document.getElementById('paginationBtns');
    let btns = '';
    if (paged.hasPrev) btns += `<button class="pagination-btn" onclick="_page--;render()">‹</button>`;
    for (let i = Math.max(1, _page-2); i <= Math.min(paged.totalPages, _page+2); i++) {
      btns += `<button class="pagination-btn${i===_page?' active':''}" onclick="_page=${i};render()">${i}</button>`;
    }
    if (paged.hasNext) btns += `<button class="pagination-btn" onclick="_page++;render()">›</button>`;
    pBtn.innerHTML = btns;
  }

  async function bulkAction(status) {
    const ids = [...document.querySelectorAll('.row-check:checked')]
      .map(c => c.closest('tr').querySelector('.cell-primary')?.textContent)
      .filter(Boolean);
    if (!ids.length) return;
    Toast.show(`Updating ${ids.length} product${ids.length>1?'s':''}...`);
    // TODO: implement bulk status API
    setTimeout(() => { Toast.show('Updated successfully'); location.reload(); }, 800);
  }

  async function bulkDelete() {
    const checks = [...document.querySelectorAll('.row-check:checked')];
    if (!checks.length) return;
    Modal.confirm('Delete products', `Delete ${checks.length} product${checks.length>1?'s':''}? This cannot be undone.`, async () => {
      Toast.show('Deleting...');
      location.reload();
    }, { danger: true });
  }

  function exportProducts() {
    const rows = [['Title','Status','Price','Quantity','Vendor','Category']];
    _all.forEach(p => rows.push([p.title||'', p.status||'', p.price||0, p.quantity||0, p.vendor||'', p.category||'']));
    exportCSV(rows, 'products.csv');
    Toast.success('Products exported');
  }

  function importProducts() {
    document.getElementById('csvImportInput').click();
  }

  // Load
  (async () => {
    try {
      const data = await API.get('/api/products');
      _all = data.products || [];
      render();
    } catch(e) {
      document.getElementById('productsBody').innerHTML =
        '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load products</div><button class="btn btn-secondary" onclick="location.reload()">Retry</button></div></td></tr>';
    }
  
  async function importCSV(input) {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.trim().split('\n');
    if (lines.length < 2) { Toast.error('CSV appears empty'); return; }
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g,''));
    const titleIdx = headers.indexOf('title');
    const priceIdx = headers.indexOf('price');
    if (titleIdx === -1) { Toast.error('CSV must have a "title" column'); return; }
    Toast.show(`Importing ${lines.length-1} products...`);
    let success = 0, failed = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
      const title = cols[titleIdx];
      if (!title) continue;
      try {
        await API.post('/api/products', {
          title,
          price: priceIdx >= 0 ? parseFloat(cols[priceIdx])||0 : 0,
          description: headers.indexOf('description') >= 0 ? cols[headers.indexOf('description')] : null,
          sku: headers.indexOf('sku') >= 0 ? cols[headers.indexOf('sku')] : null,
          vendor: headers.indexOf('vendor') >= 0 ? cols[headers.indexOf('vendor')] : null,
          quantity: headers.indexOf('quantity') >= 0 ? parseInt(cols[headers.indexOf('quantity')])||0 : 0,
          status: headers.indexOf('status') >= 0 ? cols[headers.indexOf('status')] : 'active',
        });
        success++;
      } catch(e) { failed++; }
    }
    Toast.success(`Imported ${success} products${failed>0?' ('+failed+' failed)':''}`);
    input.value = '';
    const data = await API.get('/api/products');
    _all = data.products || [];
    render();
  }

})();


  async function importCSV(input) {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.trim().split('\n');
    if (lines.length < 2) { Toast.error('CSV appears empty'); return; }
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g,''));
    const titleIdx = headers.indexOf('title');
    const priceIdx = headers.indexOf('price');
    if (titleIdx === -1) { Toast.error('CSV must have a "title" column'); return; }
    Toast.show(`Importing ${lines.length-1} products...`);
    let success = 0, failed = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
      const title = cols[titleIdx];
      if (!title) continue;
      try {
        await API.post('/api/products', {
          title,
          price: priceIdx >= 0 ? parseFloat(cols[priceIdx])||0 : 0,
          description: headers.indexOf('description') >= 0 ? cols[headers.indexOf('description')] : null,
          sku: headers.indexOf('sku') >= 0 ? cols[headers.indexOf('sku')] : null,
          vendor: headers.indexOf('vendor') >= 0 ? cols[headers.indexOf('vendor')] : null,
          quantity: headers.indexOf('quantity') >= 0 ? parseInt(cols[headers.indexOf('quantity')])||0 : 0,
          status: headers.indexOf('status') >= 0 ? cols[headers.indexOf('status')] : 'active',
        });
        success++;
      } catch(e) { failed++; }
    }
    Toast.success(`Imported ${success} products${failed>0?' ('+failed+' failed)':''}`);
    input.value = '';
    const data = await API.get('/api/products');
    _all = data.products || [];
    render();
  }


  // Expose to global scope for onclick handlers
  if (typeof exportProducts === "function") window.exportProducts = exportProducts;
  if (typeof sortProducts === "function") window.sortProducts = sortProducts;
  if (typeof bulkDelete === "function") window.bulkDelete = bulkDelete;
  if (typeof bulkAction === "function") window.bulkAction = bulkAction;
  if (typeof setTab === "function") window.setTab = setTab;
  if (typeof importProducts === "function") window.importProducts = importProducts;
  if (typeof importCSV === "function") window.importCSV = importCSV;
  if (typeof exportCSV === "function") window.exportCSV = exportCSV;
})();
</script>
</body>
</html>
