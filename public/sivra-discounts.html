<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Discounts</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>
  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="page-header">
          <h1 class="page-title">Discounts</h1>
          <button class="btn btn-primary" onclick="openModal()">Create discount</button>
        </div>

        <div class="page-body">
          <div class="card">
            <div class="tabs">
              <div class="tab active" onclick="setTab(this,'all')">All</div>
              <div class="tab" onclick="setTab(this,'active')">Active</div>
              <div class="tab" onclick="setTab(this,'scheduled')">Scheduled</div>
              <div class="tab" onclick="setTab(this,'expired')">Expired</div>
            </div>
            <div class="filter-bar">
              <div class="filter-search">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search discounts" id="searchInput" oninput="render()"/>
              </div>
            </div>
            <div style="overflow-x:auto">
              <table class="data-table">
                <thead><tr>
                  <th class="col-check"><input type="checkbox" onchange="document.querySelectorAll('.row-check').forEach(c=>c.checked=this.checked)"/></th>
                  <th>Code / Title</th>
                  <th>Type</th>
                  <th>Value</th>
                  <th>Status</th>
                  <th class="cell-number">Used</th>
                  <th>Expires</th>
                  <th></th>
                </tr></thead>
                <tbody id="discBody">
                  <tr><td colspan="8" style="text-align:center;padding:48px;color:#8c9196">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Create / Edit modal -->
        <div class="modal-overlay" id="discModal">
          <div class="modal" style="max-width:580px">
            <div class="modal-header">
              <span class="modal-title" id="modalTitle">Create discount</span>
              <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">

              <!-- Method -->
              <div id="methodRow">
                <label class="form-label">Discount method</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
                  <div id="btnCode" onclick="setMethod('code')" style="border:2px solid #1a1a1a;border-radius:8px;padding:10px;cursor:pointer">
                    <div style="font-size:13px;font-weight:600">Discount code</div>
                    <div style="font-size:11px;color:#6d7175">Customers enter at checkout</div>
                  </div>
                  <div id="btnAuto" onclick="setMethod('automatic')" style="border:1px solid #e3e3e3;border-radius:8px;padding:10px;cursor:pointer">
                    <div style="font-size:13px;font-weight:600">Automatic discount</div>
                    <div style="font-size:11px;color:#6d7175">Applied automatically</div>
                  </div>
                </div>
              </div>

              <div id="codeField" class="form-group">
                <label class="form-label">Discount code</label>
                <div style="display:flex;gap:8px">
                  <input class="input" id="dCode" placeholder="e.g. SUMMER20" style="text-transform:uppercase;font-weight:600;font-family:monospace;letter-spacing:1px;flex:1"/>
                  <button class="btn btn-secondary" onclick="genCode()">Generate</button>
                </div>
              </div>
              <div id="nameField" class="form-group" style="display:none">
                <label class="form-label">Title</label>
                <input class="input" id="dName" placeholder="e.g. Summer sale"/>
              </div>

              <!-- Type selector -->
              <div>
                <label class="form-label">Discount type</label>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px">
                  <div id="tPct" onclick="setType('percentage')" style="border:2px solid #1a1a1a;border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600">% Off</div>
                  <div id="tFixed" onclick="setType('fixed')" style="border:1px solid #e3e3e3;border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600">$ Fixed</div>
                  <div id="tShip" onclick="setType('free_shipping')" style="border:1px solid #e3e3e3;border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600">🚚 Free Ship</div>
                </div>
              </div>

              <div id="valueField" class="form-group">
                <label class="form-label">Value</label>
                <div class="input-prefix" style="max-width:160px">
                  <span class="input-prefix-text" id="valuePfx">%</span>
                  <input type="number" id="dValue" min="0" step="0.01" placeholder="e.g. 20"
                    style="flex:1;height:36px;padding:0 12px;border:none;outline:none;font-size:13px;font-family:inherit;background:none;color:#303030"/>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                  <label class="form-label">Min. order amount <span class="text-muted">(optional)</span></label>
                  <div class="input-prefix"><span class="input-prefix-text">$</span>
                    <input type="number" id="dMinOrder" min="0" step="0.01" placeholder="None"
                      style="flex:1;height:36px;padding:0 12px;border:none;outline:none;font-size:13px;font-family:inherit;background:none;color:#303030"/>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Usage limit <span class="text-muted">(optional)</span></label>
                  <input class="input" type="number" id="dLimit" placeholder="Unlimited" min="1"/>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                  <label class="form-label">Start date</label>
                  <input class="input" type="date" id="dStart"/>
                </div>
                <div class="form-group">
                  <label class="form-label">End date <span class="text-muted">(optional)</span></label>
                  <input class="input" type="date" id="dEnd"/>
                </div>
              </div>

              <label class="checkbox-label">
                <input type="checkbox" id="dOnce"/> Limit to one use per customer
              </label>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" id="deleteBtnModal" style="color:#c0392b;display:none" onclick="deleteDiscount()">Delete</button>
              <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="saveDiscount()" id="saveBtn">Create discount</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
(async function() {
  const session = await initAdmin('discounts');
  if (!session) return;
  
  let _all = [], _tab = 'all', _method = 'code', _type = 'percentage', _editId = null;

  function setTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active'); _tab = tab; render();
  }

  function setMethod(m) {
    _method = m;
    document.getElementById('btnCode').style.border = m==='code' ? '2px solid #1a1a1a' : '1px solid #e3e3e3';
    document.getElementById('btnAuto').style.border = m==='automatic' ? '2px solid #1a1a1a' : '1px solid #e3e3e3';
    document.getElementById('codeField').style.display = m==='code' ? '' : 'none';
    document.getElementById('nameField').style.display = m==='automatic' ? '' : 'none';
  }

  function setType(t) {
    _type = t;
    const map = {percentage:'tPct', fixed:'tFixed', free_shipping:'tShip'};
    ['tPct','tFixed','tShip'].forEach(id => document.getElementById(id).style.border = '1px solid #e3e3e3');
    document.getElementById(map[t]).style.border = '2px solid #1a1a1a';
    document.getElementById('valueField').style.display = t==='free_shipping' ? 'none' : '';
    document.getElementById('valuePfx').textContent = t==='percentage' ? '%' : '$';
  }

  function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    document.getElementById('dCode').value = Array.from({length:8}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  }

  function openModal(disc=null) {
    _editId = disc ? disc.id : null;
    document.getElementById('modalTitle').textContent = disc ? 'Edit discount' : 'Create discount';
    document.getElementById('saveBtn').textContent = disc ? 'Save changes' : 'Create discount';
    document.getElementById('deleteBtnModal').style.display = disc ? '' : 'none';
    document.getElementById('methodRow').style.opacity = disc ? '0.5' : '1';
    document.getElementById('methodRow').style.pointerEvents = disc ? 'none' : '';

    // Reset / fill
    const m = disc?.method || 'code';
    const t = disc?.type || 'percentage';
    setMethod(m);
    setType(t);
    document.getElementById('dCode').value = disc?.code || '';
    document.getElementById('dName').value = disc?.title || (m==='automatic'?disc?.code||'':'');
    document.getElementById('dValue').value = disc?.value || '';
    document.getElementById('dMinOrder').value = disc?.min_order_amount || '';
    document.getElementById('dLimit').value = disc?.usage_limit || '';
    document.getElementById('dStart').value = disc?.starts_at ? disc.starts_at.split('T')[0] : new Date().toISOString().split('T')[0];
    document.getElementById('dEnd').value = disc?.ends_at ? disc.ends_at.split('T')[0] : '';
    document.getElementById('dOnce').checked = !!disc?.once_per_customer;
    document.getElementById('discModal').classList.add('open');
  }

  function closeModal() { document.getElementById('discModal').classList.remove('open'); }

  async function saveDiscount() {
    const isCode = _method === 'code';
    const code = isCode ? document.getElementById('dCode').value.trim().toUpperCase() : document.getElementById('dName').value.trim();
    if (!code) { Toast.error(isCode ? 'Enter a discount code' : 'Enter a title'); return; }
    if (_type !== 'free_shipping') {
      const val = parseFloat(document.getElementById('dValue').value);
      if (!val || val <= 0) { Toast.error('Enter a value'); return; }
      if (_type === 'percentage' && val > 100) { Toast.error('Percentage cannot exceed 100%'); return; }
    }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const body = {
        code,
        title: document.getElementById('dName').value || null,
        type: _type,
        value: _type === 'free_shipping' ? 0 : parseFloat(document.getElementById('dValue').value)||0,
        method: _method,
        min_order_amount: parseFloat(document.getElementById('dMinOrder').value)||null,
        usage_limit: parseInt(document.getElementById('dLimit').value)||null,
        once_per_customer: document.getElementById('dOnce').checked ? 1 : 0,
        starts_at: document.getElementById('dStart').value || null,
        ends_at: document.getElementById('dEnd').value || null,
        status: 'active',
      };
      if (_editId) {
        await API.patch('/api/discounts/'+_editId, body);
        const idx = _all.findIndex(d=>d.id===_editId);
        if (idx>=0) _all[idx] = {..._all[idx], ...body};
        Toast.success('Discount updated');
      } else {
        const res = await API.post('/api/discounts', body);
        _all.unshift(res.discount || res);
        Toast.success('Discount created');
      }
      closeModal(); render();
    } catch(e) { Toast.error(e.message||'Failed to save'); }
    btn.disabled = false; btn.textContent = _editId ? 'Save changes' : 'Create discount';
  }

  async function deleteDiscount() {
    Modal.confirm('Delete discount', `Delete "${_all.find(d=>d.id===_editId)?.code}"?`, async () => {
      try {
        await API.del('/api/discounts/'+_editId);
        _all = _all.filter(d=>d.id!==_editId);
        closeModal(); render();
        Toast.success('Discount deleted');
      } catch(e) { Toast.error(e.message); }
    }, { danger: true });
  }

  function render() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    const now = new Date();
    let list = [..._all];
    if (_tab==='active') list = list.filter(d => {
      const s = d.starts_at ? new Date(d.starts_at) : null;
      const e = d.ends_at ? new Date(d.ends_at) : null;
      return (!s||s<=now) && (!e||e>=now) && d.status==='active';
    });
    if (_tab==='scheduled') list = list.filter(d => d.starts_at && new Date(d.starts_at) > now);
    if (_tab==='expired') list = list.filter(d => d.ends_at && new Date(d.ends_at) < now);
    if (q) list = list.filter(d => (d.code||'').toLowerCase().includes(q) || (d.title||'').toLowerCase().includes(q));
    const tbody = document.getElementById('discBody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
        <div class="empty-icon">🏷️</div>
        <div class="empty-title">${_all.length===0?'No discounts yet':'No discounts match'}</div>
        <div class="empty-desc">${_all.length===0?'Create discount codes to offer deals to customers':''}</div>
        ${_all.length===0?'<button class="btn btn-primary" onclick="openModal()" style="margin-top:8px">Create discount</button>':''}
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(d => {
      const now2 = new Date();
      const isActive = (!d.starts_at||new Date(d.starts_at)<=now2) && (!d.ends_at||new Date(d.ends_at)>=now2) && d.status==='active';
      const isExpired = d.ends_at && new Date(d.ends_at) < now2;
      const badge = isExpired ? 'badge-default' : isActive ? 'badge-success' : 'badge-info';
      const label = isExpired ? 'Expired' : isActive ? 'Active' : 'Scheduled';
      const typeLabel = d.type==='percentage'?'% off':d.type==='fixed'?'$ off':'Free ship';
      const valueLabel = d.type==='free_shipping'?'Free shipping':d.type==='percentage'?`${d.value}% off`:`$${parseFloat(d.value||0).toFixed(2)} off`;
      return `<tr onclick="openModal(${JSON.stringify(d).replace(/"/g,'&quot;')})">
        <td class="col-check"><input type="checkbox" class="row-check" onclick="event.stopPropagation()"/></td>
        <td><div class="font-medium" style="font-family:monospace;letter-spacing:0.5px">${d.code||d.title||'—'}</div>
          ${d.title&&d.method==='automatic'?`<div class="text-muted text-sm">Automatic</div>`:''}</td>
        <td class="cell-muted">${typeLabel}</td>
        <td class="font-medium">${valueLabel}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td class="cell-number cell-muted">${d.usage_count||0}${d.usage_limit?' / '+d.usage_limit:''}</td>
        <td class="cell-muted">${d.ends_at?Fmt.date(d.ends_at):'No end'}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openModal(${JSON.stringify(d).replace(/"/g,'&quot;')})">Edit</button></td>
      </tr>`;
    }).join('');
  }

  (async () => {
    try {
      const data = await API.get('/api/discounts');
      _all = data.discounts || [];
      render();
    } catch(e) { document.getElementById('discBody').innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div></div></td></tr>'; }
  })();


  // Expose to global scope for onclick handlers
  if (typeof setMethod === "function") window.setMethod = setMethod;
  if (typeof openModal === "function") window.openModal = openModal;
  if (typeof closeModal === "function") window.closeModal = closeModal;
  if (typeof genCode === "function") window.genCode = genCode;
  if (typeof saveDiscount === "function") window.saveDiscount = saveDiscount;
  if (typeof setType === "function") window.setType = setType;
  if (typeof setTab === "function") window.setTab = setTab;
  if (typeof deleteDiscount === "function") window.deleteDiscount = deleteDiscount;
})();
</script>
</body>
</html>
