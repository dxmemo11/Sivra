<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sivra — Draft orders</title>
  <link rel="stylesheet" href="admin-tokens.css"/>
  <link rel="stylesheet" href="admin-layout.css"/>
  <link rel="stylesheet" href="admin-components.css"/>
  
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div style="padding:20px;color:#6d7175;font-size:12px">Loading...</div>
</aside>
  <div class="main">
    <div class="topbar" id="sivraTopbar"></div>
    <div class="page-scroll">
      <div style="max-width:1280px;margin:0 auto">

        <div class="breadcrumb">
          <a href="sivra-orders.html" class="breadcrumb-link">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Orders
          </a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Draft orders</span>
        </div>

        <div class="page-header">
          <h1 class="page-title">Draft orders</h1>
          <button class="btn btn-primary" onclick="openCreateDraft()">Create order</button>
        </div>

        <div class="page-body">
          <div class="card">
            <div class="filter-bar">
              <div class="filter-search">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search draft orders" id="searchInput" oninput="render()"/>
              </div>
            </div>
            <div style="overflow-x:auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Draft</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th class="cell-number">Total</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="draftBody">
                  <tr><td colspan="5"><div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <div class="empty-title">No draft orders</div>
                    <div class="empty-desc">Draft orders let you create orders on behalf of customers — for phone orders, wholesale, or custom requests</div>
                    <button class="btn btn-primary" onclick="openCreateDraft()" style="margin-top:8px">Create draft order</button>
                  </div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Create draft modal -->
        <div class="modal-overlay" id="draftModal">
          <div class="modal" style="max-width:640px">
            <div class="modal-header">
              <span class="modal-title">Create draft order</span>
              <button class="modal-close" onclick="closeDraft()">×</button>
            </div>
            <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">

              <!-- Search products -->
              <div>
                <label class="form-label">Add products</label>
                <div class="filter-search" style="max-width:100%">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#8c9196" stroke-width="1.3"/><path d="M9 9l3 3" stroke="#8c9196" stroke-width="1.3" stroke-linecap="round"/></svg>
                  <input type="text" placeholder="Search products to add" id="draftSearch" oninput="searchProducts(this.value)"/>
                </div>
                <div id="draftSearchResults" style="border:1px solid #e3e3e3;border-radius:8px;margin-top:4px;overflow:hidden;display:none;max-height:200px;overflow-y:auto"></div>
              </div>

              <!-- Line items -->
              <div>
                <label class="form-label">Items</label>
                <div id="draftItems" style="border:1px solid #e3e3e3;border-radius:8px;min-height:60px;overflow:hidden">
                  <div style="padding:20px;text-align:center;color:#8c9196;font-size:13px">No items added yet</div>
                </div>
              </div>

              <!-- Custom item -->
              <div style="display:flex;gap:8px;align-items:flex-end">
                <div style="flex:2"><label class="form-label">Custom item name</label><input class="input" id="customItemName" placeholder="e.g. Custom jersey"/></div>
                <div style="flex:1"><label class="form-label">Price</label>
                  <div class="input-prefix"><span class="input-prefix-text">$</span>
                    <input type="number" id="customItemPrice" min="0" step="0.01" placeholder="0.00"
                      style="flex:1;height:36px;padding:0 12px;border:none;outline:none;font-size:13px;font-family:inherit;background:none;color:#303030"/>
                  </div></div>
                <button class="btn btn-secondary" onclick="addCustomItem()">Add</button>
              </div>

              <!-- Customer -->
              <div class="form-group">
                <label class="form-label">Customer email <span class="text-muted">(optional)</span></label>
                <input class="input" id="draftEmail" type="email" placeholder="customer@example.com"/>
              </div>

              <!-- Note -->
              <div class="form-group">
                <label class="form-label">Note <span class="text-muted">(optional)</span></label>
                <textarea class="textarea" id="draftNote" placeholder="Add notes about this order..." style="min-height:60px"></textarea>
              </div>

              <!-- Total -->
              <div style="padding:14px;background:#f9f9f9;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
                <span class="font-semibold" style="font-size:14px">Estimated total</span>
                <span class="font-bold" style="font-size:18px" id="draftTotal">$0.00</span>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" onclick="closeDraft()">Cancel</button>
              <button class="btn btn-secondary" onclick="saveDraft()">Save draft</button>
              <button class="btn btn-primary" onclick="convertToOrder()">Create order</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div class="toast" id="sivra-toast"></div>
<script src="admin.js"></script>
<script>
(async function() {
  const session = await initAdmin('orders');
  if (!session) return;
  
  let _drafts = [], _draftItems = [], _allProducts = [];

  function render() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let list = [..._drafts];
    if (q) list = list.filter(d => JSON.stringify(d).toLowerCase().includes(q));
    const tbody = document.getElementById('draftBody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">${_drafts.length===0?'No draft orders':'No drafts match'}</div>
        ${_drafts.length===0?'<div class="empty-desc">Create orders on behalf of customers</div><button class="btn btn-primary" onclick="openCreateDraft()" style="margin-top:8px">Create draft</button>':''}
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(d => `<tr onclick="location.href='sivra-orders.html'">
      <td class="cell-primary">#D${d.id?.slice(0,6).toUpperCase()}</td>
      <td class="cell-muted">${Fmt.date(d.created_at)}</td>
      <td>${d.customer_email||'<span class="text-muted">No customer</span>'}</td>
      <td class="cell-number font-medium">${Fmt.money(d.total||0)}</td>
      <td><span class="badge badge-warning">Draft</span></td>
    </tr>`).join('');
  }

  function openCreateDraft() {
    _draftItems = [];
    renderDraftItems();
    document.getElementById('draftModal').classList.add('open');
  }
  function closeDraft() { document.getElementById('draftModal').classList.remove('open'); }

  function searchProducts(q) {
    const el = document.getElementById('draftSearchResults');
    if (!q) { el.style.display='none'; return; }
    const matches = _allProducts.filter(p => (p.title||'').toLowerCase().includes(q.toLowerCase())).slice(0,6);
    if (!matches.length) { el.style.display='none'; return; }
    el.style.display='';
    el.innerHTML = matches.map(p => `
      <div onclick="addProduct('${p.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background 0.1s" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background=''">
        ${p.images&&p.images[0]?`<img src="${p.images[0]}" style="width:32px;height:32px;border-radius:4px;object-fit:cover;border:1px solid #e3e3e3"/>`:`<div style="width:32px;height:32px;border-radius:4px;background:#f0f0f0;border:1px solid #e3e3e3"></div>`}
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${p.title}</div>
        <div style="font-size:12px;color:#6d7175">${Fmt.money(p.price)}</div></div>
      </div>`).join('');
  }

  function addProduct(id) {
    const p = _allProducts.find(x => x.id === id);
    if (!p) return;
    const ex = _draftItems.find(i => i.id === id);
    if (ex) { ex.qty++; } else { _draftItems.push({id, title: p.title, price: p.price, qty: 1}); }
    document.getElementById('draftSearch').value='';
    document.getElementById('draftSearchResults').style.display='none';
    renderDraftItems();
  }

  function addCustomItem() {
    const name = document.getElementById('customItemName').value.trim();
    const price = parseFloat(document.getElementById('customItemPrice').value) || 0;
    if (!name) { Toast.error('Enter an item name'); return; }
    _draftItems.push({id: 'custom_'+Date.now(), title: name, price, qty: 1, custom: true});
    document.getElementById('customItemName').value='';
    document.getElementById('customItemPrice').value='';
    renderDraftItems();
  }

  function removeItem(id) {
    _draftItems = _draftItems.filter(i => i.id !== id);
    renderDraftItems();
  }

  function renderDraftItems() {
    const el = document.getElementById('draftItems');
    const total = _draftItems.reduce((s,i) => s+i.price*i.qty, 0);
    document.getElementById('draftTotal').textContent = Fmt.money(total);
    if (!_draftItems.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:#8c9196;font-size:13px">No items yet — search for products above or add a custom item</div>';
      return;
    }
    el.innerHTML = _draftItems.map(i => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #f0f0f0">
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${i.title}</div>
        <div style="font-size:12px;color:#6d7175">${Fmt.money(i.price)} each</div></div>
        <div style="display:flex;align-items:center;border:1px solid #e3e3e3;border-radius:6px;overflow:hidden">
          <button onclick="_draftItems.find(x=>x.id==='${i.id}').qty=Math.max(1,${i.qty}-1);renderDraftItems()" style="width:28px;height:28px;border:none;background:none;font-size:16px;cursor:pointer">−</button>
          <span style="width:32px;text-align:center;font-size:13px">${i.qty}</span>
          <button onclick="_draftItems.find(x=>x.id==='${i.id}').qty=${i.qty}+1;renderDraftItems()" style="width:28px;height:28px;border:none;background:none;font-size:16px;cursor:pointer">+</button>
        </div>
        <span style="font-size:13px;font-weight:500;width:64px;text-align:right">${Fmt.money(i.price*i.qty)}</span>
        <button onclick="removeItem('${i.id}')" style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:18px;line-height:1">×</button>
      </div>`).join('');
  }

  async function saveDraft() {
    if (!_draftItems.length) { Toast.error('Add at least one item'); return; }
    if (!_draftItems.length) { Toast.error('Add at least one item'); return; }
    const total = _draftItems.reduce((s,i) => s+i.price*i.qty, 0);
    // Create as manual order
    try {
      const items = _draftItems.map(i => ({
        productId: i.id.startsWith('custom_') ? null : i.id,
        quantity: i.qty, title: i.title, price: i.price,
      }));
      const email = document.getElementById('draftEmail').value.trim() || 'draft@order.internal';
      const note = document.getElementById('draftNote').value.trim();
      const res = await API.post('/api/orders', {
        customerEmail: email, items,
        subtotal: total, total, notes: note,
        source: 'draft_order',
      });
      closeDraft();
      Toast.success('Draft order created');
      setTimeout(() => location.href = 'sivra-orders.html', 800);
    } catch(e) {
      Toast.error(e.message || 'Failed to save');
    }
  }

  async function convertToOrder() {
    if (!_draftItems.length) { Toast.error('Add at least one item'); return; }
    const total = _draftItems.reduce((s,i) => s+i.price*i.qty, 0);
    try {
      const items = _draftItems.map(i => ({productId: i.id, quantity: i.qty, title: i.title, price: i.price}));
      const email = document.getElementById('draftEmail').value.trim() || 'manual@order.com';
      const slug = Auth.getSlug();
      const res = await API.post('/api/storefront/' + slug + '/checkout', {
        customerEmail: email,
        items,
        firstName: 'Manual',
        lastName: 'Order',
      });
      closeDraft();
      Toast.success('Order created: #' + res.orderNumber);
      setTimeout(() => location.href = 'sivra-orders.html', 1000);
    } catch(e) {
      Toast.error(e.message || 'Failed to create order');
    }
  }

  (async () => {
    try {
      const pData = await API.get('/api/products');
      _allProducts = pData.products || [];
    } catch(e) {}
    // Load existing draft orders (orders created with source=draft_order that are still pending)
    try {
      const oData = await API.get('/api/orders?limit=100');
      _drafts = (oData.orders || []).filter(o => o.source === 'draft_order' && o.status !== 'cancelled' && o.payment_status === 'pending');
    } catch(e) { _drafts = []; }
    render();
  })();

  // Expose to global scope for onclick handlers
  if (typeof convertToOrder === "function") window.convertToOrder = convertToOrder;
  if (typeof saveDraft === "function") window.saveDraft = saveDraft;
  if (typeof addCustomItem === "function") window.addCustomItem = addCustomItem;
  if (typeof closeDraft === "function") window.closeDraft = closeDraft;
  if (typeof openCreateDraft === "function") window.openCreateDraft = openCreateDraft;
  if (typeof removeItem === "function") window.removeItem = removeItem;
  if (typeof searchProducts === "function") window.searchProducts = searchProducts;
  if (typeof addProduct === "function") window.addProduct = addProduct;
  if (typeof renderDraftItems === "function") window.renderDraftItems = renderDraftItems;
  // Expose _draftItems for inline onclick handlers
  window._draftItems = _draftItems;
})();
</script>
</body>
</html>
